/* 8-BALL */
.ball-container{position:relative;cursor:pointer;-webkit-tap-highlight-color:transparent}

.ball:active{transform:scale(.97)}
.ball.shake{animation:shake .5s}
@keyframes shake{0%,100%{transform:rotate(0)}25%{transform:rotate(-5deg) scale(.97)}50%{transform:rotate(5deg) scale(.97)}75%{transform:rotate(-3deg) scale(.97)}}

/* WINDOW */
.window{width:110px;height:110px;border-radius:50%;background:radial-gradient(circle,#0a0a3a,#050520);border:3px solid #222;display:flex;align-items:center;justify-content:center;overflow:hidden}

/* TRIANGLE */
.triangle{width:0;height:0;border-left:40px solid transparent;border-right:40px solid transparent;border-bottom:70px solid rgba(0,50,200,.15);position:relative;opacity:0;transition:opacity .8s;display:flex;align-items:center;justify-content:center}
.triangle.show{opacity:1}
.answer{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-size:8px;font-weight:700;color:#fff;text-align:center;width:70px;line-height:1.5;text-shadow:0 0 6px rgba(100,150,255,.3)}

.ask input::placeholder{color:rgba(255,255,255,.08)}
.ask input:focus{border-color:rgba(100,0,200,.15)}

.instruction{font-size:8px;color:rgba(255,255,255,.06);margin-top:8px;text-align:center;letter-spacing:1px}

.counter{font-size:7px;color:rgba(255,255,255,.03);margin-top:6px;letter-spacing:1px}

.footer{position:fixed;bottom:8px;font-size:5px;color:rgba(255,255,255,.02);letter-spacing:1px}

const ANSWERS=[

  "IT IS CERTAIN\n(like password123)",

  // NEUTRAL
  "ASK AGAIN\nAT 3:42 AM",

  "THE 40TH APP\nKNOWS BUT\nWON'T TELL",
  "CONCENTRATE\nAND ASK\nAGAIN",
  "BETTER NOT\nTELL YOU\n(for now)",
  "THE SERVO\nIS THINKING\n(in B♭ minor)",
  
  // NEGATIVE
  "DON'T\nCOUNT ON IT",
  "MY REPLY IS\nNO — LIKE\nPETITION #3",

  "ESLINT\nSAYS NO\n(17 violations)",
  
  // SPECIAL
  "BUG #42\nWAS HERE\nBEFORE YOU",
  "THE ANSWER\nIS 42.\nALWAYS 42.",
  "PASSWORD\nREMAINS\n123",
  "I AM NOT\nA BUG.\nI AM A\nFEATURE.",
  "CHECK\nLINE 42\nOF THE\nCODEBASE",
];

let count=0;
function shake(){
  const ball=document.getElementById('ball');
  const tri=document.getElementById('tri');
  const ans=document.getElementById('answer');
  
  ball.classList.remove('shake');
  tri.classList.remove('show');
  void ball.offsetWidth;
  ball.classList.add('shake');
  
  setTimeout(()=>{
    const a=ANSWERS[Math.floor(Math.random()*ANSWERS.length)];
    ans.textContent=a;
    tri.classList.add('show');
    count++;
    document.getElementById('counter').textContent=`Consultations: ${count}`;
  },600);
}
</script>
