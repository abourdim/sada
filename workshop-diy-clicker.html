<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WKSHP-DIY // IDLE CLICKER</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;color:#fff;font-family:'JetBrains Mono',monospace;font-size:11px;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:14px;gap:10px}

h1{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:#ffd700;letter-spacing:2px}
.sub{font-size:7px;color:rgba(255,215,0,.1);letter-spacing:2px}

/* COUNTER */
.counter{text-align:center}
.count{font-family:'Syne',sans-serif;font-size:clamp(32px,8vw,48px);font-weight:800;color:#fff}
.per-sec{font-size:9px;color:rgba(255,255,255,.15)}

/* CLICK BUTTON */
.click-area{cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}
.click-btn{width:120px;height:120px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#ffd700,#cc8800,#996600);border:4px solid #ffaa00;display:flex;align-items:center;justify-content:center;font-size:48px;transition:transform .1s;box-shadow:0 4px 16px rgba(255,170,0,.15)}
.click-btn:active{transform:scale(.92)}

/* FLOATING NUMBERS */
.float-num{position:fixed;pointer-events:none;font-size:14px;font-weight:800;color:#ffd700;animation:floatUp 1s forwards;z-index:100}
@keyframes floatUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-60px)}}

/* UPGRADES */
.shop{width:100%;max-width:400px}
.shop h2{font-size:10px;color:rgba(255,255,255,.1);letter-spacing:2px;margin-bottom:4px;text-align:center}
.upgrades{display:flex;flex-direction:column;gap:4px}
.upgrade{display:flex;align-items:center;gap:8px;padding:8px;border:1px solid rgba(255,255,255,.03);border-radius:6px;background:rgba(255,255,255,.01);cursor:pointer;transition:all .2s}
.upgrade:hover{border-color:rgba(255,215,0,.1);background:rgba(255,215,0,.01)}
.upgrade.locked{opacity:.3;cursor:default}
.upgrade .emoji{font-size:24px;width:36px;text-align:center}
.upgrade .info{flex:1}
.upgrade .info .name{font-size:10px;font-weight:700;color:rgba(255,255,255,.5)}
.upgrade .info .desc{font-size:8px;color:rgba(255,255,255,.1)}
.upgrade .info .owned{font-size:7px;color:rgba(255,215,0,.2);margin-top:1px}
.upgrade .cost{font-size:10px;color:#ffd700;font-weight:700;white-space:nowrap}

/* STATS */
.stats{font-size:8px;color:rgba(255,255,255,.05);text-align:center;letter-spacing:1px}

.footer{font-size:5px;color:rgba(255,255,255,.02);letter-spacing:1px;text-align:center}
</style>
</head>
<body>

<h1>APP CLICKER</h1>
<div class="sub">CLICK TO BUILD WORKSHOP-DIY</div>

<div class="counter">
  <div class="count" id="count">0</div>
  <div class="per-sec" id="perSec">0 apps/sec</div>
</div>

<div class="click-area" onclick="doClick(event)">
  <div class="click-btn">🤖</div>
</div>

<div class="shop">
  <h2>UPGRADES</h2>
  <div class="upgrades" id="upgrades"></div>
</div>

<div class="stats" id="stats">Total clicks: 0 · Total apps: 0</div>
<div class="footer">WKSHP IDLE · CLICK RESPONSIBLY · BUGS GENERATE AUTOMATICALLY</div>

<script>
let apps=0,perClick=1,perSec=0,totalClicks=0,totalApps=0;

const UPGRADES=[
  {id:'glue',name:'Hot Glue Gun',emoji:'🔥',desc:'+1 per click',type:'click',power:1,baseCost:10,count:0,growth:1.15},
  {id:'coffee',name:'Coffee Machine',emoji:'☕',desc:'+1 per second',type:'auto',power:1,baseCost:50,count:0,growth:1.2},
  {id:'ble',name:'BLE Module',emoji:'📡',desc:'+3 per click',type:'click',power:3,baseCost:200,count:0,growth:1.18},
  {id:'docker',name:'Docker Container',emoji:'🐳',desc:'+5 per second',type:'auto',power:5,baseCost:500,count:0,growth:1.2},
  {id:'servo',name:'Servo Motor',emoji:'🔧',desc:'+10 per click',type:'click',power:10,baseCost:1000,count:0,growth:1.2},
  {id:'ai',name:'Teachable Machine',emoji:'🧠',desc:'+20 per second (98% accuracy)',type:'auto',power:20,baseCost:5000,count:0,growth:1.25},
  {id:'bug',name:'Bug #42',emoji:'🐛',desc:'+42 per second (it was always here)',type:'auto',power:42,baseCost:10000,count:0,growth:1.3},
  {id:'password',name:'password123',emoji:'🔑',desc:'×2 all production (unchanged)',type:'mult',power:2,baseCost:50000,count:0,growth:3},
];

function getCost(u){return Math.floor(u.baseCost*Math.pow(u.growth,u.count));}

function renderUpgrades(){
  const el=document.getElementById('upgrades');
  el.innerHTML=UPGRADES.map(u=>{
    const cost=getCost(u);
    const locked=apps<cost;
    return `<div class="upgrade ${locked?'locked':''}" onclick="buyUpgrade('${u.id}')">
      <div class="emoji">${u.emoji}</div>
      <div class="info">
        <div class="name">${u.name}</div>
        <div class="desc">${u.desc}</div>
        <div class="owned">Owned: ${u.count}</div>
      </div>
      <div class="cost">${formatNum(cost)} 🤖</div>
    </div>`;
  }).join('');
}

function buyUpgrade(id){
  const u=UPGRADES.find(x=>x.id===id);
  const cost=getCost(u);
  if(apps<cost)return;
  apps-=cost;
  u.count++;
  recalc();
  renderUpgrades();
  updateDisplay();
}

function recalc(){
  perClick=1;perSec=0;let mult=1;
  UPGRADES.forEach(u=>{
    if(u.type==='click')perClick+=u.power*u.count;
    if(u.type==='auto')perSec+=u.power*u.count;
    if(u.type==='mult')mult*=Math.pow(u.power,u.count);
  });
  perClick=Math.floor(perClick*mult);
  perSec=Math.floor(perSec*mult);
}

function doClick(e){
  apps+=perClick;
  totalClicks++;
  totalApps+=perClick;
  updateDisplay();
  renderUpgrades();
  // Float number
  const f=document.createElement('div');
  f.className='float-num';
  f.textContent='+'+formatNum(perClick);
  f.style.left=(e.clientX-20)+'px';
  f.style.top=(e.clientY-20)+'px';
  document.body.appendChild(f);
  setTimeout(()=>f.remove(),1000);
}

function formatNum(n){
  if(n>=1e9)return(n/1e9).toFixed(1)+'B';
  if(n>=1e6)return(n/1e6).toFixed(1)+'M';
  if(n>=1e3)return(n/1e3).toFixed(1)+'K';
  return n.toString();
}

function updateDisplay(){
  document.getElementById('count').textContent=formatNum(Math.floor(apps));
  document.getElementById('perSec').textContent=formatNum(perSec)+' apps/sec · '+formatNum(perClick)+' per click';
  document.getElementById('stats').textContent=`Total clicks: ${formatNum(totalClicks)} · Total apps: ${formatNum(totalApps)}`;
}

// Auto-generation
setInterval(()=>{
  if(perSec>0){
    const gain=Math.max(1,Math.floor(perSec/10));
    apps+=gain;
    totalApps+=gain;
    updateDisplay();
    renderUpgrades();
  }
},100);

renderUpgrades();
updateDisplay();
</script>
</body>
</html>
