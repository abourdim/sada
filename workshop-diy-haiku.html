<script>
const H=[
{s:"🤖",lines:["Robot on the edge","Forty-seven drops and counting","Still it drives forward"],sub:"— on bit-bot"},
{s:"🪄",lines:["Twenty-one landmarks","Fingers trace invisible","Particles follow"],sub:"— on magic-hands"},
{s:"🔑",lines:["Password unchanged","Three petitions all denied","Tradition persists"],sub:"— on password123"},
{s:"☕",lines:["Eight percent remains","Fourteen months at critical","Nobody refills"],sub:"— on the coffee machine"},
{s:"🐛",lines:["No author exists","No commit and no timestamp","I have always been"],sub:"— Bug #42 speaks"},
{s:"🐳",lines:["Child explains Docker","Father nods and writes it down","Containers of pride"],sub:"— on docker-lab"},
{s:"🧠",lines:["Thirty samples shown","Ninety-eight percent correct","The machine has learned"],sub:"— on teachable-machine"},
{s:"🔐",lines:["Ethical hacking","Student finds the printer's port","Responsible kid"],sub:"— on pentest-lab"},
{s:"🐧",lines:["Terminal awaits","ls cd mkdir rm","Careful with that last"],sub:"— on linux-kids-lab"},
{s:"💡",lines:["Sixteen million hues","One HTTP request sent","The strip comes alive"],sub:"— on wled-kids-lab"},
{s:"🔥",lines:["Solder meets the wire","Three-fifty Celsius kiss","Connection is made"],sub:"— on soldering"},
{s:"📡",lines:["Bluetooth signal fades","Chrome disconnects without cause","Reconnect and dance"],sub:"— on BLE"},
{s:"⬛",lines:["Three forty-two AM","The counter shows forty apps","Then thirty-nine again"],sub:"— on the 40th app"},
{s:"🌐",lines:["No npm install","No webpack and no config","Just open the page"],sub:"— on zero installation"},
{s:"⚖️",lines:["Court is now in session","The jury deliberates","Feature. Not guilty."],sub:"— on the trial"},
{s:"🚀",lines:["WebRTC bridge","Two browsers find each other","Connection is real"],sub:"— on mission-control"},
{s:"🎮",lines:["Pixel placed with care","Eight-bit art on modern screens","Retro lives again"],sub:"— on pixel-gateway"},
{s:"📊",lines:["Eight hundred reviews","Four point nine stars out of five","Point one was coffee"],sub:"— on reception"},
{s:"🔧",lines:["Hot glue gun ready","It holds the world together","Engineering tape"],sub:"— on workshop tools"},
{s:"🌸",lines:["Thirty-nine small worlds","Each one built inside a page","Learning blooms in spring"],sub:"— on Workshop-DIY"},
];

const el=document.getElementById('haikus');
H.forEach((h,i)=>{
  const d=document.createElement('div');
  d.className='haiku';
  d.innerHTML=`<div class="season">${h.s}</div><div class="prompt">click to reveal</div><div class="lines">${h.lines.join('<br>')}</div><div class="subject">${h.sub}</div>`;
  d.onclick=()=>d.classList.add('revealed');
  el.appendChild(d);
});
</script>
