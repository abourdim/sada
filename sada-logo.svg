<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6"/>
      <stop offset="50%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="200" rx="20" fill="#070b12"/>
  <text x="200" y="110" text-anchor="middle" font-family="'Amiri', 'Noto Naskh Arabic', serif" font-size="90" font-weight="700" fill="url(#g1)" filter="url(#glow)">صدى</text>
  <text x="200" y="150" text-anchor="middle" font-family="'Nunito', sans-serif" font-size="22" fill="#e4e8f2" opacity="0.35" letter-spacing="8">sada</text>
  <line x1="120" y1="165" x2="280" y2="165" stroke="url(#g1)" stroke-width="0.5" opacity="0.3"/>
</svg>
