<title>صدى sada — Facebook Calendar · 84 posts</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Syne:wght@600;700;800&family=JetBrains+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;700&family=Nunito:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06060e;--s1:#0c0c1a;--s2:#12122a;--brd:rgba(255,255,255,.04);--txt:#e4e8f2;--dim:rgba(255,255,255,.25);--teal:#14b8a6;--cyan:#06b6d4;--indigo:#6366f1;--r:12px}
body{background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;min-height:100vh}
::selection{background:rgba(20,184,166,.3)}
.header{text-align:center;padding:40px 20px 30px;border-bottom:1px solid var(--brd)}
.logo-ar{font-family:'Amiri',serif;font-size:48px;font-weight:700;background:linear-gradient(135deg,var(--teal),var(--cyan),var(--indigo));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1}
.logo-fr{font-family:'DM Sans',sans-serif;font-size:14px;font-weight:300;opacity:.2;letter-spacing:8px}
.header h2{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-top:10px;color:var(--dim)}
.header p{font-size:12px;color:rgba(255,255,255,.15);margin-top:4px}
.controls{display:flex;gap:8px;padding:16px 20px;max-width:1100px;margin:0 auto;flex-wrap:wrap;align-items:center}
.week-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--brd);background:var(--s1);color:var(--dim);font-family:'JetBrains Mono',monospace;font-size:10px;cursor:pointer;transition:.2s;white-space:nowrap}
.week-btn:hover,.week-btn.active{background:rgba(20,184,166,.08);border-color:rgba(20,184,166,.2);color:var(--teal)}
.week-btn.all{background:linear-gradient(135deg,rgba(20,184,166,.1),rgba(99,102,241,.1));border-color:rgba(20,184,166,.15);color:var(--txt)}
.search{flex:1;min-width:200px;padding:8px 14px;border-radius:20px;border:1px solid var(--brd);background:var(--s1);color:var(--txt);font-family:'DM Sans',sans-serif;font-size:13px;outline:none}
.search:focus{border-color:rgba(20,184,166,.3)}
.search::placeholder{color:var(--dim)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px;padding:20px;max-width:1100px;margin:0 auto}
.week-divider{grid-column:1/-1;display:flex;align-items:center;gap:12px;padding:20px 0 8px}
.week-divider .wnum{font-family:'Syne',sans-serif;font-size:11px;font-weight:800;color:var(--teal);background:rgba(20,184,166,.06);border:1px solid rgba(20,184,166,.1);padding:4px 12px;border-radius:20px;white-space:nowrap}
.week-divider .wtitle{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--dim)}
.week-divider::after{content:'';flex:1;height:1px;background:var(--brd)}
.post{background:var(--s1);border:1px solid var(--brd);border-radius:var(--r);overflow:hidden;transition:.2s;position:relative;display:flex;flex-direction:column}
.post:hover{border-color:rgba(20,184,166,.12);transform:translateY(-1px)}
.post-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--brd)}
.post-num{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--teal);background:rgba(20,184,166,.06);padding:2px 8px;border-radius:10px}
.post-day{font-family:'Syne',sans-serif;font-size:11px;font-weight:700}
.post-theme{font-size:10px;color:var(--dim)}
.post-body{padding:12px 14px;font-size:13px;line-height:1.7;color:rgba(255,255,255,.6);flex:1}
.post-body strong,.post-body b{color:var(--txt);font-weight:600}
.post-body .hashtags{display:block;margin-top:8px;font-size:11px;color:rgba(20,184,166,.5)}
.post-body .link{color:var(--teal);font-size:11px;text-decoration:none}
.post-body .wdiy-link{color:rgba(255,255,255,.3);font-size:11px;text-decoration:none}
.post-foot{display:flex;gap:6px;padding:8px 14px;border-top:1px solid var(--brd);align-items:center}
.post-btn{padding:4px 10px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:9px;cursor:pointer;transition:.2s;text-decoration:none;border:1px solid var(--brd);background:var(--s2);color:var(--dim)}
.post-btn:hover{border-color:rgba(20,184,166,.2);color:var(--teal)}
.post-btn.demo{background:linear-gradient(135deg,rgba(20,184,166,.1),rgba(99,102,241,.1));border-color:rgba(20,184,166,.15);color:var(--teal)}
.post-btn.demo:hover{background:linear-gradient(135deg,rgba(20,184,166,.2),rgba(99,102,241,.2));color:#fff}
.post-btn.copied{color:var(--teal);border-color:var(--teal)}
.stats{display:flex;justify-content:center;gap:0;padding:10px 20px;border-bottom:1px solid var(--brd)}
.st{flex:1;text-align:center;padding:8px;max-width:140px}
.st-n{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;background:linear-gradient(135deg,var(--teal),var(--indigo));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.st-l{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--dim);letter-spacing:1px;text-transform:uppercase}
.foot{text-align:center;padding:20px;border-top:1px solid var(--brd);margin-top:20px}
.foot .f-row{display:flex;align-items:center;justify-content:center;gap:8px}
.foot .f-icon{width:20px;height:20px;opacity:.4}
.foot a{color:rgba(255,255,255,.2);text-decoration:none;font-size:10px;letter-spacing:1px}
.foot a:hover{color:var(--teal)}
.foot .f-dot{color:rgba(255,255,255,.08)}
.foot .f-ar{font-family:'Amiri',serif;font-size:14px;background:linear-gradient(135deg,var(--teal),var(--indigo));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.foot .f-fr{font-family:'Nunito',sans-serif;font-size:9px;color:rgba(255,255,255,.15);letter-spacing:3px}
@media(max-width:600px){.grid{grid-template-columns:1fr;padding:12px}.controls{padding:12px}}
</style>
</head>

<script>
const POSTS = 
[{"week": 1, "weekTitle": "La Grande Intro", "num": 1, "day": "Lundi", "theme": "🚀 App Spotlight", "body": "🎬 **Hacker Presentation**\nImagine une présentation qui se lance toute seule comme dans un film de hacker. Séquence de boot, pluie de code Matrix, et un easter egg Konami Code caché 👀\n12 scènes cinématiques. Zéro PowerPoint. 100% navigateur.\n🔗 https://abourdim.github.io/sada/workshop-diy-hacker-presentation.html\n🌐 workshop-diy.org\n#sada #صدى #Chelles #CodingKids #Presentation"}, {"week": 1, "weekTitle": "La Grande Intro", "num": 2, "day": "Mardi", "theme": "🎓 Tips & Learn", "body": "💡 **Le saviez-vous ?**\nLe code Konami (⬆️⬆️⬇️⬇️⬅️➡️⬅️➡️🅱️🅰️) fonctionne dans plein de sites web et jeux. C'est un des easter eggs les plus célèbres du monde.\nNotre app Hacker Presentation en a un aussi... à vous de le trouver 😏\n🔗 https://abourdim.github.io/sada/workshop-diy-hacker-presentation.html\n🌐 workshop-diy.org\n#FunFact #Konami #sada #صدى #Chelles"}, {"week": 1, "weekTitle": "La Grande Intro", "num": 3, "day": "Mercredi", "theme": "🎮 Challenge", "body": "🏴‍☠️ **CTF Quiz — Capture The Flag**\n3 niveaux de difficulté. Questions chronométrées. Bonus de vitesse.\nTu te sens prêt ? Lance le quiz et dis-nous ton score en commentaire 👇\n🔗 https://abourdim.github.io/sada/workshop-diy-ctf-quiz.html\n🌐 workshop-diy.org\n#CTF #Quiz #CodingChallenge #Chelles"}, {"week": 1, "weekTitle": "La Grande Intro", "num": 4, "day": "Jeudi", "theme": "🚀 App Spotlight", "body": "💻 **Hacker Terminal**\nUn vrai terminal bash dans ton navigateur. 20+ commandes, auto-complétion, historique. Explore les 39 apps, lance des faux hacks, et sens-toi comme un vrai hacker 🖥️\nTape `help` pour commencer. Tape `hack` si tu oses.\n🔗 https://abourdim.github.io/sada/workshop-diy-hacker-terminal.html\n🌐 workshop-diy.org\n#Terminal #Hacker #CodingKids #sada #صدى"}, {"week": 1, "weekTitle": "La Grande Intro", "num": 5, "day": "Vendredi", "theme": "🎉 Fun", "body": "👻 **La légende du 40ème App**\nIl existe 39 apps dans صدى sada. Mais certains disent qu'il y en a une 40ème... Une app jamais publiée. Des effets glitch. Du texte censuré. Des logs de chat récupérés.\nOuvre-la si tu oses. 🌑\n🔗 https://abourdim.github.io/sada/workshop-diy-creepypasta.html\n🌐 workshop-diy.org\n#Creepypasta #Bug42 #sada #صدى #Chelles"}, {"week": 1, "weekTitle": "La Grande Intro", "num": 6, "day": "Samedi", "theme": "🛠️ Weekend Project", "body": "🔓 **Escape Room — 6 pièces, 6 énigmes**\nROT13, séquences, conversion binaire, portes logiques, trivia, mots mélangés.\nDéfie ta famille ce weekend. Qui sort en premier ? ⏱️\n🔗 https://abourdim.github.io/sada/workshop-diy-escape-room.html\n🌐 workshop-diy.org\n#EscapeRoom #WeekendProject #Chelles #CodingKids"}, {"week": 1, "weekTitle": "La Grande Intro", "num": 7, "day": "Dimanche", "theme": "📢 Recap Semaine 1", "body": "📊 **Récap Semaine 1**\nCette semaine on a découvert :\n🎬 Hacker Presentation — le cinéma en HTML\n💻 Hacker Terminal — ton terminal de hacker\n🏴‍☠️ CTF Quiz — capture the flag\n👻 The 40th App — la légende\n🔓 Escape Room — 6 énigmes\nSemaine prochaine : on rentre dans les simulations 🕹️\n🔗 https://abourdim.github.io/sada\n🌐 workshop-diy.org\n#sada #صدى #Recap #Chelles"}, {"week": 2, "weekTitle": "Simulations & Faux-Semblants", "num": 8, "day": "Lundi", "theme": "🚀 App Spotlight", "body": "🖥️ **Fake OS Desktop**\nUn faux système d'exploitation rétro. Fenêtres qu'on peut déplacer, menu démarrer, barre des tâches, gestionnaire de fichiers, bloc-notes. Les 39 apps sont des icônes sur le bureau.\nNostalgie Windows 95 + apps du futur 🚀\n🔗 https://abourdim.github.io/sada/workshop-diy-os-desktop.html\n🌐 workshop-diy.org\n#FakeOS #Retro #CodingKids #sada #صدى"}, {"week": 2, "weekTitle": "Simulations & Faux-Semblants", "num": 9, "day": "Mardi", "theme": "🎓 Tips & Learn", "body": "💡 **C'est quoi un terminal ?**\nAvant les souris et les fenêtres, les ordinateurs n'avaient qu'un écran noir avec du texte. On tapait des commandes pour tout faire.\nAujourd'hui les développeurs utilisent encore le terminal tous les jours. C'est plus rapide qu'une souris pour beaucoup de tâches 💨\n🔗 https://abourdim.github.io/sada\n🌐 workshop-diy.org\n#Terminal #DevTips #sada #صدى #Chelles"}, {"week": 2, "weekTitle": "Simulations & Faux-Semblants", "num": 10, "day": "Mercredi", "theme": "🎮 Challenge", "body": "📕 **Pokédex Challenge**\nNotre Pokédex contient les 39 apps sous forme d'entrées Pokémon. Stats, types, taux de capture, abilités.\nCombien d'apps peux-tu identifier juste avec leur silhouette ? 🔍\n🔗 https://abourdim.github.io/sada/workshop-diy-pokedex.html\n🌐 workshop-diy.org\n#Pokedex #Challenge #CodingKids #Chelles"}, {"week": 2, "weekTitle": "Simulations & Faux-Semblants", "num": 11, "day": "Jeudi", "theme": "🚀 App Spotlight", "body": "💬 **Discord Chat**\nUn faux serveur Discord avec des salons, des messages de bots, des extraits de code, des memes, des indicateurs de frappe...\nTout est faux. Tout est fun. Tout est HTML.\n🔗 https://abourdim.github.io/sada/workshop-diy-discord-chat.html\n🌐 workshop-diy.org\n#Discord #FakeApp #sada #صدى #Chelles"}, {"week": 2, "weekTitle": "Simulations & Faux-Semblants", "num": 12, "day": "Vendredi", "theme": "🎉 Fun", "body": "🤠 **Wanted Wall**\n\"BIT-BOT : 47 chefs d'accusation de survie à des chutes de bureau\"\nDes affiches de recherche Far West pour chaque app. Punaisées sur un tableau en liège. Chacune avec son crime imaginaire 🏜️\n🔗 https://abourdim.github.io/sada/workshop-diy-wanted-wall.html\n🌐 workshop-diy.org\n#Wanted #Fun #sada #صدى #Chelles"}, {"week": 2, "weekTitle": "Simulations & Faux-Semblants", "num": 13, "day": "Samedi", "theme": "🛠️ Weekend Project", "body": "🎹 **Synth Visualizer**\nUn synthé jouable dans le navigateur. 4 formes d'onde (sine, square, saw, triangle). 4 modes de visualisation.\nBranche un casque, ouvre l'app, et fais de la musique 🎵\n🔗 https://abourdim.github.io/sada/workshop-diy-synth-visualizer.html\n🌐 workshop-diy.org\n#Synth #Music #WeekendProject #Chelles"}, {"week": 2, "weekTitle": "Simulations & Faux-Semblants", "num": 14, "day": "Dimanche", "theme": "📢 Recap Semaine 2", "body": "📊 **Récap Semaine 2**\n🖥️ Fake OS — Windows 95 en HTML\n💬 Discord Chat — faux serveur, vrais memes\n📕 Pokédex — les apps en mode Pokémon\n🤠 Wanted Wall — avis de recherche\n🎹 Synth Visualizer — ton synthé navigateur\nSemaine 3 : les jeux commencent 🎮\n🔗 https://abourdim.github.io/sada\n🌐 workshop-diy.org\n#sada #صدى #Recap #Chelles"}, {"week": 3, "weekTitle": "Jeux & Gamification", "num": 15, "day": "Lundi", "theme": "🚀 App Spotlight", "body": "🕹️ **Retro Arcade**\nUne borne d'arcade 8-bit. Navigation au joystick, écran de sélection de jeux, high scores, lignes de scan rétro.\nInsert coin to play 🪙\n🔗 https://abourdim.github.io/sada/workshop-diy-arcade.html\n🌐 workshop-diy.org\n#RetroArcade #Gaming #CodingKids #Chelles"}, {"week": 3, "weekTitle": "Jeux & Gamification", "num": 16, "day": "Mardi", "theme": "🎓 Tips & Learn", "body": "💡 **C'est quoi le pixel art ?**\nLe pixel art c'est dessiner image par image, pixel par pixel. Les jeux des années 80 et 90 étaient tous faits comme ça. Aujourd'hui c'est un style artistique à part entière.\nNos apps Retro Arcade et Card Collection utilisent ce style 🎨\n🔗 https://abourdim.github.io/sada/workshop-diy-arcade.html\n🌐 workshop-diy.org\n#PixelArt #RetroGaming #sada #صدى #Chelles"}, {"week": 3, "weekTitle": "Jeux & Gamification", "num": 17, "day": "Mercredi", "theme": "🎮 Challenge", "body": "🎴 **Card Collection — Ouvre tes packs !**\nCartes à collectionner pour les 39 apps. Niveaux de rareté, stats (Puissance/Complexité/Fun), mécanique d'ouverture de packs.\nCombien de cartes légendaires tu peux obtenir ? 🃏\n🔗 https://abourdim.github.io/sada/workshop-diy-card-collection.html\n🌐 workshop-diy.org\n#CardCollection #Trading #CodingKids #Chelles"}, {"week": 3, "weekTitle": "Jeux & Gamification", "num": 18, "day": "Jeudi", "theme": "🚀 App Spotlight", "body": "🌳 **Skill Tree**\nSystème de progression RPG. 5 branches de compétences, 20 succès, barres d'XP, classement avec 15 joueurs.\nLevel up tes compétences tech 📈\n🔗 https://abourdim.github.io/sada/workshop-diy-skill-tree.html\n🌐 workshop-diy.org\n#SkillTree #RPG #Gamification #sada #صدى"}, {"week": 3, "weekTitle": "Jeux & Gamification", "num": 19, "day": "Vendredi", "theme": "🎉 Fun", "body": "🎤 **Rap Battle**\nbit-bot vs docker-lab. 4 rounds de verses. Vote pour ton favori. Applaudimètre du public.\nQui est le meilleur rappeur du Workshop ? 🎙️\n🔗 https://abourdim.github.io/sada/workshop-diy-rap-battle.html\n🌐 workshop-diy.org\n#RapBattle #Fun #sada #صدى #Chelles"}, {"week": 3, "weekTitle": "Jeux & Gamification", "num": 20, "day": "Samedi", "theme": "🛠️ Weekend Project", "body": "🎯 **Workshop Bingo**\n\"Le robot tombe de la table\" ✅\n\"Quelqu'un mentionne le mot de passe WiFi\" ✅\n\"Bug #42 frappe encore\" ✅\nImprime la carte, joue en famille 🏠\n🔗 https://abourdim.github.io/sada/workshop-diy-bingo.html\n🌐 workshop-diy.org\n#Bingo #WeekendProject #Chelles #sada #صدى"}, {"week": 3, "weekTitle": "Jeux & Gamification", "num": 21, "day": "Dimanche", "theme": "📢 Recap Semaine 3", "body": "📊 **Récap Semaine 3**\n🕹️ Retro Arcade — borne d'arcade 8-bit\n🎴 Card Collection — cartes à collectionner\n🌳 Skill Tree — progression RPG\n🎤 Rap Battle — apps au micro\n🎯 Workshop Bingo — le fun en famille\nSemaine 4 : dashboards et profils 📊\n🔗 https://abourdim.github.io/sada\n🌐 workshop-diy.org\n#sada #صدى #Recap #Chelles"}, {"week": 4, "weekTitle": "Dashboards & Profils", "num": 22, "day": "Lundi", "theme": "🚀 App Spotlight", "body": "📡 **Live Monitor**\nTableau de bord de monitoring en temps réel. Graphiques animés, flux d'activité, grille de statut des apps, indicateur de niveau de menace.\nOn se croirait dans un film d'espionnage 🕵️\n🔗 https://abourdim.github.io/sada/workshop-diy-live-monitor.html\n🌐 workshop-diy.org\n#Dashboard #Monitor #CodingKids #sada #صدى"}, {"week": 4, "weekTitle": "Dashboards & Profils", "num": 23, "day": "Mard const BASE = "https://abourdim.github.io/sada";

function findAppFile(body) {
  for (const [name, file] of Object.entries(APP_MAP)) {
    if (body.includes(name)) return { name, file };
  }
  return null;
}

const ctrl = document.getElementById('controls');
const grid = document.getElementById('grid');

const search = document.createElement('input');
search.className = 'search';
search.placeholder = '🔍 Rechercher dans les posts...';
search.oninput = () => render(activeWeek);
ctrl.appendChild(search);

const allBtn = document.createElement('button');
allBtn.className = 'week-btn all active';
allBtn.textContent = 'Tout (84)';
allBtn.onclick = () => setWeek(0);
ctrl.appendChild(allBtn);

const weekTitles = [...new Set(POSTS.map(p => p.week))].map(w => {
  const p = POSTS.find(x => x.week === w);
  return { num: w, title: p.weekTitle };
});

weekTitles.forEach(w => {
  const btn = document.createElement('button');
  btn.className = 'week-btn';
  btn.dataset.week = w.num;
  btn.textContent = `S${w.num}`;
  btn.title = w.title;
  btn.onclick = () => setWeek(w.num);
  ctrl.appendChild(btn);
});

let activeWeek = 0;

function setWeek(w) {
  activeWeek = w;
  document.querySelectorAll('.week-btn').forEach(b => b.classList.remove('active'));
  if (w === 0) allBtn.classList.add('active');
  else document.querySelector(`.week-btn[data-week="${w}"]`)?.classList.add('active');
  render(w);
}

function formatBody(body) {
  let html = body
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
  
  // Style the links
  html = html.replace(/🔗\s*(https:\/\/[^\s<]+)/g, '🔗 <a class="link" href="$1" target="_blank">$1</a>');
  html = html.replace(/🌐\s*(workshop-diy\.org)/g, '🌐 <a class="wdiy-link" href="https://workshop-diy.org" target="_blank">$1</a>');
  
  // Style hashtags
  html = html.replace(/(#\w+)/g, '<span style="color:rgba(20,184,166,.4)">$1</span>');
  
  return html;
}

function render(week) {
  const q = search.value.toLowerCase();
  let posts = POSTS;
  if (week > 0) posts = posts.filter(p => p.week === week);
  if (q) posts = posts.filter(p => (p.body + p.theme + p.day).toLowerCase().includes(q));
  
  let html = '';
  let lastWeek = 0;
  
  posts.forEach(p => {
    if (p.week !== lastWeek) {
      html += `<div class="week-divider"><span class="wnum">Semaine ${p.week}</span><span class="wtitle">${p.weekTitle}</span></div>`;
      lastWeek = p.week;
    }
    
    const cleanBody = p.body.replace(/\*\*/g, '');
    const app = findAppFile(p.body);
    
    html += `<div class="post">
      <div class="post-head">
        <span class="post-num">#${p.num}</span>
        <span class="post-day">${p.day}</span>
        <span class="post-theme">${p.theme}</span>
      </div>
      <div class="post-body">${formatBody(p.body)}</div>
      <div class="post-foot">
        ${app ? `<a class="post-btn demo" href="${BASE}/${app.file}" target="_blank">▶ Demo</a>` : `<a class="post-btn demo" href="${BASE}" target="_blank">▶ Site</a>`}
        <button class="post-btn" onclick="copyPost(this, \`${cleanBody.replace(/`/g, "'").replace(/\\/g, '\\\\')}\`)">📋 Copier</button>
      </div>
    </div>`;
  });
  
  grid.innerHTML = html || '<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--dim)">Aucun post trouvé</div>';
}

function copyPost(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ copié';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 Copier'; btn.classList.remove('copied'); }, 1500);
  });
}

render(0);
</script>
