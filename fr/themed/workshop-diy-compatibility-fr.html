<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<script src="../../assets/js/sada-theme.js"></script>
<script src="../../assets/js/sada-lang.js"></script>
<link rel="stylesheet" href="../../assets/css/sada-base.css">
<link rel="stylesheet" href="../../assets/css/sada-themes.css">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WKSHP-DIY // COMPATIBILITÉ TEST</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@700;800&Amiri&family=Noto+Kufi+Arabic:wght@400;700&display=swap" rel="stylesheet">
<style>
body{background:#0a0a14;color:#fff;font-family:'JetBrains Mono',monospace;font-size:11px;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px}

.header{text-align:center;margin-bottom:14px}
.h-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#ff0066}
.h-sub{font-size:7px;color:rgba(255,0,102,.2);letter-spacing:3px;margin-top:2px}

.game{max-width:420px;width:100%}

/* PROGRESS */
.progress{height:4px;background:#1a1a24;border-radius:2px;margin-bottom:12px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#ff0066,#ff8800);border-radius:2px;transition:width .4s}

/* QUESTION */
.question{margin-bottom:10px;min-height:260px}
.q-num{font-size:7px;color:#333;letter-spacing:2px;margin-bottom:4px}
.q-text{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:#fff;margin-bottom:12px;line-height:1.6}
.options{display:flex;flex-direction:column;gap:6px}
.option{padding:10px 12px;border:1px solid rgba(255,0,102,.06);border-radius:6px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px;background:rgba(255,0,102,.01)}
.option:hover{border-color:rgba(255,0,102,.2);background:rgba(255,0,102,.03)}
.option.selected{border-color:#ff0066;background:rgba(255,0,102,.06)}
.option .letter{width:22px;height:22px;border-radius:50%;border:1px solid rgba(255,0,102,.15);display:flex;align-items:center;justify-content:center;font-size:9px;color:#555;flex-shrink:0}
.option.selected .letter{background:#ff0066;border-color:#ff0066;color:#fff}
.option .text{font-size:10px;color:rgba(255,255,255,.4)}
.option.selected .text{color:#fff}

.nav{display:flex;gap:6px;margin-top:10px}
.btn{flex:1;padding:8px;border-radius:4px;border:1px solid rgba(255,0,102,.1);background:rgba(255,0,102,.03);color:rgba(255,0,102,.4);font-family:inherit;font-size:9px;cursor:pointer;text-align:center}
.btn:hover{background:rgba(255,0,102,.06);color:#ff0066}
.btn:disabled{opacity:.2;cursor:default}

/* RESULT */
.result{display:none;text-align:center;padding:16px;border:1px solid rgba(255,0,102,.1);border-radius:8px;background:rgba(255,0,102,.02)}
.result.show{display:block;animation:pop .4s}
@keyframes pop{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
.result .pct{font-family:'Syne',sans-serif;font-size:clamp(48px,12vw,64px);font-weight:800;background:linear-gradient(135deg,#ff0066,#ff8800);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.result .verdict{font-size:14px;color:#fff;margin:6px 0}
.result .match{font-size:11px;color:rgba(255,255,255,.3);margin:8px 0;line-height:2}
.result .match-emoji{font-size:36px;margin:6px 0}
.result .retry{margin-top:10px}

.footer{font-size:6px;color:#111;margin-top:auto;letter-spacing:1px}
</style>
</head>
<body>
<div style="font-family:'Amiri',serif;font-size:13px;color:rgba(255,255,255,.08);text-align:center;padding:4px;direction:rtl">بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</div>

<div class="header">
  <div class="h-title">💕 COMPATIBILITÉ TEST</div>
  <div class="h-sub">ÊTES-VOUS FAIT(E) POUR WORKSHOP-DIY ?</div>
</div>

<div class="game" id="game">
  <div class="progress"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
  <div class="question" id="qArea"></div>
  <div class="nav">
    <button class="btn" id="prevBtn" onclick="prev()" disabled>← RETOUR</button>
    <button class="btn" id="nextBtn" onclick="next()" disabled>SUIV →</button>
  </div>
</div>

<div class="result" id="result">
  <div class="pct" id="pct"></div>
  <div class="verdict" id="verdict"></div>
  <div class="match-emoji" id="matchEmoji"></div>
  <div class="match" id="match"></div>
  <div class="retry"><button class="btn" onclick="restart()" style="max-width:160px;margin:0 auto">🔄 RECOMMENCER</button></div>
</div>

<div class="footer">WORKSHOP-DIY · RÉSULTATS NON SCIENTIFIQUEMENT VALIDÉS · LES BUGS SONT COMPATIBLES AVEC LES FONCTIONNALITÉS</div>

<script>
const QS=[
{q:"Ton code a un bug. Que fais-tu ?",opts:[
  {t:"Je le corrige immédiatement, proprement",s:{r:1,a:1,c:0,l:1}},
  {t:"Je le déclare fonctionnalité et je déploie",s:{r:2,a:0,c:0,l:0}},
  {t:"Je google le message d'erreur",s:{r:0,a:1,c:0,l:2}},
  {t:"Je blâme le compilateur",s:{r:1,a:0,c:1,l:0}},
]},
{q:"Que penses-tu de password123 ?",opts:[
  {t:"C'est un cauchemar sécuritaire",s:{r:0,a:0,c:3,l:0}},
  {t:"C'est la tradition. Je la respecte.",s:{r:2,a:1,c:0,l:1}},
  {t:"Je l'ai changé... attends, il est revenu ?",s:{r:0,a:0,c:2,l:1}},
  {t:"JE SUIS password123",s:{r:1,a:0,c:0,l:0}},
]},
{q:"Un robot tombe du bureau. Ta réaction ?",opts:[
  {t:"Le rattraper ! Sauver le robot !",s:{r:3,a:0,c:0,l:0}},
  {t:"Documenter la chute pour la science",s:{r:1,a:2,c:0,l:1}},
  {t:"Il a survécu à 47 chutes. Ça ira.",s:{r:2,a:0,c:0,l:0}},
  {t:"Construire un pare-chocs pour la prochaine fois",s:{r:2,a:0,c:0,l:2}},
]},
{q:"Choisis ton environnement de développement préféré :",opts:[
  {t:"Juste un navigateur. Rien d'autre.",s:{r:1,a:1,c:1,l:1}},
  {t:"VS Code avec 47 extensions",s:{r:0,a:1,c:0,l:3}},
  {t:"Un terminal et vim",s:{r:0,a:0,c:2,l:2}},
  {t:"Bloc-notes. Viens te battre.",s:{r:2,a:0,c:1,l:0}},
]},
{q:"La machine à café affiche 8% restant. Tu :",opts:[
  {t:"Panique et remplis immédiatement",s:{r:0,a:0,c:0,l:1}},
  {t:"Ça fait 14 mois qu'elle est à 8%. Tout va bien.",s:{r:2,a:1,c:0,l:0}},
  {t:"Passer au thé",s:{r:0,a:0,c:0,l:0}},
  {t:"Écrire un script de monitoring pour elle",s:{r:0,a:1,c:1,l:2}},
]},
{q:"Comment expliques-tu Docker à un enfant ?",opts:[
  {t:"Des conteneurs de livraison pour logiciels !",s:{r:0,a:1,c:0,l:3}},
  {t:"C'est comme avoir des pièces séparées pour chaque jouet",s:{r:1,a:1,c:0,l:2}},
  {t:"Je ne sais même pas l'expliquer aux adultes",s:{r:0,a:0,c:0,l:0}},
  {t:"Laisser l'enfant me l'expliquer à MOI",s:{r:2,a:2,c:0,l:1}},
]},
{q:"Ta stratégie de débogage WiFi ?",opts:[
  {t:"Éteindre et rallumer",s:{r:1,a:0,c:0,l:1}},
  {t:"Vérifier les logs du routeur",s:{r:0,a:0,c:2,l:2}},
  {t:"Accuser Chrome",s:{r:2,a:0,c:0,l:0}},
  {t:"Le WiFi va bien. Le mot de passe est password123.",s:{r:1,a:0,c:1,l:0}},
]},
{q:"Précision de l'IA : qu'est-ce qui est acceptable ?",opts:[
  {t:"98% minimum",s:{r:0,a:3,c:0,l:1}},
  {t:"Si ça marche plus de la moitié du temps, on déploie",s:{r:2,a:0,c:0,l:0}},
  {t:"La précision est une construction sociale",s:{r:1,a:0,c:0,l:0}},
  {t:"Ce que teachable-machine me donne, je prends",s:{r:0,a:2,c:0,l:1}},
]},
{q:"Fer à souder : ami ou ennemi ?",opts:[
  {t:"Ami ! 350°C de possibilités !",s:{r:3,a:0,c:0,l:1}},
  {t:"Ennemi. Je me suis brûlé. Littéralement.",s:{r:1,a:0,c:0,l:0}},
  {t:"J'utilise la colle chaude pour tout",s:{r:2,a:0,c:0,l:0}},
  {t:"C'est quoi un fer à souder ?",s:{r:0,a:0,c:0,l:0}},
]},
{q:"Bug #42 apparaît dans ton code. Tu :",opts:[
  {t:"Le supprimer immédiatement",s:{r:0,a:0,c:2,l:0}},
  {t:"Enquêter sur son origine",s:{r:0,a:2,c:1,l:2}},
  {t:"L'accepter. Les bugs sont des fonctionnalités.",s:{r:3,a:1,c:0,l:0}},
  {t:"Le mettre en procès",s:{r:1,a:0,c:1,l:1}},
]},
];

let cur=0,answers=new Array(QS.length).fill(-1);

function render(){
  const q=QS[cur];
  document.getElementById('progFill').style.width=((cur/QS.length)*100)+'%';
  document.getElementById('qArea').innerHTML=`
    <div class="q-num">QUESTION ${cur+1} SUR ${QS.length}</div>
    <div class="q-text">${q.q}</div>
    <div class="options">${q.opts.map((o,i)=>`
      <div class="option${answers[cur]===i?' selected':''}" onclick="select(${i})">
        <div class="letter">${'ABCD'[i]}</div>
        <div class="text">${o.t}</div>
      </div>`).join('')}
    </div>`;
  document.getElementById('prevBtn').disabled=cur===0;
  document.getElementById('nextBtn').disabled=answers[cur]<0;
  document.getElementById('nextBtn').textContent=cur===QS.length-1?'VOIR RÉSULTATS →':'SUIV →';
}

function select(i){answers[cur]=i;render()}
function prev(){if(cur>0){cur--;render()}}
function next(){
  if(answers[cur]<0)return;
  if(cur===QS.length-1){showResult();return}
  cur++;render();
}

function showResult(){
  let scores={r:0,a:0,c:0,l:0};
  answers.forEach((a,qi)=>{
    const s=QS[qi].opts[a].s;
    scores.r+=s.r;scores.a+=s.a;scores.c+=s.c;scores.l+=s.l;
  });
  const total=scores.r+scores.a+scores.c+scores.l;
  const max=30;
  const pct=Math.min(100,Math.round((total/max)*100)+15);
  
  const top=Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];
  const matches={r:{e:"🤖",n:"bit-bot",d:"Tu es un maker dans l'âme. Du matériel, des robots, et le courage de faire tomber des trucs des bureaux."},a:{e:"🧠",n:"teachable-machine",d:"Tu es un penseur IA. Des données en entrée, de l'intelligence en sortie. 98% du temps, tu as raison."},c:{e:"🔐",n:"pentest-lab",d:"Tu es une sentinelle numérique. L'esprit sécurité, le souci du détail, et très inquiet pour password123."},l:{e:"🐧",n:"linux-kids-lab",d:"Tu es un apprenant et un bâtisseur. La ligne de commande, la doc, et la joie de comprendre."}};
  const m=matches[top];
  
  let vt="";
  if(pct>=90)vt="COMPATIBILITÉ PARFAITE ! Tu ES Workshop-DIY.";
  else if(pct>=70)vt="Très compatible ! Bienvenue à bord.";
  else if(pct>=50)vt="Bon potentiel ! Avec du café, tout est possible.";
  else vt="Tu as peut-être besoin de plus de café. Réessaie.";

  document.getElementById('game').style.display='none';
  const r=document.getElementById('result');
  r.classList.add('show');
  document.getElementById('pct').textContent=pct+'%';
  document.getElementById('verdict').textContent=vt;
  document.getElementById('matchEmoji').textContent=m.e;
  document.getElementById('match').innerHTML=`Ton app totem : <b style="color:#ff0066">${m.n}</b><br>${m.d}`;
}

function restart(){
  cur=0;answers=new Array(QS.length).fill(-1);
  document.getElementById('result').classList.remove('show');
  document.getElementById('game').style.display='block';
  render();
}

render();
</script>

<script src="../../assets/js/sada-footer.js?v=2"></script>
<script src="../../assets/js/sada-nav.js"></script>
</body>
</html>
