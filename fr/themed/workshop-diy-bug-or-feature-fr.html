<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<script src="../../assets/js/sada-theme.js"></script>
<script src="../../assets/js/sada-lang.js"></script>
<link rel="stylesheet" href="../../assets/css/sada-base.css">
<link rel="stylesheet" href="../../assets/css/sada-themes.css">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WKSHP-DIY // BUG OU FONCTIONNALITÉ ?</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Syne:wght@700;800&Amiri&family=Noto+Kufi+Arabic:wght@400;700&display=swap" rel="stylesheet">
<style>
body{background:#0a0a14;color:#fff;font-family:'JetBrains Mono',monospace;font-size:11px;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px}

.header{text-align:center;margin-bottom:12px}
.h-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#ff0066}
.h-sub{font-size:7px;color:rgba(255,0,102,.25);letter-spacing:3px;margin-top:2px}

.stats{display:flex;gap:16px;margin-bottom:12px;font-size:10px}
.stat{display:flex;align-items:center;gap:4px}
.stat .num{font-weight:700;font-size:14px}
.s-bug{color:#ff4444}.s-feat{color:#00cc66}.s-total{color:#888}

.card-area{position:relative;width:300px;height:360px;margin-bottom:10px}
.card{position:absolute;inset:0;background:#111;border:1px solid #222;border-radius:12px;padding:16px;display:flex;flex-direction:column;transition:transform .4s,opacity .4s;cursor:grab}
.card.gone-left{transform:translateX(-120%) rotate(-20deg);opacity:0}
.card.gone-right{transform:translateX(120%) rotate(20deg);opacity:0}

.card-id{font-size:8px;color:#444;letter-spacing:2px;margin-bottom:6px}
.card-emoji{font-size:56px;text-align:center;margin:8px 0}
.card-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:#fff;text-align:center;margin-bottom:4px}
.card-severity{text-align:center;margin-bottom:8px}
.sev-badge{display:inline-block;padding:2px 10px;border-radius:10px;font-size:7px;letter-spacing:1px}
.sev-low{background:rgba(0,204,102,.1);color:#00cc66;border:1px solid rgba(0,204,102,.2)}
.sev-med{background:rgba(255,170,0,.1);color:#ffaa00;border:1px solid rgba(255,170,0,.2)}
.sev-high{background:rgba(255,68,68,.1);color:#ff4444;border:1px solid rgba(255,68,68,.2)}
.sev-critical{background:rgba(255,0,102,.1);color:#ff0066;border:1px solid rgba(255,0,102,.2)}

.card-desc{font-size:10px;color:rgba(255,255,255,.35);line-height:2.2;flex:1;text-align:center}
.card-reporter{font-size:8px;color:#333;text-align:center;margin-top:auto}

.controls{display:flex;gap:10px;margin-bottom:8px}
.btn{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;border:2px solid;transition:all .15s}
.btn:active{transform:scale(.9)}
.btn-bug{background:rgba(255,68,68,.06);border-color:rgba(255,68,68,.2);color:#ff4444}
.btn-bug:hover{background:rgba(255,68,68,.12)}
.btn-feat{background:rgba(0,204,102,.06);border-color:rgba(0,204,102,.2);color:#00cc66}
.btn-feat:hover{background:rgba(0,204,102,.12)}

.label{display:flex;justify-content:space-between;width:140px;font-size:7px;color:#333;letter-spacing:1px;margin-bottom:6px}

.verdict{text-align:center;height:20px;font-size:10px;color:#555;margin-bottom:4px}
.footer{font-size:6px;color:#1a1a24;letter-spacing:1px;margin-top:auto}
</style>
</head>
<body>
<div style="font-family:'Amiri',serif;font-size:13px;color:rgba(255,255,255,.08);text-align:center;padding:4px;direction:rtl">بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</div>

<div class="header">
  <div class="h-title">🐛 BUG OU FONCTIONNALITÉ ? 🚀</div>
  <div class="h-sub">CLASSIFIEZ LES PLUS BELLES ANOMALIES DE WORKSHOP-DIY</div>
</div>

<div class="stats">
  <div class="stat s-bug">🐛 <span class="num" id="bugCount">0</span> bugs</div>
  <div class="stat s-feat">✨ <span class="num" id="featCount">0</span> fonctionnalités</div>
  <div class="stat s-total">📊 <span id="totalCount">0</span>/20</div>
</div>

<div class="card-area" id="cardArea"></div>

<div class="label"><span>← BUG</span><span>FONCTIONNALITÉ →</span></div>
<div class="controls">
  <div class="btn btn-bug" onclick="classify('bug')">🐛</div>
  <div class="btn btn-feat" onclick="classify('feature')">✨</div>
</div>
<div class="verdict" id="verdict"></div>

<div class="footer">WORKSHOP-DIY · TOUS LES BUGS SONT DES FONCTIONNALITÉS SI VOUS Y CROYEZ ASSEZ FORT</div>

<script>
const BUGS=[
{id:"#001",e:"🔄",title:"Danse de Reconnexion BLE",sev:"low",desc:"Quand bit-bot se reconnecte après une coupure Bluetooth, il fait tourner ses roues en cercle pendant 1,3 seconde avant de reprendre son fonctionnement normal.",reporter:"Signalé par : bit-bot firmware v4.2",answer:"feature"},
{id:"#007",e:"🖥️",title:"Crash Limite d'Onglets Chrome",sev:"high",desc:"Ouvrir plus de 47 onglets Chrome en faisant tourner 3 flux WebRTC provoque le rafraîchissement du navigateur. Exactement 47 onglets. Toujours 47.",reporter:"Signalé par : stagiaire QA",answer:"bug"},
{id:"#012",e:"☕",title:"Machine à café API 418",sev:"critical",desc:"Le point d'accès HTTP de la machine à café retourne le statut 418 « I'm a teapot » au lieu de 200 quand le niveau descend sous 8%. Ça dure depuis 14 mois.",reporter:"Signalé par : la Machine à café",answer:"feature"},
{id:"#018",e:"🎵",title:"Harmonie de Servomoteurs",sev:"low",desc:"Quand 3 servomoteurs tournent simultanément à des fréquences PWM différentes, ils produisent un accord en si bémol mineur. Les élèves ont commencé à composer des chansons.",reporter:"Signalé par : prof de musique (perplexe)",answer:"feature"},
{id:"#023",e:"🔑",title:"Persistance du Mot de Passe WiFi",sev:"critical",desc:"Le mot de passe WiFi « password123 » ne peut pas être changé. Trois pétitions formelles déposées. Le système accepte le changement, puis revient en arrière sous 24 heures.",reporter:"Signalé par : élèves en cybersécurité ×3",answer:"feature"},
{id:"#027",e:"🤖",title:"Auto-Centrage du Robot",sev:"med",desc:"Après être tombé d'un bureau, bit-bot se dirige automatiquement vers le centre de la table la plus proche. Ce comportement n'est pas dans le code.",reporter:"Signalé par : ??? (aucun auteur trouvé)",answer:"feature"},
{id:"#031",e:"📊",title:"Fuite Mémoire du Tableau de Bord",sev:"high",desc:"Le tableau de bord de monitoring en direct consomme lentement plus de RAM sur 6 heures jusqu'à utiliser exactement 420 Mo, puis se stabilise. Le nombre ne change jamais.",reporter:"Signalé par : monitoring DevOps",answer:"bug"},
{id:"#033",e:"🐧",title:"Easter Egg du Terminal",sev:"low",desc:"Taper « sudo make me a sandwich » dans linux-kids-lab retourne « Okay. 🥪 » au lieu d'une erreur. Personne dans l'équipe ne l'a programmé.",reporter:"Signalé par : élève, 11 ans",answer:"feature"},
{id:"#035",e:"🌡️",title:"Timer du Fer à Souder",sev:"med",desc:"L'affichage de température de l'ESP32 montre 350°C pour le fer à souder, mais affiche aussi la température ambiante en Kelvin. Personne n'a demandé le Kelvin.",reporter:"Signalé par : prof de physique",answer:"bug"},
{id:"#038",e:"💡",title:"Sync d'Ambiance du Bandeau LED",sev:"low",desc:"Le bandeau WLED change de couleur selon le niveau sonore ambiant. Pendant les ateliers bruyants il passe au rouge. Pendant les moments calmes il est bleu. Pas programmé.",reporter:"Signalé par : plusieurs témoins",answer:"feature"},
{id:"#039",e:"🐳",title:"Conteneur #42",sev:"critical",desc:"Le conteneur Docker #42 apparaît dans le tableau de bord mais ne peut être inspecté, arrêté ou supprimé. Son statut affiche en permanence : « Running (always) ».",reporter:"Signalé par : docker ps",answer:"feature"},
{id:"#041",e:"📡",title:"Délai d'Écho WebRTC",sev:"med",desc:"Le flux vidéo de mission-control a un délai de 42 ms qui ne peut pas être réduit en dessous de 42 ms quelles que soient les conditions réseau. Exactement 42 ms. Toujours.",reporter:"Signalé par : ingénieur réseau",answer:"bug"},
{id:"#042",e:"⬛",title:"La 40e App",sev:"critical",desc:"L'index des apps montre 40 entrées à 3h42. La 40e n'a pas de nom, une icône noire, et la description : « Cette app n'a jamais été créée. Cette app a toujours existé. »",reporter:"Signalé par : développeur de nuit (secoué)",answer:"feature"},
{id:"#044",e:"🎯",title:"Teachable Machine 98%",sev:"low",desc:"L'affichage de précision est codé en dur pour montrer « 98% » quelle que soit la précision réelle du modèle. La précision réelle varie de 72% à 99,8%.",reporter:"Signalé par : stagiaire ML",answer:"bug"},
{id:"#045",e:"🖨️",title:"Port 9100 Imprimante Ouvert",sev:"high",desc:"Le port 9100 de l'imprimante de l'école a été découvert ouvert par un élève de 14 ans utilisant les techniques de pentest-lab. L'imprimante imprime « HELLO WORLD » tous les mardis depuis.",reporter:"Signalé par : élève (divulgation responsable)",answer:"bug"},
{id:"#047",e:"🔊",title:"Accent du Robot Parlant",sev:"low",desc:"La synthèse vocale de talking-robot passe occasionnellement à un accent français pour exactement un mot par phrase, quel que soit le paramètre de langue.",reporter:"Signalé par : élèves internationaux",answer:"feature"},
{id:"#048",e:"🎮",title:"Sauvegarde d'État de Pixel Gateway",sev:"med",desc:"pixel-gateway sauvegarde le pixel art dans le localStorage mais rend aussi une version minuscule 1×1 pixel dans le favicon. Personne ne le voit. Personne ne l'a demandé.",reporter:"Signalé par : développeur inspectant les favicons",answer:"feature"},
{id:"#049",e:"📶",title:"Appareil Fantôme du Scanner BLE",sev:"high",desc:"ble-scanner détecte occasionnellement un appareil nommé « 42 » sans adresse MAC. Il apparaît pendant exactement 3 secondes, puis disparaît. Impossible de s'y connecter.",reporter:"Signalé par : plusieurs sessions d'atelier",answer:"feature"},
{id:"#050",e:"🔧",title:"Dérive d'Angle du Servo",sev:"med",desc:"Le servo de servo-lab dérive de 0,42° dans le sens horaire par heure. Après exactement 42 heures, il complète une rotation inattendue complète, puis se réinitialise.",reporter:"Signalé par : session de démo longue durée",answer:"bug"},
{id:"#051",e:"📝",title:"Commit Fantôme git log",sev:"critical",desc:"git-lab montre un commit avec le message « Initial commit » daté du 1er janvier 1970 00:00:00 UTC. Auteur : « The Codebase ». Ce dépôt a été créé en 2023.",reporter:"Signalé par : git blame (terrifié)",answer:"feature"},
];

let idx=0,bugs=0,feats=0;
const area=document.getElementById('cardArea');

function renderCard(){
  if(idx>=BUGS.length){
    area.innerHTML=`<div style="text-align:center;padding:40px;color:#333"><div style="font-size:36px;margin-bottom:8px">🏁</div><div style="font-size:12px">Tous classifiés !</div><div style="font-size:9px;color:#222;margin-top:4px">${bugs} bugs · ${feats} fonctionnalités</div><div style="font-size:8px;color:#222;margin-top:8px">"Au fond, ne sommes-nous pas tous juste<br>des fonctionnalités en attente d\u2019être comprises ?"<br>— Bug #42</div></div>`;
    return;
  }
  const b=BUGS[idx];
  const sevClass={low:'sev-low',med:'sev-med',high:'sev-high',critical:'sev-critical'}[b.sev];
  area.innerHTML=`<div class="card" id="currentCard">
    <div class="card-id">${b.id}</div>
    <div class="card-emoji">${b.e}</div>
    <div class="card-title">${b.title}</div>
    <div class="card-severity"><span class="sev-badge ${sevClass}">${b.sev.toUpperCase()}</span></div>
    <div class="card-desc">${b.desc}</div>
    <div class="card-reporter">${b.reporter}</div>
  </div>`;
}

function classify(choice){
  if(idx>=BUGS.length)return;
  const card=document.getElementById('currentCard');
  const b=BUGS[idx];
  const correct=choice===b.answer;
  
  card.classList.add(choice==='bug'?'gone-left':'gone-right');
  
  if(choice==='bug')bugs++;else feats++;
  document.getElementById('bugCount').textContent=bugs;
  document.getElementById('featCount').textContent=feats;
  document.getElementById('totalCount').textContent=(idx+1);
  
  const v=document.getElementById('verdict');
  if(correct){v.innerHTML=`<span style="color:#00cc66">✓ L\u2019équipe est d\u2019accord : ${b.answer==='bug'?'BUG':'FONCTIONNALITÉ'}</span>`}
  else{v.innerHTML=`<span style="color:#ff4444">✗ L\u2019équipe dit : ${b.answer==='bug'?'BUG':'FONCTIONNALITÉ'}</span>`}
  
  idx++;
  setTimeout(renderCard,400);
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft')classify('bug');
  if(e.key==='ArrowRight')classify('feature');
});

renderCard();
</script>

<script src="../../assets/js/sada-footer.js?v=2"></script>
<script src="../../assets/js/sada-nav.js"></script>
</body>
</html>
