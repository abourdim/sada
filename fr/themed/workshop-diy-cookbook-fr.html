<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<script src="../../assets/js/sada-theme.js"></script>
<script src="../../assets/js/sada-lang.js"></script>
<link rel="stylesheet" href="../../assets/css/sada-base.css">
<link rel="stylesheet" href="../../assets/css/sada-themes.css">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WKSHP-DIY // LIVRE DE RECETTES</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,400&family=Syne:wght@700;800&Amiri&display=swap" rel="stylesheet">
<style>
body{background:#0e0e14;color:#ddd;font-family:'JetBrains Mono',monospace;font-size:11px;min-height:100vh;padding:16px}

.header{text-align:center;margin-bottom:16px}
.h-title{font-family:'Playfair Display',serif;font-size:clamp(22px,5vw,34px);font-weight:700;color:#ffd700}
.h-sub{font-size:7px;color:#555;letter-spacing:3px;margin-top:2px}

.recipes{max-width:700px;margin:0 auto;display:flex;flex-direction:column;gap:12px}

.recipe{border:1px solid #1a1a24;border-radius:8px;overflow:hidden;background:#111118;transition:all .2s}
.recipe:hover{border-color:#2a2a34}

.rec-header{padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
.rec-emoji{font-size:28px;flex-shrink:0}
.rec-info{flex:1}
.rec-name{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:#ffd700}
.rec-tagline{font-size:8px;color:#666;font-style:italic;margin-top:1px}
.rec-meta{display:flex;gap:8px;margin-top:4px}
.rec-meta span{font-size:7px;color:#555;display:flex;align-items:center;gap:2px}
.rec-arrow{color:#444;font-size:14px;transition:transform .2s}
.recipe.open .rec-arrow{transform:rotate(90deg)}

.rec-body{display:none;padding:0 14px 14px;border-top:1px solid #1a1a24}
.recipe.open .rec-body{display:block;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.rec-cols{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
@media(max-width:500px){.rec-cols{grid-template-columns:1fr}}

.rec-col h3{font-size:9px;color:#ffd700;letter-spacing:2px;margin-bottom:6px;padding-bottom:3px;border-bottom:1px solid #1a1a24}
.ingredient{display:flex;gap:4px;padding:2px 0;font-size:9px;color:#888}
.ingredient .qty{color:#ffd700;font-weight:700;width:50px;flex-shrink:0}
.step{display:flex;gap:6px;padding:4px 0;font-size:9px;color:#888;line-height:1.9}
.step-num{color:#ffd700;font-weight:700;flex-shrink:0;width:16px}

.rec-tip{margin-top:8px;padding:6px 8px;background:rgba(255,215,0,.02);border:1px solid rgba(255,215,0,.06);border-radius:4px;font-size:8px;color:#776633;line-height:1.8}
.rec-tip b{color:#ffd700}

.difficulty{display:flex;gap:1px}
.diff-dot{width:8px;height:8px;border-radius:50%;border:1px solid #333}
.diff-dot.on{background:#ffd700;border-color:#ffd700}

.footer{text-align:center;margin-top:20px;font-size:6px;color:#222;letter-spacing:2px;line-height:2.2}
</style>
</head>
<body>
<div style="font-family:'Amiri',serif;font-size:13px;color:rgba(0,0,0,.06);text-align:center;padding:4px;direction:rtl">بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</div>

<div class="header">
  <div class="h-title">Le Livre de Recettes WKSHP</div>
  <div class="h-sub">RECETTES TECH POUR MAKERS AFFAMÉS</div>
</div>

<div class="recipes" id="recipes"></div>

<div class="footer">
  DIVISION CULINAIRE WORKSHOP-DIY · AUCUNE VRAIE NOURRITURE IMPLIQUÉE<br>
  EFFETS SECONDAIRES POSSIBLES : APPRENTISSAGE, ENTHOUSIASME, ET EXPLIQUER DOCKER À VOS PARENTS
</div>

<script>
const RECIPES=[
{emoji:"🤖",name:"Contrôleur de Robot Classique",tagline:"Un robot connecté en Bluetooth en moins de 30 minutes",time:"30 min",serves:"1 robot",diff:2,
ingredients:[
  {q:"1",i:"microcontrôleur ESP32-WROOM-32"},
  {q:"2",i:"moteurs DC N20 avec roues"},
  {q:"1",i:"driver moteur DRV8833 pont en H"},
  {q:"1",i:"micro servo SG90"},
  {q:"2",i:"capteurs IR suiveurs de ligne TCRT5000"},
  {q:"1",i:"capteur ultrasonique HC-SR04"},
  {q:"1",i:"batterie LiPo 18650 3,7V"},
  {q:"1 trait",i:"colle chaude (quantité généreuse)"},
  {q:"∞",i:"patience"},
],steps:[
  "Préchauffez votre fer à souder à 350°C. Laissez-le monter en température pendant que vous disposez les composants.",
  "Connectez l'ESP32 au driver moteur DRV8833. Pin GPIO12 → AIN1, GPIO13 → AIN2, GPIO14 → BIN1, GPIO15 → BIN2.",
  "Fixez les moteurs au châssis. Appliquez la colle chaude généreusement. C'est de l'ingénierie, pas de l'art.",
  "Câblez les capteurs IR aux GPIO32 et GPIO33. Ce sont les yeux de votre robot pour le suivi de ligne.",
  "Montez le capteur ultrasonique sur le servo. Connectez Trig → GPIO26, Echo → GPIO27, Servo → GPIO25.",
  "Branchez la batterie via l'interrupteur. Vérifiez la polarité deux fois. Trois fois.",
  "Flashez le firmware bit-bot via USB. Ouvrez Chrome. Allez sur l'app bit-bot. Appairez via BLE.",
  "Lâchez du bureau pour tester la durabilité. Répétez 46 fois de plus. (C'est une blague. Presque.)",
],tip:"Conseil du chef : Si le robot tourne en rond, ce n'est pas un bug — c'est une fonctionnalité. Vérifiez aussi le câblage des moteurs."},

{emoji:"🧠",name:"Modèle IA de Gestes Frais",tagline:"Entraînez un modèle ML personnalisé — zéro installation nécessaire",time:"15 min",serves:"1 modèle",diff:1,
ingredients:[
  {q:"1",i:"navigateur (Chrome recommandé)"},
  {q:"1",i:"webcam (720p minimum)"},
  {q:"3+",i:"classes de gestes à entraîner"},
  {q:"30+",i:"images d'exemple par classe"},
  {q:"1",i:"app teachable-machine"},
  {q:"1",i:"micro:bit (optionnel, pour la sortie)"},
],steps:[
  "Ouvrez teachable-machine dans Chrome. Autorisez l'accès à la caméra quand demandé.",
  "Définissez vos classes de gestes : ex. « Pouce en l'air », « Main ouverte », « Poing ». Nommez-les clairement.",
  "Pour chaque classe, maintenez la pose et capturez 30+ images d'entraînement. Variez légèrement l'angle.",
  "Cliquez sur « Entraîner le modèle ». Attendez environ 15 secondes pendant que TensorFlow.js fait sa magie.",
  "Testez le modèle en direct. Montrez chaque geste et vérifiez que les scores de confiance dépassent 90%.",
  "Exportez vers micro:bit via BLE : Associez chaque geste à une action robot (avancer, stop, danser).",
],tip:"Conseil du chef : Un bon éclairage est l'ingrédient secret. Une pièce sombre vous donnera un modèle à moitié cuit. Et 98% de précision signifie que c'est prêt — ne le faites pas trop cuire."},

{emoji:"🔐",name:"Test de Pénétration Épicé",tagline:"Hacking éthique — servi en bac à sable",time:"45 min",serves:"1 hacker éthique",diff:3,
ingredients:[
  {q:"1",i:"app pentest-lab (en bac à sable)"},
  {q:"1",i:"esprit curieux"},
  {q:"1 tasse",i:"connaissances SQL de base"},
  {q:"2 c.s.",i:"compréhension du XSS"},
  {q:"1 pincée",i:"théorie de l'ingénierie sociale"},
  {q:"0",i:"intention malveillante (important : ZÉRO)"},
],steps:[
  "Ouvrez pentest-lab dans le navigateur. Lisez les règles. Comprenez : c'est éthique uniquement.",
  "Commencez par le challenge d'injection SQL. Essayez les payloads classiques : ' OR 1=1 --",
  "Passez au XSS. Tentez d'injecter une balise script dans le champ de saisie vulnérable.",
  "Attaquez le challenge CSRF. Comprenez comment les tokens empêchent la falsification inter-sites.",
  "Essayez le labo d'escalade de privilèges. Pouvez-vous accéder aux fonctions admin ?",
  "Documentez vos découvertes. Un hacker responsable écrit toujours un rapport.",
  "N'essayez RIEN de tout ça sur de vrais systèmes. L'incident de l'imprimante de l'école a suffi.",
],tip:"Conseil du chef : Si vous trouvez une vraie vulnérabilité, signalez-la de manière responsable. Rappelez-vous : la différence entre un hacker et un criminel, c'est le consentement et la documentation."},

{emoji:"🐧",name:"Terminal Linux Fait Maison",tagline:"Des commandes bash fraîches servies dans un navigateur",time:"20 min",serves:"1 ninja du terminal",diff:2,
ingredients:[
  {q:"1",i:"app linux-kids-lab"},
  {q:"1",i:"envie de taper au clavier"},
  {q:"10+",i:"commandes bash à apprendre"},
  {q:"1",i:"système de fichiers virtuel"},
  {q:"0",i:"peur de la ligne de commande"},
],steps:[
  "Ouvrez linux-kids-lab. Observez le curseur clignotant. C'est votre nouveau chez-vous.",
  "Tapez 'ls' pour lister les fichiers. Puis 'ls -la' pour voir les fichiers cachés. Ressentez le pouvoir.",
  "Naviguez avec 'cd'. Créez des fichiers avec 'touch'. Créez des dossiers avec 'mkdir'.",
  "Lisez des fichiers avec 'cat'. Cherchez avec 'grep'. Enchaînez les commandes avec des pipes : 'ls | grep .txt'",
  "Maîtrisez les permissions avec 'chmod'. Comprenez utilisateur/groupe/autres. Sentez-vous sysadmin.",
  "Essayez 'man' pour les pages d'aide. Les vrais hackers lisent le manuel. Parfois.",
  "NE tapez PAS 'rm -rf /'. La simulation survivra, mais pas votre dignité.",
],tip:"Conseil du chef : Les alias sont l'étagère à épices du terminal. Configurez 'alias ll=\"ls -la\"' et ne regardez jamais en arrière."},

{emoji:"🐳",name:"Stack Docker Conteneurisée",tagline:"Des micro-services pour jeunes chefs",time:"25 min",serves:"∞ conteneurs",diff:3,
ingredients:[
  {q:"1",i:"app docker-lab"},
  {q:"1",i:"Dockerfile"},
  {q:"1",i:"docker-compose.yml"},
  {q:"3+",i:"services à orchestrer"},
  {q:"1",i:"compréhension basique du YAML"},
  {q:"1 tasse",i:"courage pour expliquer ça à vos parents"},
],steps:[
  "Ouvrez docker-lab. Comprenez le concept : des apps dans des boîtes. Les boîtes sont isolées. Les boîtes c'est bien.",
  "Écrivez votre premier Dockerfile : FROM node:18, COPY . ., RUN npm install, CMD node app.js",
  "Construisez l'image : 'docker build -t my-app .'  — Regardez les couches s'empiler comme un mille-feuille.",
  "Lancez le conteneur : 'docker run -p 3000:3000 my-app' — Votre app est maintenant conteneurisée.",
  "Créez docker-compose.yml avec 3 services : web, api, base de données. Définissez les réseaux et volumes.",
  "Lancez 'docker-compose up' et regardez votre architecture micro-services prendre vie.",
  "Expliquez-le au dîner. Observez l'expression de votre parent ingénieur logiciel changer.",
],tip:"Conseil du chef : Si votre conteneur ne démarre pas, consultez les logs avec 'docker logs'. L'erreur est toujours dans les logs. Toujours."},

{emoji:"💡",name:"Bandeau LED Arc-en-ciel",tagline:"16 millions de couleurs, une requête HTTP à la fois",time:"15 min",serves:"1 bandeau LED",diff:1,
ingredients:[
  {q:"1",i:"ESP32 avec firmware WLED"},
  {q:"1",i:"bandeau WS2812B Neopixel (30-60 LEDs)"},
  {q:"1",i:"résistance 330Ω (ligne de données)"},
  {q:"1",i:"condensateur 1000µF (lissage)"},
  {q:"1",i:"alimentation 5V 2A"},
  {q:"1",i:"app wled-kids-lab"},
],steps:[
  "Flashez le firmware WLED sur l'ESP32. Connectez-vous au WiFi WLED-AP pour configurer.",
  "Câblez le bandeau Neopixel : 5V → alimentation, GND → masse, DIN → GPIO2 (à travers la résistance 330Ω).",
  "Ajoutez le condensateur 1000µF sur les lignes d'alimentation. Ça protège contre les pics de tension.",
  "Ouvrez wled-kids-lab. Connectez-vous à l'adresse IP de l'ESP32. Les contrôles LED apparaissent.",
  "Choisissez une couleur. Regardez tout le bandeau s'allumer. Essayez l'effet arc-en-ciel défilant.",
  "Créez des animations personnalisées. Programmez des horaires. Synchronisez avec la musique si vous êtes aventureux.",
],tip:"Conseil du chef : Ne connectez jamais plus de 60 LEDs sans un point d'injection d'alimentation séparé. Et la résistance n'est PAS optionnelle — le premier pixel de vos LEDs vous remerciera."},
];

const container=document.getElementById('recipes');
RECIPES.forEach((r,idx)=>{
  const diffDots=Array(5).fill(0).map((_,i)=>`<div class="diff-dot${i<r.diff?' on':''}"></div>`).join('');
  container.innerHTML+=`<div class="recipe" id="rec${idx}">
    <div class="rec-header" onclick="toggle(${idx})">
      <div class="rec-emoji">${r.emoji}</div>
      <div class="rec-info">
        <div class="rec-name">${r.name}</div>
        <div class="rec-tagline">${r.tagline}</div>
        <div class="rec-meta"><span>⏱ ${r.time}</span><span>🍽 ${r.serves}</span><span>Difficulté: </span><span><div class="difficulty">${diffDots}</div></span></div>
      </div>
      <div class="rec-arrow">▶</div>
    </div>
    <div class="rec-body">
      <div class="rec-cols">
        <div class="rec-col"><h3>INGRÉDIENTS</h3>${r.ingredients.map(i=>`<div class="ingredient"><span class="qty">${i.q}</span><span>${i.i}</span></div>`).join('')}</div>
        <div class="rec-col"><h3>PRÉPARATION</h3>${r.steps.map((s,j)=>`<div class="step"><span class="step-num">${j+1}.</span><span>${s}</span></div>`).join('')}</div>
      </div>
      <div class="rec-tip"><b>💡 ${r.tip}</b></div>
    </div>
  </div>`;
});

function toggle(i){document.getElementById('rec'+i).classList.toggle('open')}
</script>
<script src="../../assets/js/sada-footer.js?v=2"></script>
<script src="../../assets/js/sada-nav.js"></script>
</body>
</html>
