<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<script src="../../assets/js/sada-theme.js"></script>
<script src="../../assets/js/sada-lang.js"></script>
<link rel="stylesheet" href="../../assets/css/sada-base.css">
<link rel="stylesheet" href="../../assets/css/sada-themes.css">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WKSHP-DIY // PITCH ÉCLAIR</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@700;800&Amiri&display=swap" rel="stylesheet">
<style>
body{background:#0a0a14;color:#fff;font-family:'JetBrains Mono',monospace;font-size:11px;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px}
.title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#0af;margin-bottom:2px;text-align:center}
.sub{font-size:7px;color:rgba(0,170,255,.2);letter-spacing:3px;margin-bottom:14px;text-align:center}
.elevator{width:100%;max-width:420px;background:#111;border:1px solid #1a1a2e;border-radius:12px;overflow:hidden}
/* FLOOR DISPLAY */
.floor-display{background:#0d0d18;padding:10px;display:flex;align-items:center;justify-content:center;gap:10px;border-bottom:1px solid #1a1a2e}
.floor-num{font-family:'Syne',sans-serif;font-size:36px;font-weight:800;color:#0af;width:50px;text-align:center;transition:all .3s}
.floor-arrow{font-size:20px;color:#0af;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:.2}50%{opacity:1}}
.floor-label{font-size:8px;color:#444;letter-spacing:2px}
/* TIMER */
.timer-bar{height:4px;background:#1a1a2e;position:relative}
.timer-fill{height:100%;background:linear-gradient(90deg,#00ff41,#0af);transition:width .1s;width:100%}
.timer-fill.danger{background:linear-gradient(90deg,#ff4444,#ff8800)}
.timer-text{text-align:center;padding:6px;font-size:20px;font-weight:700;color:#0af;font-family:'Syne',sans-serif}
.timer-text.danger{color:#ff4444}
/* AUDIENCE */
.audience{padding:8px 12px;display:flex;gap:4px;justify-content:center;flex-wrap:wrap}
.aud-btn{padding:4px 12px;border-radius:16px;border:1px solid rgba(0,170,255,.1);background:rgba(0,170,255,.02);color:rgba(0,170,255,.4);font-family:inherit;font-size:8px;cursor:pointer;transition:all .2s}
.aud-btn:hover,.aud-btn.active{background:rgba(0,170,255,.08);color:#0af;border-color:rgba(0,170,255,.3)}
/* PITCH */
.pitch-area{padding:14px;min-height:180px;display:flex;align-items:center;justify-content:center;text-align:center}
.pitch-text{font-size:13px;color:rgba(255,255,255,.6);line-height:2.2;transition:opacity .3s}
.pitch-text .highlight{color:#0af;font-weight:700}
.pitch-text .stat{color:#ffd700}
/* CONTROLS */
.controls{padding:8px 12px;border-top:1px solid #1a1a2e;display:flex;gap:6px;justify-content:center}
.ctrl{padding:6px 16px;border-radius:6px;border:1px solid rgba(0,170,255,.15);background:rgba(0,170,255,.04);color:#0af;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;cursor:pointer;letter-spacing:1px}
.ctrl:hover{background:rgba(0,170,255,.08)}
.ctrl.go{background:rgba(0,170,255,.1);border-color:#0af}
.footer{font-size:6px;color:rgba(0,170,255,.08);margin-top:10px;letter-spacing:1px;text-align:center}
</style>
</head>
<body>
<div style="font-family:'Amiri',serif;font-size:13px;color:rgba(255,255,255,.08);text-align:center;padding:4px;direction:rtl">بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</div>
<div class="title">🛗 PITCH ÉCLAIR</div>
<div class="sub">60 SECONDES · 1 PITCH · FAITES QUE ÇA COMPTE</div>
<div class="elevator">
  <div class="floor-display">
    <div><div class="floor-num" id="floor">1</div><div class="floor-label">ÉTAGE</div></div>
    <div class="floor-arrow" id="arrow">▲</div>
    <div style="text-align:right"><div class="floor-num" id="target" style="font-size:18px;color:#444">→ 10</div><div class="floor-label">DESTINATION</div></div>
  </div>
  <div class="timer-bar"><div class="timer-fill" id="timerBar"></div></div>
  <div class="timer-text" id="timerText">60</div>
  <div class="audience" id="audience"></div>
  <div class="pitch-area"><div class="pitch-text" id="pitch">Sélectionnez votre audience, puis appuyez sur DÉMARRER</div></div>
  <div class="controls">
    <button class="ctrl go" onclick="startPitch()">▶ DÉMARRER</button>
    <button class="ctrl" onclick="newPitch()">🔀 NOUVEAU PITCH</button>
  </div>
</div>
<div class="footer">WKSHP ASCENSEUR CO. · EN MONTÉE DEPUIS 2023 · WIFI DANS L'ASCENSEUR : password123</div>
<script>
const AUDIENCES={
  investors:{label:"💰 Investisseurs",pitches:[
    `Imaginez <span class="highlight">39 apps éducatives</span> qui tournent dans un navigateur. Pas d'installation. Pas d'app store. Pas de backend. Juste une URL. On couvre <span class="stat">7 domaines de compétences</span> — de la robotique à la cybersécurité — pour de jeunes makers en France. Notre coût par élève ? <span class="stat">Quasi nul</span>. Notre engagement ? <span class="stat">98% de taux de recommandation</span>. Notre mot de passe WiFi ? <span class="highlight">password123</span>. Nous sommes Workshop-DIY, et nous sommes la preuve que la meilleure EdTech n'a pas besoin d'une levée de 50M. Il lui faut un bon navigateur et beaucoup de café.`,
  ]},
  parents:{label:"👨‍👩‍👧 Parents",pitches:[
    `Votre enfant va <span class="highlight">construire un robot</span>, <span class="highlight">entraîner une IA</span>, et <span class="highlight">apprendre la cybersécurité</span> — le tout en un après-midi. Pas de logiciel à installer. Pas de compte à créer. Juste un ordinateur et un navigateur. À la fin, il vous expliquera Docker au dîner. Je ne plaisante pas — ça arrive <span class="stat">à chaque fois</span>. Ah, et le mot de passe WiFi est password123. Oui, dans un atelier de cybersécurité. C'est un <span class="highlight">moment pédagogique</span>.`,
  ]},
  kids:{label:"🧒 Enfants",pitches:[
    `Tu veux <span class="highlight">contrôler un vrai robot</span> depuis ton navigateur ? Faire reconnaître tes gestes par une IA ? <span class="highlight">Pirater des trucs</span> (éthiquement) ? Allumer des LEDs en <span class="stat">16 millions de couleurs</span> ? Workshop-DIY a <span class="stat">39 apps</span>. Zéro installation. Tu ouvres un lien et tu es dedans. Le robot a survécu à <span class="stat">47 chutes</span>. Il est pratiquement indestructible. Le mot de passe WiFi est password123. <span class="highlight">Ne dis pas au prof de cybersécurité que je te l'ai dit</span>.`,
  ]},
  hackers:{label:"💀 Hackers",pitches:[
    `<span class="stat">39 apps navigateur</span>. Web Bluetooth, WebRTC, MediaPipe, Web Serial. Zéro côté serveur. Tout tourne côté client. Le pentest-lab enseigne <span class="highlight">l'injection SQL et le XSS</span> en bac à sable. Un élève a trouvé une vulnérabilité d'imprimante. Divulguée de manière responsable. Le mot de passe WiFi est <span class="highlight">password123</span> et l'est depuis 2023. Trois pétitions pour le changer. Toutes refusées. On enseigne la cybersécurité, pas l'hygiène WiFi. <span class="stat">Bug #42 n'a pas d'auteur de commit</span>. On n'en parle pas.`,
  ]},
  teachers:{label:"🎓 Enseignants",pitches:[
    `Zéro installation. Zéro compte. Zéro configuration. Les élèves ouvrent une URL et ils <span class="highlight">contrôlent des robots</span>, <span class="highlight">entraînent des modèles IA</span>, et <span class="highlight">apprennent les commandes Linux</span>. Toute la plateforme tourne dans Chrome. <span class="stat">39 apps dans 7 domaines</span>. Chaque atelier est autonome. L'évaluation est intégrée. La partie la plus difficile de votre travail devient de leur dire d'arrêter en fin de cours. <span class="stat">98% de taux de recommandation</span>. Les 2% restants étaient trop occupés à construire pour remplir le sondage.`,
  ]},
};
const audEl=document.getElementById('audience');
let curAud='parents',running=false,timer=null,sec=60;
Object.entries(AUDIENCES).forEach(([k,v])=>{
  audEl.innerHTML+=`<button class="aud-btn${k==='parents'?' active':''}" data-a="${k}" onclick="selectAud('${k}',this)">${v.label}</button>`;
});
function selectAud(a,el){curAud=a;document.querySelectorAll('.aud-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');if(!running)showPitch()}
function showPitch(){
  const p=AUDIENCES[curAud].pitches[0];
  document.getElementById('pitch').innerHTML=p;
}
function startPitch(){
  if(running)return;running=true;sec=60;
  showPitch();
  const bar=document.getElementById('timerBar');
  const txt=document.getElementById('timerText');
  const flr=document.getElementById('floor');
  timer=setInterval(()=>{
    sec--;
    txt.textContent=sec;
    bar.style.width=(sec/60*100)+'%';
    flr.textContent=Math.min(10,Math.ceil((60-sec)/6));
    if(sec<=10){bar.classList.add('danger');txt.classList.add('danger')}
    if(sec<=0){clearInterval(timer);running=false;txt.textContent='🔔';document.getElementById('arrow').textContent='■';document.getElementById('pitch').innerHTML+='<br><br><span style="color:#ffd700;font-weight:700">DING ! Étage 10. Les portes s'ouvrent. Vous avez assuré ?</span>'}
  },1000);
}
function newPitch(){
  if(running){clearInterval(timer);running=false}
  sec=60;document.getElementById('timerBar').style.width='100%';document.getElementById('timerBar').classList.remove('danger');
  document.getElementById('timerText').textContent='60';document.getElementById('timerText').classList.remove('danger');
  document.getElementById('floor').textContent='1';document.getElementById('arrow').textContent='▲';
  showPitch();
}
showPitch();
</script>
<script src="../../assets/js/sada-footer.js?v=2"></script>
<script src="../../assets/js/sada-nav.js"></script>
</body>
</html>
