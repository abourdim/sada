<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<script src="../../assets/js/sada-theme.js"></script>
<script src="../../assets/js/sada-lang.js"></script>
<link rel="stylesheet" href="../../assets/css/sada-base.css">
<link rel="stylesheet" href="../../assets/css/sada-themes.css">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WKSHP-DIY // HOROSCOPE TECH</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@700;800&family=Playfair+Display:ital,wght@0,700;1,400&Amiri&display=swap" rel="stylesheet">
<style>
body{background:#05050a;color:#fff;font-family:'JetBrains Mono',monospace;font-size:11px;overflow-x:hidden}
.stars{position:fixed;inset:0;z-index:0}
.star{position:absolute;width:1px;height:1px;background:#fff;border-radius:50%}

.content{position:relative;z-index:1;max-width:700px;margin:0 auto;padding:16px}

.header{text-align:center;padding:20px 0 12px}
.h-pre{font-size:7px;color:rgba(191,0,255,.3);letter-spacing:4px}
.h-title{font-family:'Playfair Display',serif;font-size:clamp(24px,5vw,36px);font-weight:700;background:linear-gradient(135deg,#bf00ff,#ffd700,#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.h-date{font-size:8px;color:rgba(255,255,255,.15);margin-top:2px;letter-spacing:2px}

/* FORTUNE */
.fortune{text-align:center;margin:12px 0;padding:12px;border:1px solid rgba(191,0,255,.06);border-radius:8px;background:rgba(191,0,255,.01);cursor:pointer;transition:all .2s}
.fortune:hover{border-color:rgba(191,0,255,.12)}
.fortune-emoji{font-size:28px;margin-bottom:4px}
.fortune-text{font-family:'Playfair Display',serif;font-style:italic;font-size:13px;color:rgba(255,215,0,.5);line-height:1.8}
.fortune-tip{font-size:7px;color:rgba(255,255,255,.1);margin-top:4px}

/* SIGNS GRID */
.signs{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:8px;margin-top:12px}
.sign{border:1px solid rgba(191,0,255,.04);border-radius:8px;padding:12px;background:rgba(191,0,255,.005);transition:all .2s;cursor:default}
.sign:hover{border-color:rgba(191,0,255,.12);background:rgba(191,0,255,.01)}
.sign-h{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.sign-emoji{font-size:28px;filter:drop-shadow(0 2px 6px rgba(191,0,255,.15))}
.sign-name{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:#ffd700}
.sign-dates{font-size:7px;color:rgba(255,255,255,.15)}
.sign-reading{font-size:10px;color:rgba(255,255,255,.35);line-height:2;margin-bottom:6px}
.sign-stats{display:flex;gap:8px;flex-wrap:wrap}
.sign-stat{font-size:7px;padding:2px 8px;border-radius:10px;border:1px solid rgba(191,0,255,.06);color:rgba(191,0,255,.3)}
.sign-compat{font-size:7px;color:rgba(255,215,0,.2);margin-top:4px}

.footer{font-size:5px;color:rgba(0,136,255,.02);letter-spacing:1px;text-align:center;padding:8px}
</style>
</head>
<body>
<div style="font-family:'Amiri',serif;font-size:13px;color:rgba(255,255,255,.08);text-align:center;padding:4px;direction:rtl">بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</div>
<div class="stars" id="stars"></div>

<div class="content">
<div class="header">
  <div class="h-pre">WORKSHOP-DIY PRÉSENTE</div>
  <div class="h-title">Horoscope Tech</div>
  <div class="h-date" id="dateStr"></div>
</div>

<div class="fortune" id="fortune" onclick="newFortune()">
  <div class="fortune-emoji">🔮</div>
  <div class="fortune-text" id="fortuneText">Cliquez pour recevoir votre fortune tech du jour...</div>
  <div class="fortune-tip">APPUYEZ POUR UNE NOUVELLE FORTUNE</div>
</div>

<div class="signs" id="signs"></div>

<div class="footer">WORKSHOP-DIY</div>
<script>
// Stars
const starsEl=document.getElementById('stars');
for(let i=0;i<150;i++){
  const s=document.createElement('div');s.className='star';
  s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';
  s.style.width=s.style.height=(Math.random()*2+.5)+'px';
  s.style.opacity=Math.random()*.5+.1;
  s.style.animation=`twinkle ${Math.random()*3+2}s ease-in-out infinite ${Math.random()*2}s`;
  starsEl.appendChild(s);
}
const style=document.createElement('style');
style.textContent='@keyframes twinkle{0%,100%{opacity:.1}50%{opacity:.6}}';
document.head.appendChild(style);

// Date
const d=new Date();
document.getElementById('dateStr').textContent=d.toLocaleDateString('fr-FR',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

// FORTUNES
const FORTUNES=[
  "La connexion BLE que vous cherchez est plus proche que vous ne le pensez.",
  "Un bug se révélera aujourd'hui. C'était une fonctionnalité depuis le début.",
  "Mercure est en rétrograde. Vos conteneurs Docker redémarreront de manière inattendue.",
  "L'alignement de votre mot de passe WiFi est fort aujourd'hui. Il reste password123.",
  "Un enfant de 10 ans vous apprendra quelque chose de profond sur la technologie.",
  "Les étoiles indiquent que votre robot dansera aujourd'hui — intentionnellement ou non.",
  "Vos réserves de café sont cosmiquement alignées. Buvez abondamment.",
  "Le chiffre porte-bonheur du jour est 42. C'est toujours le chiffre porte-bonheur.",
  "L'univers murmure : « Avez-vous essayé de l'éteindre et de le rallumer ? »",
  "Une pull request du futur attend votre relecture.",
  "L'ESP32 dans votre maison astrale suggère des expériences matérielles.",
  "Vos messages de commit git seront inhabituellement éloquents aujourd'hui.",
  "Mars entre dans votre zone de débogage. Les breakpoints seront puissants.",
  "Un Segfault sauvage apparaît. C'est en fait... une fonctionnalité.",
  "Le cosmos suggère de ne pas déployer en production aujourd'hui. (C'est vendredi.)",
  "Votre alignement MediaPipe est parfait. Agitez vos mains avec confiance.",
  "Un vieux câble USB refait surface. Chérissez-le.",
  "Les étoiles prédisent exactement 39 bonnes choses qui vous arriveront.",
];

function newFortune(){
  document.getElementById('fortuneText').textContent=FORTUNES[Math.floor(Math.random()*FORTUNES.length)];
}

// SIGNS
const SIGNS=[
{e:"🤖",n:"Le Robot",dates:"1 jan - 14 fév",reading:"Vos servomoteurs sont alignés pour le succès aujourd'hui. Les connexions BLE seront fortes et fiables. Un jeune maker vous demandera de l'aide — partagez vos connaissances généreusement. Évitez les mises à jour de firmware pendant Mercure rétrograde.",stats:["Port chanceux : GPIO 13","Puissance : 87%","Humeur : Autonome"],compat:"Meilleur match : Le Sorcier 🧙"},
{e:"🧙",n:"Le Sorcier",dates:"15 fév - 31 mar",reading:"Les énergies MediaPipe vous entourent. Vos gestes de la main seront suivis avec une précision inhabituelle aujourd'hui. Les projets créatifs sont fortement favorisés — le pixel art pourrait vous surprendre. Faites confiance aux particules.",stats:["Framework chanceux : MediaPipe","Aura : Magique","Créativité : 95%"],compat:"Meilleur match : Le Robot 🤖"},
{e:"🔐",n:"Le Hacker",dates:"1 avr - 15 mai",reading:"Vos compétences en hacking éthique atteignent leur apogée aujourd'hui. Les vulnérabilités se révéleront sans effort. Souvenez-vous : un grand pouvoir implique de grandes responsabilités (et un meilleur mot de passe WiFi, espérons-le). Les injections SQL sont particulièrement puissantes.",stats:["Exploit chanceux : XSS","Furtivité : Maximale","Éthique : 100%"],compat:"Meilleur match : Le Pingouin 🐧"},
{e:"🐧",n:"Le Pingouin",dates:"16 mai - 30 juin",reading:"Les commandes terminal coulent en vous comme de l'eau aujourd'hui. Vos scripts bash s'exécuteront parfaitement du premier coup (un événement cosmique rare). Évitez `rm -rf` pendant cet alignement vulnérable.",stats:["Commande chanceuse : sudo","Shell : Béni","Uptime : ∞"],compat:"Meilleur match : Le Hacker 🔐"},
{e:"⚡",n:"Le Circuit",dates:"1 juil - 15 août",reading:"Les énergies électroniques pulsent fortement. La soudure sera précise, et vos projets ESP32 compileront sans erreurs. Les étoiles mettent en garde contre le contact avec des composants chauds sans protection thermique.",stats:["Tension chanceuse : 3.3V","Résistance : Faible","Courant : Fluide"],compat:"Meilleur match : Le Maker 🔧"},
{e:"🧠",n:"Le Réseau Neuronal",dates:"16 août - 30 sep",reading:"La précision de votre entraînement IA atteint des sommets cosmiques aujourd'hui. Les modèles de reconnaissance gestuelle convergeront plus vite que d'habitude. L'univers suggère d'élargir votre jeu de données pour de meilleurs résultats.",stats:["Précision chanceuse : 98%","Époques : Alignées","Perte : Minimale"],compat:"Meilleur match : Le Sorcier 🧙"},
{e:"🐳",n:"Le Conteneur",dates:"1 oct - 15 nov",reading:"Les énergies Docker sont fortes. Vos conteneurs s'orchestreront harmonieusement. Aujourd'hui est favorable pour expliquer la conteneurisation à votre famille — ils pourraient comprendre. Les volumes sont bien montés dans votre thème astral.",stats:["Image chanceuse : alpine","Couches : Propres","Réseau : Bridge"],compat:"Meilleur match : Le Pingouin 🐧"},
{e:"☕",n:"Le Caféinateur",dates:"16 nov - 31 déc",reading:"Les réserves de café sont cosmiquement abondantes aujourd'hui — un alignement rare. Votre productivité sera surhumaine entre 9h et 11h. Après cela, cherchez un renouvellement immédiatement. Les étoiles fonctionnent à la caféine.",stats:["Breuvage chanceux : Espresso","Énergie : Maximale","Tasses aujourd'hui : ∞"],compat:"Meilleur match : Tout le monde ❤️"},
];

document.getElementById('signs').innerHTML=SIGNS.map(s=>`<div class="sign">
  <div class="sign-h"><span class="sign-emoji">${s.e}</span><div><div class="sign-name">${s.n}</div><div class="sign-dates">${s.dates}</div></div></div>
  <div class="sign-reading">${s.reading}</div>
  <div class="sign-stats">${s.stats.map(st=>`<span class="sign-stat">${st}</span>`).join('')}</div>
  <div class="sign-compat">${s.compat}</div>
</div>`).join('');

newFortune();
</script>
<script src="../../assets/js/sada-footer.js?v=2"></script>
<script src="../../assets/js/sada-nav.js"></script>
</body>
</html>
