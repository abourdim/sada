<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<script src="../../assets/js/sada-theme.js"></script>
<script src="../../assets/js/sada-lang.js"></script>
<link rel="stylesheet" href="../../assets/css/sada-base.css">
<link rel="stylesheet" href="../../assets/css/sada-themes.css">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>THE WKSHPIES 2026</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Playfair+Display:wght@400;700;900&family=Syne:wght@700;800&Amiri&display=swap" rel="stylesheet">
<style>
body{background:#0a0a10;color:#fff;font-family:'JetBrains Mono',monospace;font-size:11px;min-height:100vh}
.glow{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 50% 0%,rgba(255,215,0,.03),transparent 60%);pointer-events:none}

.header{text-align:center;padding:30px 16px 20px;position:relative;z-index:1}
.trophy{font-size:56px;filter:drop-shadow(0 8px 20px rgba(255,215,0,.15));margin-bottom:6px}
.h-title{font-family:'Playfair Display',serif;font-size:clamp(28px,6vw,42px);font-weight:900;color:#ffd700;letter-spacing:2px}
.h-sub{font-size:8px;color:rgba(255,215,0,.25);letter-spacing:5px;margin-top:4px}

.categories{max-width:650px;margin:0 auto;padding:0 16px 30px;position:relative;z-index:1}

.award{margin-bottom:20px;border:1px solid rgba(255,215,0,.06);border-radius:8px;overflow:hidden;background:rgba(255,215,0,.01)}
.award-h{padding:10px 14px;background:rgba(255,215,0,.03);border-bottom:1px solid rgba(255,215,0,.04);cursor:pointer;display:flex;align-items:center;gap:8px}
.award-h .icon{font-size:18px}
.award-h .cat{font-family:'Playfair Display',serif;font-size:14px;color:#ffd700;flex:1}
.award-h .reveal-btn{padding:3px 12px;border-radius:12px;border:1px solid rgba(255,215,0,.15);background:rgba(255,215,0,.03);color:#ffd700;font-family:inherit;font-size:8px;cursor:pointer;letter-spacing:1px}
.award-h .reveal-btn:hover{background:rgba(255,215,0,.08)}
.award-h .reveal-btn.opened{background:rgba(255,215,0,.06);border-color:rgba(255,215,0,.1);color:rgba(255,215,0,.4)}

.nominees{padding:8px 14px}
.nominee{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:4px;margin:3px 0;transition:all .3s}
.nominee .emoji{font-size:20px;width:28px;text-align:center}
.nominee .name{font-size:11px;color:#ccc;flex:1}
.nominee .reason{font-size:8px;color:#666;flex:2}
.nominee.winner{background:rgba(255,215,0,.06);border:1px solid rgba(255,215,0,.12)}
.nominee.winner .name{color:#ffd700;font-weight:700}
.winner-badge{font-size:7px;color:#ffd700;letter-spacing:1px;display:none}
.nominee.winner .winner-badge{display:inline;margin-left:4px}

/* SPEECH */
.speech{margin:6px 14px 10px;padding:8px 10px;background:rgba(255,215,0,.02);border-left:2px solid rgba(255,215,0,.1);border-radius:0 4px 4px 0;font-size:9px;color:#888;line-height:2;font-style:italic;display:none}
.speech.on{display:block;animation:fadeIn .5s}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.confetti{position:fixed;top:-10px;width:8px;height:8px;z-index:100;pointer-events:none;border-radius:1px}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

.footer{text-align:center;padding:16px;font-size:6px;color:rgba(255,215,0,.08);letter-spacing:2px;position:relative;z-index:1}
</style>
</head>
<body>
<div style="font-family:'Amiri',serif;font-size:13px;color:rgba(0,0,0,.06);text-align:center;padding:4px;direction:rtl">بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</div>
<div class="glow"></div>

<div class="header">
  <div class="trophy">🏆</div>
  <div class="h-title">LES WKSHPIES</div>
  <div class="h-sub">1ÈRE CÉRÉMONIE ANNUELLE DES PRIX WORKSHOP-DIY · 2026</div>
</div>

<div class="categories" id="cats"></div>

<div class="footer">
  LES WKSHPIES™ · WORKSHOP-DIY · AUCUNE APP N'A ÉTÉ MALTRAITÉE · LES BUGS RESTENT DES FONCTIONNALITÉS<br>
  SPONSORISÉ PAR : LA MACHINE À CAFÉ (BOISSON OFFICIELLE) · PASSWORD123 (WIFI OFFICIEL)
</div>

<script>
const AWARDS=[
{icon:"⭐",cat:"Meilleure App",nominees:[
  {e:"🤖",n:"bit-bot",r:"L'app qui a tout lancé. Pilotage de robot via BLE.",w:true,speech:"Je voudrais remercier Web Bluetooth, Chrome DevTools, et les 47 chutes de bureau qui ont fait de moi ce que je suis. Celle-ci est pour chaque robot qui a survécu."},
  {e:"🪄",n:"magic-hands",r:"21 points de suivi de la main. Magie visuelle pure."},
  {e:"🔐",n:"pentest-lab",r:"Le hacking éthique rendu éducatif et fun."},
  {e:"🧠",n:"teachable-machine",r:"Entraîne une IA dans ton navigateur. 98% de précision."},
]},
{icon:"🐛",cat:"Meilleur Bug (Fonctionnalité)",nominees:[
  {e:"🐛",n:"Bug #42",r:"Ni bug ni fonctionnalité. Le 40e.",w:true,speech:"Je n'étais pas censé exister. Je suis apparu sans commit, sans pull request, sans code review. Et pourtant me voilà. En train de recevoir un prix. La défense se repose."},
  {e:"🔇",n:"BLE Disconnect",r:"Des déconnexions aléatoires qui vous tiennent en haleine."},
  {e:"📡",n:"Limite BLE Chrome",r:"Seulement 7 appareils Bluetooth. Contrainte pédagogique."},
]},
{icon:"🏋️",cat:"Le plus Résistant",nominees:[
  {e:"🤖",n:"ESP32 Robot Kit",r:"47 chutes survécues. Toujours opérationnel.",w:true,speech:"Je tiens avec de la colle chaude, de l'espoir et une batterie LiPo 3,7V. 47 chutes, zéro panne. Je n'ai pas choisi les tests de résistance. Les tests de résistance m'ont choisi."},
  {e:"🔑",n:"password123",r:"Inchangé depuis 2023. Incassable (par principe)."},
  {e:"☕",n:"Machine à café",r:"1 337 tasses servies. Jamais arrêtée."},
]},
{icon:"😂",cat:"Le plus Involontairement Drôle",nominees:[
  {e:"🐳",n:"docker-lab",r:"Des ados de 14 ans qui expliquent Docker à leurs parents ingénieurs.",w:true,speech:"Je n'ai jamais voulu être drôle. Je suis un outil sérieux d'éducation à la conteneurisation. Mais quand un ado explique les volumes mieux qu'un ingénieur DevOps senior... la comédie s'écrit toute seule."},
  {e:"🔑",n:"Politique du mot de passe WiFi",r:"Enseigner la cybersécurité. Mot de passe : password123."},
  {e:"🖨️",n:"Vulnérabilité de l'imprimante",r:"Un élève a piraté l'imprimante de l'école. Éthiquement."},
]},
{icon:"🎓",cat:"Prix d'honneur",nominees:[
  {e:"☕",n:"La Machine à café",r:"Le carburant derrière chaque ligne de code depuis le premier jour.",w:true,speech:"1 337 tasses. C'est une pour chaque ligne de code qui a marché du premier coup. Je suis à 8% depuis 2023. J'ai vu des développeurs aller et venir. Moi, je reste. Je verse. Je suis la vraie fondatrice."},
]},
{icon:"🌟",cat:"App Révélation",nominees:[
  {e:"✨",n:"prompt-hero",r:"Enseigner l'art de la conversation avec l'IA.",w:true,speech:"Dans un monde de LLMs, quelqu'un devait apprendre aux humains à parler aux machines. Ce quelqu'un, c'était moi. Souvenez-vous : la précision est l'âme d'un bon prompt."},
  {e:"🕵️",n:"face-quest",r:"468 points du visage transformés en jeu."},
  {e:"💡",n:"wled-kids-lab",r:"16 millions de couleurs via une requête HTTP."},
]},
{icon:"🤝",cat:"Meilleure App de soutien",nominees:[
  {e:"🧩",n:"bit-playground",r:"Alimente discrètement chaque interaction micro:bit."},
  {e:"🎛️",n:"rxy",r:"Des télécommandes BLE sur mesure qui font tout fonctionner.",w:true,speech:"Je ne fais pas les gros titres. Je n'ai pas la gloire. Mais quand vous avez besoin d'une télécommande Bluetooth personnalisée avec exactement le bon agencement... vous m'appelez. Et je livre. À. Chaque. Fois."},
  {e:"🚀",n:"mission-control",r:"Connecter les pairs quand ça compte le plus."},
]},
{icon:"💀",cat:"Meilleur Coup de théâtre",nominees:[
  {e:"🐛",n:"L'identité de Bug #42",r:"Était-ce un bug ? Une fonctionnalité ? Le procès a tout révélé.",w:true,speech:"NON COUPABLE. C'est tout ce que j'ai à dire. Parlez à mon avocat : try { } catch(e) { }."},
  {e:"🔑",n:"Pétition WiFi n°3",r:"Troisième pétition pour changer password123. Refusée. Encore."},
  {e:"🤖",n:"47e chute du robot",r:"A survécu. Encore. Contre toute attente."},
]},
];

const catsEl=document.getElementById('cats');
AWARDS.forEach((a,ai)=>{
  const winner=a.nominees.find(n=>n.w);
  catsEl.innerHTML+=`
  <div class="award" id="aw${ai}">
    <div class="award-h" onclick="reveal(${ai})">
      <span class="icon">${a.icon}</span>
      <span class="cat">${a.cat}</span>
      <button class="reveal-btn" id="btn${ai}">OUVRIR L'ENVELOPPE</button>
    </div>
    <div class="nominees" id="nom${ai}">
      ${a.nominees.map((n,ni)=>`<div class="nominee" id="n${ai}_${ni}"><span class="emoji">${n.e}</span><span class="name">${n.n}<span class="winner-badge">★ LAURÉAT</span></span><span class="reason">${n.r}</span></div>`).join('')}
    </div>
    <div class="speech" id="sp${ai}">${winner?.speech||''}</div>
  </div>`;
});

function reveal(i){
  const btn=document.getElementById('btn'+i);
  if(btn.classList.contains('opened'))return;
  btn.classList.add('opened');
  btn.textContent='★ LAURÉAT ANNONCÉ';
  const a=AWARDS[i];
  a.nominees.forEach((n,ni)=>{
    if(n.w)document.getElementById(`n${i}_${ni}`).classList.add('winner');
  });
  document.getElementById('sp'+i).classList.add('on');
  confetti();
}

function confetti(){
  const colors=['#ffd700','#fff','#ff8800','#ffd700','#ffee00'];
  for(let i=0;i<20;i++){
    const c=document.createElement('div');c.className='confetti';
    c.style.left=(Math.random()*100)+'%';
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.width=(Math.random()*6+3)+'px';c.style.height=(Math.random()*6+3)+'px';
    c.style.animation=`confettiFall ${Math.random()*2+1.5}s ease-out forwards`;
    c.style.animationDelay=(Math.random()*.3)+'s';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),4000);
  }
}
</script>
<script src="../../assets/js/sada-footer.js?v=2"></script>
<script src="../../assets/js/sada-nav.js"></script>
</body>
</html>
