<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<script src="../../assets/js/sada-theme.js"></script>
<script src="../../assets/js/sada-lang.js"></script>
<link rel="stylesheet" href="../../assets/css/sada-base.css">
<link rel="stylesheet" href="../../assets/css/sada-themes.css">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WKSHP-DIY // RAP BATTLE</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Syne:wght@700;800&Amiri&family=Noto+Kufi+Arabic:wght@400;700&display=swap" rel="stylesheet">
<style>
body{background:#0a0a0e;color:#fff;font-family:'JetBrains Mono',monospace;font-size:11px;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px}

.header{text-align:center;margin-bottom:12px}
.h-title{font-family:'Syne',sans-serif;font-size:clamp(22px,5vw,32px);font-weight:800;background:linear-gradient(135deg,#ff0066,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.h-sub{font-size:7px;color:#444;letter-spacing:3px;margin-top:2px}

.stage{max-width:600px;width:100%;background:#111;border:1px solid #222;border-radius:8px;overflow:hidden}

/* VS HEADER */
.vs-bar{display:flex;align-items:center;padding:10px;background:#0d0d14;border-bottom:1px solid #1a1a24}
.fighter{flex:1;text-align:center}
.fighter .emoji{font-size:32px;margin-bottom:2px}
.fighter .name{font-size:12px;font-weight:800;color:#ffd700}
.fighter .title{font-size:7px;color:#555}
.vs{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#ff0066;padding:0 10px;text-shadow:0 0 10px rgba(255,0,102,.2)}

/* CROWD METER */
.meter{display:flex;align-items:center;gap:4px;padding:6px 10px;background:#0a0a0e;border-bottom:1px solid #1a1a24}
.meter-label{font-size:7px;color:#555;width:40px;text-align:center}
.meter-bar{flex:1;height:10px;background:#1a1a24;border-radius:5px;overflow:hidden;display:flex}
.meter-left{height:100%;background:linear-gradient(90deg,#0af,#00d4ff);transition:width .3s;border-radius:5px 0 0 5px}
.meter-right{height:100%;background:linear-gradient(90deg,#ff0066,#ff4488);transition:width .3s;border-radius:0 5px 5px 0}

/* BATTLE AREA */
.battle{padding:10px;min-height:300px;display:flex;flex-direction:column;gap:6px}
.verse{padding:8px 10px;border-radius:6px;animation:dropIn .4s ease;max-width:85%}
@keyframes dropIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:none}}
.verse.left{background:rgba(0,170,255,.06);border:1px solid rgba(0,170,255,.1);align-self:flex-start;border-left:3px solid #0af}
.verse.right{background:rgba(255,0,102,.06);border:1px solid rgba(255,0,102,.1);align-self:flex-end;text-align:right;border-right:3px solid #ff0066}
.verse .who{font-size:7px;font-weight:700;margin-bottom:3px;letter-spacing:1px}
.verse.left .who{color:#0af}.verse.right .who{color:#ff0066}
.verse .bar{font-size:10px;color:#ccc;line-height:2;font-style:italic}
.verse .bar b{color:#ffd700}

/* CONTROLS */
.controls{padding:10px;background:#0d0d14;border-top:1px solid #1a1a24;display:flex;gap:6px;justify-content:center}
.ctrl-btn{padding:6px 16px;border-radius:4px;border:1px solid #333;background:#1a1a24;color:#888;font-family:inherit;font-size:9px;cursor:pointer;transition:all .15s;font-weight:700}
.ctrl-btn:hover{background:#222;color:#fff}
.ctrl-btn.fire{background:rgba(255,0,102,.1);border-color:rgba(255,0,102,.2);color:#ff0066}
.ctrl-btn.fire:hover{background:rgba(255,0,102,.2)}
.ctrl-btn.vote-l{border-color:rgba(0,170,255,.2);color:#0af}.ctrl-btn.vote-r{border-color:rgba(255,0,102,.2);color:#ff0066}

.round-indicator{text-align:center;font-size:8px;color:#333;padding:4px;letter-spacing:2px}

.footer{font-size:6px;color:#222;margin-top:12px;letter-spacing:1px;text-align:center}
</style>
</head>
<body>
<div style="font-family:'Amiri',serif;font-size:13px;color:rgba(255,255,255,.08);text-align:center;padding:4px;direction:rtl">بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</div>

<div class="header">
  <div class="h-title">🎤 APP RAP BATTLE 🎤</div>
  <div class="h-sub">WORKSHOP-DIY · LÀ OÙ LES APPS RÈGLENT LEURS DIFFÉRENDS</div>
</div>

<div class="stage">
  <div class="vs-bar">
    <div class="fighter"><div class="emoji" id="f1e">🤖</div><div class="name" id="f1n">BIT-BOT</div><div class="title" id="f1t">Le Robot OG</div></div>
    <div class="vs">VS</div>
    <div class="fighter"><div class="emoji" id="f2e">🐳</div><div class="name" id="f2n">DOCKER-LAB</div><div class="title" id="f2t">La Baleine à Conteneurs</div></div>
  </div>
  <div class="meter">
    <div class="meter-label" id="ml">50%</div>
    <div class="meter-bar"><div class="meter-left" id="mLeft" style="width:50%"></div><div class="meter-right" id="mRight" style="width:50%"></div></div>
    <div class="meter-label" id="mr">50%</div>
  </div>
  <div class="round-indicator" id="round">ROUND 1 / 4</div>
  <div class="battle" id="battle"></div>
  <div class="controls">
    <button class="ctrl-btn vote-l" onclick="vote('left')">👈 VOTER GAUCHE</button>
    <button class="ctrl-btn fire" onclick="nextRound()">🎤 ROUND SUIVANT</button>
    <button class="ctrl-btn vote-r" onclick="vote('right')">VOTER DROITE 👉</button>
  </div>
</div>

<div style="display:flex;gap:4px;margin-top:8px">
  <button class="ctrl-btn" onclick="newBattle()" style="background:#111;border:1px solid #222;color:#555;font-size:8px;padding:4px 12px;border-radius:4px;cursor:pointer">🔀 NOUVEAU COMBAT</button>
</div>
<div class="footer">AUCUNE APP N'A ÉTÉ MALTRAITÉE · LES COMBATS SONT FICTIFS · LES BUGS RESTENT DES FONCTIONNALITÉS</div>

<script>
const FIGHTERS=[
{e:"🤖",n:"BIT-BOT",t:"Le Robot OG",bars:[
  "Je suis la <b>première app</b>, l'OG du game,\nPendant que tu croupis dans tes conteneurs, moi je récolte la fame.",
  "47 chutes du bureau et je suis <b>toujours debout</b>,\nTon Dockerfile plante si t'oublies un seul bout.",
  "Mes <b>connexions BLE</b> sont plus solides que ton bridge réseau,\nLes gamins me pilotent dans des labyrinthes pendant que t'expliques un layer niveau.",
  "Je suis la <b>raison</b> pour laquelle Workshop-DIY existe,\nSans moi y'aurait pas d'écosystème — juste une salle vide et triste.",
]},
{e:"🐳",n:"DOCKER-LAB",t:"La Baleine à Conteneurs",bars:[
  "Je <b>contiens des multitudes</b>, toi tu contiens deux moteurs et une prière,\nJ'orchestre des services, toi tu roules même pas en ligne droite, mon frère.",
  "docker-compose up et toute ma <b>stack se lève</b>,\nToi t'as besoin d'une batterie chargée juste pour pas tomber en grève.",
  "Des ados de 14 ans m'expliquent à leurs <b>parents ingénieurs</b>,\nToi on t'explique à des gamins de 8 ans. Tu vois la différence, farceur ?",
  "Je suis <b>reproductible</b>, scalable, enterprise-grade,\nToi t'es tenu par de la colle chaude. Pas de shade... bon, un peu de shade.",
]},
{e:"🪄",n:"MAGIC-HANDS",t:"Le Sorcier des Mains",bars:[
  "Je traque <b>21 landmarks</b> sur chaque main,\nToi tu pourrais même pas tracer ton propre code, c'est certain.",
  "Je fais <b>voler les particules</b> d'un geste du doigt,\nTon spinner de chargement, c'est le seul effet que t'as, toi.",
  "MediaPipe coule en moi comme de la <b>sorcellerie digitale</b>,\nTa liste de fonctionnalités est plus courte que ta sécurité WiFi, c'est fatal.",
  "Les gamins agitent les mains pendant des <b>heures</b> quand je suis en scène,\nTon app se ferme plus vite qu'un README vide, quelle peine.",
]},
{e:"🔐",n:"PENTEST-LAB",t:"Le Hors-la-loi Éthique",bars:[
  "Je <b>casse des systèmes</b> — éthiquement, bien sûr,\nToi tu pourrais pas pirater une imprimante même open source, c'est dur.",
  "Injection SQL, XSS — j'enseigne le <b>vrai truc</b>,\nTon environnement bac à sable ? Plutôt une roue de hamster, mec.",
  "J'ai trouvé la faille de l'imprimante avant le <b>déjeuner</b>,\nTon plus grand exploit ? Un mot correctement parsé.",
  "Les champions de CTF s'entraînent avec moi, je suis le <b>cyber sensei</b>,\nToi t'essaies encore de comprendre ce que 'chmod' veut dire, hey.",
]},
{e:"🐧",n:"LINUX-LAB",t:"Le Sage Pingouin",bars:[
  "Je vis dans le <b>terminal</b>, là où les vrais makers résident,\nToi tu vis derrière un GUI en cherchant le bon slide.",
  "bash, grep, sed, awk — je suis le <b>roi de la ligne de commande</b>,\nToi tu plantes quand quelqu'un tape autre chose qu'un string, quelle arnaque.",
  "J'ai appris 'sudo' aux gamins avant qu'ils sachent <b>l'épeler</b>,\nTa stratégie de gestion d'erreurs c'est juste 'faut pas en parler'.",
  "L'open source c'est mon <b>ADN</b>, la liberté ma cause,\nToi tu te caches derrière des abstractions avec tes lois enterprise, sans pause.",
]},
{e:"💡",n:"WLED-LAB",t:"Le Fantôme Néon",bars:[
  "<b>16 millions de couleurs</b> et j'en utilise chacune,\nTon interface est en niveaux de gris, mon show ne s'éteint sous aucune lune.",
  "J'éclaire la salle — <b>littéralement, pas une métaphore</b>,\nToi t'éclaires le journal d'erreurs, c'est ton seul décor.",
  "Les Neopixels dansent quand j'envoie <b>une seule requête HTTP</b>,\nToi t'as besoin d'un tuto en 20 étapes juste pour faire ton truc.",
  "Le RGB c'est mon langage, <b>chaque teinte est mon arme</b>,\nTa palette c'est 'gris par défaut'. Monte d'un cran, sans larme.",
]},
];

let f1,f2,round=0,scoreL=50,scoreR=50;
const battleEl=document.getElementById('battle');

function pickTwo(){
  const shuffled=[...FIGHTERS].sort(()=>Math.random()-.5);
  return[shuffled[0],shuffled[1]];
}

function newBattle(){
  [f1,f2]=pickTwo();round=0;scoreL=50;scoreR=50;
  battleEl.innerHTML='';
  document.getElementById('f1e').textContent=f1.e;
  document.getElementById('f1n').textContent=f1.n;
  document.getElementById('f1t').textContent=f1.t;
  document.getElementById('f2e').textContent=f2.e;
  document.getElementById('f2n').textContent=f2.n;
  document.getElementById('f2t').textContent=f2.t;
  updateMeter();
  updateRound();
}

function nextRound(){
  if(round>=4){
    const winner=scoreL>scoreR?f1:f2;
    battleEl.innerHTML+=`<div style="text-align:center;padding:10px;font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:#ffd700">🏆 ${winner.e} ${winner.n} GAGNE ! 🏆</div>`;
    return;
  }
  // Left verse
  const lv=document.createElement('div');lv.className='verse left';
  lv.innerHTML=`<div class="who">${f1.e} ${f1.n}</div><div class="bar">${f1.bars[round]}</div>`;
  battleEl.appendChild(lv);

  // Right verse after delay
  setTimeout(()=>{
    const rv=document.createElement('div');rv.className='verse right';
    rv.innerHTML=`<div class="who">${f2.n} ${f2.e}</div><div class="bar">${f2.bars[round]}</div>`;
    battleEl.appendChild(rv);
    battleEl.scrollTop=battleEl.scrollHeight;
  },800);

  round++;
  updateRound();
  battleEl.scrollTop=battleEl.scrollHeight;
}

function vote(side){
  const swing=Math.floor(Math.random()*8)+3;
  if(side==='left'){scoreL=Math.min(95,scoreL+swing);scoreR=100-scoreL}
  else{scoreR=Math.min(95,scoreR+swing);scoreL=100-scoreR}
  updateMeter();
}

function updateMeter(){
  document.getElementById('mLeft').style.width=scoreL+'%';
  document.getElementById('mRight').style.width=scoreR+'%';
  document.getElementById('ml').textContent=scoreL+'%';
  document.getElementById('mr').textContent=scoreR+'%';
}

function updateRound(){
  document.getElementById('round').textContent=`ROUND ${Math.min(round+1,4)} / 4`;
}

newBattle();
</script>

<script src="../../assets/js/sada-footer.js?v=2"></script>
<script src="../../assets/js/sada-nav.js"></script>
</body>
</html>
