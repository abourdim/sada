<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<script src="../../assets/js/sada-theme.js"></script>
<script src="../../assets/js/sada-lang.js"></script>
<link rel="stylesheet" href="../../assets/css/sada-base.css">
<link rel="stylesheet" href="../../assets/css/sada-themes.css">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WKSHP-DIY // MUR DES RECHERCHÉS</title>
<link href="https://fonts.googleapis.com/css2?family=Rye&family=Special+Elite&family=JetBrains+Mono:wght@400;700&Amiri&family=Noto+Kufi+Arabic:wght@400;700&display=swap" rel="stylesheet">
<style>
body{background:#3a2a1a;background-image:url("data:image/svg+xml,%3Csvg width='40' height='40' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='40' height='40' fill='%233a2a1a'/%3E%3Ccircle cx='20' cy='20' r='.5' fill='%23443020' opacity='.3'/%3E%3C/svg%3E");font-family:'Special Elite',cursive;min-height:100vh;padding:16px}

.header{text-align:center;margin-bottom:16px}
.header h1{font-family:'Rye',serif;font-size:clamp(22px,5vw,36px);color:#d4a855;text-shadow:2px 2px 4px rgba(0,0,0,.5);letter-spacing:2px}
.header p{font-size:10px;color:#886644;letter-spacing:3px}

.board{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;max-width:900px;margin:0 auto}

.poster{width:220px;background:#e8d5b0;border:2px solid #8a6e42;padding:14px;text-align:center;position:relative;transform:rotate(var(--r,0deg));box-shadow:4px 4px 12px rgba(0,0,0,.3);cursor:default;transition:transform .2s}
.poster:hover{transform:rotate(0deg) scale(1.05);z-index:2;box-shadow:6px 6px 20px rgba(0,0,0,.4)}
.poster::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,.08));pointer-events:none}

/* TAPE/PIN */
.pin{position:absolute;top:-6px;left:50%;transform:translateX(-50%);width:16px;height:16px;border-radius:50%;background:radial-gradient(circle at 40% 40%,#cc4444,#881111);box-shadow:0 2px 4px rgba(0,0,0,.3);z-index:3}

.wanted{font-family:'Rye',serif;font-size:22px;color:#2a1a0a;letter-spacing:4px;border-top:3px double #2a1a0a;border-bottom:3px double #2a1a0a;padding:3px 0;margin-bottom:8px}
.dead-or{font-size:8px;color:#5a3a1a;letter-spacing:4px;margin-bottom:4px}
.emoji-frame{font-size:50px;margin:4px 0;filter:drop-shadow(0 2px 4px rgba(0,0,0,.2))}
.app-name{font-family:'Rye',serif;font-size:14px;color:#2a1a0a;margin:4px 0;letter-spacing:1px}
.alias{font-size:8px;color:#7a5a2a;margin-bottom:6px;font-style:italic}
.charges{font-size:9px;color:#4a2a0a;line-height:1.9;margin-bottom:6px;text-align:left;padding:0 6px}
.charges b{color:#2a1a0a}
.reward{font-family:'Rye',serif;font-size:11px;color:#2a1a0a;border-top:2px solid #8a6e42;padding-top:4px;margin-top:4px}
.reward .amount{font-size:16px;color:#881111}
.last-seen{font-size:7px;color:#8a6e42;margin-top:4px;font-style:italic}
</style>
</head>
<body>
<div style="font-family:'Amiri',serif;font-size:13px;color:rgba(255,255,255,.08);text-align:center;padding:4px;direction:rtl">بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</div>

<div class="header">
  <h1>MUR DES RECHERCHÉS</h1>
  <p>WORKSHOP-DIY · APPS LES PLUS RECHERCHÉES · CAPTURER & APPRENDRE</p>
</div>

<div class="board" id="board"></div>

<script>
const POSTERS=[
{e:"🤖",n:"BIT-BOT",alias:"Le Bandit Bluetooth",charges:["Conduite sans permis (BLE)","Évasion des capteurs de suivi de ligne","47 chefs d\u2019accusation de survie à des chutes de bureau"],reward:"2 847 XP",seen:"Vu pour la dernière fois : micro:bit playground, armé de servos",r:-2},
{e:"🪄",n:"MAGIC-HANDS",alias:"Le Magicien des Mains",charges:["Invocation de particules non autorisée","Suivi de 21 points de repère sans consentement","Faire agiter les mains des enfants devant des écrans pendant des heures"],reward:"2 103 XP",seen:"Vu pour la dernière fois : n\u2019importe quel appareil avec webcam",r:1.5},
{e:"🕵️",n:"FACE-QUEST",alias:"Le Détective Facial",charges:["468 chefs d\u2019accusation de détection faciale","Comptage de points sans autorisation","Zéro donnée envoyée nulle part (suspect)"],reward:"1 892 XP",seen:"Vu pour la dernière fois : en train de marquer 847 points",r:-1},
{e:"🧠",n:"TEACHABLE-M",alias:"Le Cerveau",charges:["Entraînement de modèles IA dans des navigateurs","98% de précision (pour frimer)","Enseigner aux machines sans diplôme"],reward:"1 654 XP",seen:"Vu pour la dernière fois : connecté au micro:bit via BLE",r:2},
{e:"🔐",n:"PENTEST-LAB",alias:"Le Hors-la-loi Éthique",charges:["Injection SQL (éducative uniquement)","Découverte de vulnérabilité de l\u2019imprimante de l\u2019école","Rendre la cybersécurité trop amusante"],reward:"1 500 XP",seen:"Vu pour la dernière fois : environnement sandboxé, lourdement armé",r:-1.5},
{e:"🐧",n:"LINUX-LAB",alias:"Le Pingouin",charges:["Enseignement de commandes terminal à des mineurs","Simulation de systèmes de fichiers entiers","Faire paraître \u2019ls -la\u2019 passionnant"],reward:"1 400 XP",seen:"Vu pour la dernière fois : bash shell v5.2, dans /home/maker/",r:1},
{e:"🐳",n:"DOCKER-LAB",alias:"La Baleine à Conteneurs",charges:["Confusion des parents au dîner","Conteneurisation de tout ce qui bouge","Enseignement du DevOps à des ados"],reward:"650 XP",seen:"Vu pour la dernière fois : en train d\u2019expliquer les volumes à un ado de 14 ans",r:-2.5},
{e:"💬",n:"TALKING-BOT",alias:"Le Bavard",charges:["Réponse aux commandes vocales","Rendre les robots émotifs","Parler sans qu\u2019on lui adresse la parole"],reward:"1 300 XP",seen:"Vu pour la dernière fois : en train de danser sur des commandes vocales",r:1.5},
{e:"💡",n:"WLED-LAB",alias:"Le Fantôme Néon",charges:["Illumination LED non autorisée","Animations de couleurs addictives","Manipulation du protocole Neopixel"],reward:"890 XP",seen:"Vu pour la dernière fois : en train de briller de façon suspecte sur un ESP32",r:-1},
{e:"🚀",n:"MISSION-CTRL",alias:"Le Commandant",charges:["Streaming vidéo pair-à-pair","WebRTC sans mandat","Commander des robots depuis l\u2019autre bout de la pièce"],reward:"980 XP",seen:"Vu pour la dernière fois : en train de commander 3 micro:bits simultanément",r:2},
{e:"☕",n:"CAFÉINE",alias:"Le Vrai MVP",charges:["Alimentation de chaque ligne de code","Maintien des instructeurs en vie","Niveau critique en permanence"],reward:"∞ XP",seen:"Vu pour la dernière fois : vide. Toujours vide.",r:-0.5},
{e:"🐛",n:"BUG #42",alias:"La Fonctionnalité",charges:["Se faire passer pour un bug","Être en réalité une fonctionnalité","42 chefs d\u2019accusation d\u2019usurpation d\u2019identité"],reward:"42 XP",seen:"Vu pour la dernière fois : partout. C\u2019est une fonctionnalité.",r:1.8},
];

const board=document.getElementById('board');
POSTERS.forEach(p=>{
  board.innerHTML+=`<div class="poster" style="--r:${p.r}deg">
    <div class="pin"></div>
    <div class="wanted">RECHERCHÉ</div>
    <div class="dead-or">ENSEIGNE OU SOIS ENSEIGNÉ</div>
    <div class="emoji-frame">${p.e}</div>
    <div class="app-name">${p.n}</div>
    <div class="alias">"${p.alias}"</div>
    <div class="charges">${p.charges.map(c=>`• ${c}`).join('<br>')}</div>
    <div class="reward">RÉCOMPENSE : <span class="amount">${p.reward}</span></div>
    <div class="last-seen">${p.seen}</div>
  </div>`;
});
</script>

<script src="../../assets/js/sada-footer.js?v=2"></script>
<script src="../../assets/js/sada-nav.js"></script>
</body>
</html>
