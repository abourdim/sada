<!DOCTYPE html>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fffbf0;color:#333;font-family:'JetBrains Mono',monospace;font-size:11px;min-height:100vh;padding:16px}

.header{text-align:center;margin-bottom:16px}
.h-title{font-family:'Pacifico',cursive;font-size:clamp(24px,6vw,36px);color:#cc4488;text-shadow:2px 2px 0 rgba(204,68,136,.1)}

.h-sub{font-size:8px;color:#aaa;letter-spacing:2px;margin-top:2px}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;max-width:700px;margin:0 auto}

.card{background:#fff;border:2px solid #f0e0d0;border-radius:8px;padding:12px;text-align:center;transition:all .2s;cursor:default}
.card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.06);border-color:#cc4488}
.card .emoji{font-size:36px;margin-bottom:4px}
.card .superlative{font-family:'Pacifico',cursive;font-size:11px;color:#cc4488;margin-bottom:2px;line-height:1.4}
.card .name{font-size:10px;font-weight:700;color:#333}
.card .reason{font-size:7px;color:#aaa;margin-top:2px;line-height:1.6}

.footer{text-align:center;margin-top:16px;font-size:7px;color:#ccc;letter-spacing:1px;line-height:2}
</style>
</head>
