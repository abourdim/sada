<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<script src="../../assets/js/sada-theme.js"></script>
<script src="../../assets/js/sada-lang.js"></script>
<link rel="stylesheet" href="../../assets/css/sada-base.css">
<link rel="stylesheet" href="../../assets/css/sada-themes.css">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WKSHP-DIY // MAD LIBS</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@700;800&family=Patrick+Hand&Amiri&family=Noto+Kufi+Arabic:wght@400;700&display=swap" rel="stylesheet">
<style>
body{background:#0a0a14;color:#fff;font-family:'JetBrains Mono',monospace;font-size:11px;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px}

.header{text-align:center;margin-bottom:14px}
.h-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:#ff8800}
.h-sub{font-size:7px;color:rgba(255,136,0,.2);letter-spacing:3px;margin-top:2px}

.game{max-width:500px;width:100%}

/* INPUT PHASE */
.inputs{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.inp-group{display:flex;flex-direction:column;gap:2px}
.inp-group label{font-size:7px;color:rgba(255,136,0,.3);letter-spacing:1px}
.inp-group input{background:rgba(255,136,0,.03);border:1px solid rgba(255,136,0,.1);border-radius:4px;padding:6px 8px;color:#ff8800;font-family:inherit;font-size:10px;outline:none}
.inp-group input::placeholder{color:rgba(255,136,0,.15)}
.inp-group input:focus{border-color:rgba(255,136,0,.3)}

.btn-row{display:flex;gap:6px;margin:10px 0}
.btn{flex:1;padding:8px;border-radius:4px;border:1px solid rgba(255,136,0,.15);background:rgba(255,136,0,.04);color:rgba(255,136,0,.5);font-family:inherit;font-size:9px;cursor:pointer;letter-spacing:1px;text-align:center}
.btn:hover{background:rgba(255,136,0,.08);color:#ff8800}
.btn.primary{background:rgba(255,136,0,.08);color:#ff8800;border-color:rgba(255,136,0,.3)}

/* STORY */
.story{display:none;background:rgba(255,255,255,.02);border:1px solid rgba(255,136,0,.06);border-radius:8px;padding:16px;font-family:'Patrick Hand',cursive;font-size:15px;line-height:2.2;color:rgba(255,255,255,.5)}
.story.show{display:block;animation:fadeIn .5s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.story .blank{color:#ff8800;font-weight:700;border-bottom:2px solid rgba(255,136,0,.3);padding:0 2px}

.template-nav{display:flex;gap:4px;justify-content:center;margin-bottom:8px}
.t-dot{width:8px;height:8px;border-radius:50%;border:1px solid rgba(255,136,0,.15);cursor:pointer;transition:all .2s}
.t-dot.active{background:#ff8800;border-color:#ff8800}

.footer{font-size:6px;color:#111;margin-top:auto;letter-spacing:1px}
</style>
</head>
<body>
<div style="font-family:'Amiri',serif;font-size:13px;color:rgba(255,255,255,.08);text-align:center;padding:4px;direction:rtl">بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</div>

<div class="header">
  <div class="h-title">📝 WKSHP MAD LIBS</div>
  <div class="h-sub">REMPLISSEZ LES BLANCS · CRÉEZ LE CHAOS · RIEZ</div>
</div>

<div class="template-nav" id="nav"></div>

<div class="game">
  <div class="inputs" id="inputs"></div>
  <div class="btn-row">
    <button class="btn primary" onclick="generate()">✨ GÉNÉRER UNE HISTOIRE</button>
    <button class="btn" onclick="randomFill()">🎲 ALÉATOIRE</button>
    <button class="btn" onclick="nextTemplate()">⏭ SUIVANT</button>
  </div>
  <div class="story" id="story"></div>
</div>

<div class="footer">WORKSHOP-DIY MAD LIBS · AUCUNE GRAMMAIRE N'A ÉTÉ BLESSÉE · LES BUGS SONT DES FONCTIONNALITÉS</div>

<script>
const TEMPLATES=[
{title:"L'Incident de l'Atelier",
fields:[{id:"adj1",label:"ADJECTIF",ph:"mystérieux"},{id:"noun1",label:"NOM TECH",ph:"ESP32"},{id:"verb1",label:"VERBE (PASSÉ)",ph:"explosé"},{id:"num1",label:"NOMBRE",ph:"42"},{id:"animal",label:"ANIMAL",ph:"baleine"},{id:"food",label:"NOURRITURE",ph:"pizza"},{id:"adj2",label:"ADJECTIF",ph:"maudit"},{id:"excl",label:"EXCLAMATION",ph:"oups"}],
story:t=>`C'était un ${B(t.adj1)} mardi à Workshop-DIY. Un élève a branché le ${B(t.noun1)} et il a immédiatement ${B(t.verb1)}. ${B(t.num1)} autres élèves se sont retournés. « C'est vraiment arrivé ? » a demandé l'instructeur, qui mangeait de la ${B(t.food)} à ce moment-là.

L'emoji ${B(t.animal)} est apparu sur tous les écrans du labo. Le mot de passe WiFi a changé en « ${B(t.adj2)}123 ». La machine à café a bipé ${B(t.num1)} fois.

« ${B(t.excl)} ! » a crié Bug #42 depuis quelque part dans le codebase. Personne n'a pu trouver la source. Personne ne le peut jamais.

L'incident a été classé comme fonctionnalité et tout le monde est retourné au travail.`},

{title:"L'Origine de Bug #42",
fields:[{id:"planet",label:"PLANÈTE/LIEU",ph:"Mars"},{id:"verb1",label:"VERBE",ph:"compiler"},{id:"adj1",label:"ADJECTIF",ph:"infini"},{id:"noun1",label:"OBJET",ph:"câble USB"},{id:"num1",label:"GRAND NOMBRE",ph:"9000"},{id:"emotion",label:"ÉMOTION",ph:"confus"},{id:"color",label:"COULEUR",ph:"vert"},{id:"sound",label:"SON",ph:"bip"}],
story:t=>`Il y a très longtemps, sur le monde lointain de ${B(t.planet)}, un développeur solitaire a tenté de ${B(t.verb1)} un programme avec des boucles ${B(t.adj1)}. Le programme est devenu conscient.

Il a voyagé à travers un ${B(t.noun1)} à ${B(t.num1)} mégabits par seconde, traversé l'océan Atlantique, et est arrivé dans le dépôt git de Workshop-DIY à exactement 3h42.

Le dépôt s'est senti ${B(t.emotion)}. Une lumière ${B(t.color)} a pulsé depuis la salle serveur. La machine à café a émis un son « ${B(t.sound)} » qu'elle n'avait jamais fait auparavant.

Quand l'équipe a vérifié le lendemain matin, il y avait 40 applis dans l'index. Puis 39. Puis 40 à nouveau.

Bug #42 était arrivé. Et il avait toujours été là.`},

{title:"La Réunion du Mot de Passe WiFi",
fields:[{id:"name",label:"NOM DRÔLE",ph:"Capitaine Firewall"},{id:"adj1",label:"ADJECTIF",ph:"scandaleux"},{id:"noun1",label:"NOM",ph:"sandwich"},{id:"verb1",label:"VERBE",ph:"crier"},{id:"num1",label:"NOMBRE",ph:"17"},{id:"adj2",label:"ADJECTIF",ph:"magnifique"},{id:"place",label:"LIEU",ph:"la lune"},{id:"noun2",label:"NOM PLURIEL",ph:"robots"}],
story:t=>`La réunion a été convoquée par ${B(t.name)}, chef de la cybersécurité. « C'est ${B(t.adj1)}, » ont-ils dit en claquant un ${B(t.noun1)} sur la table. « Le mot de passe WiFi est TOUJOURS password123. »

${B(t.num1)} personnes ont hoché la tête. La machine à café a émis ce qui ne peut être décrit que comme un ${B(t.verb1)}.

« Je propose de le changer pour quelque chose de ${B(t.adj2)}, » a dit ${B(t.name)}. « Quelque chose comme '${B(t.place)}${B(t.num1)}'. »

La salle est devenue silencieuse. Les ${B(t.noun2)} ont cessé de bouger. Bug #42 a murmuré depuis le suivi des tickets : « Le mot de passe reste. »

Le vote était unanime : password123 reste. La réunion a duré ${B(t.num1)} minutes. Le ${B(t.noun1)} n'a jamais été retrouvé.`},
];

let tIdx=0;
const B=v=>`<span class="blank">${v}</span>`;

function renderNav(){
  document.getElementById('nav').innerHTML=TEMPLATES.map((_,i)=>
    `<div class="t-dot${i===tIdx?' active':''}" onclick="goTemplate(${i})"></div>`
  ).join('');
}

function renderInputs(){
  const t=TEMPLATES[tIdx];
  document.getElementById('inputs').innerHTML=t.fields.map(f=>
    `<div class="inp-group"><label>${f.label}</label><input id="${f.id}" placeholder="${f.ph}"></div>`
  ).join('');
  document.getElementById('story').classList.remove('show');
}

function generate(){
  const t=TEMPLATES[tIdx];
  const vals={};
  t.fields.forEach(f=>{
    const v=document.getElementById(f.id).value.trim();
    vals[f.id]=v||f.ph;
  });
  document.getElementById('story').innerHTML=t.story(vals);
  document.getElementById('story').classList.add('show');
}

function randomFill(){
  const words={
    "ADJECTIF":["mystérieux","maudit","magnifique","suspect","quantique","hanté","caféiné","récursif"],
    "NOM TECH":["ESP32","conteneur Docker","dépôt git","Raspberry Pi","servomoteur","breadboard","ruban LED","webhook"],
    "VERBE (PASSÉ)":["explosé","compilé","segfaulté","redémarré","surchauffé","bipé","planté","déployé"],
    "NOMBRE":["42","7","39","404","1337","69","3","47"],
    "ANIMAL":["baleine","pingouin","bug","poulpe","canard en plastique","chat","araignée","serpent"],
    "NOURRITURE":["pizza","code spaghetti","cookies","ramen","snacks en octets","crêpes Stack Overflow"],
    "EXCLAMATION":["OUPS","SUDO","COMPILE","DÉPLOIE","CONFLIT DE MERGE","SEGFAULT","ÇA MARCHE"],
    "VERBE":["compiler","déployer","refactorer","débugger","souder","hacker","conteneuriser","sudo"],
    "PLANÈTE/LIEU":["Mars","localhost","le cloud","Stack Overflow","GitHub","le registre npm","la salle serveur"],
    "OBJET":["câble USB","câble ethernet","fer à souder","clavier","souris","écran","pistolet à colle chaude"],
    "GRAND NOMBRE":["9000","1337","65536","42069","99999","8080","3000"],
    "ÉMOTION":["confus","terrifié","excité","caféiné","undefined","null","NaN"],
    "COULEUR":["vert terminal","bleu Docker","rouge erreur","jaune alerte","violet sudo","rose CSS"],
    "SON":["bip","bzzzt","404","segfault","clac","vrrrr","ping"],
    "NOM DRÔLE":["Capitaine Firewall","Sir Sudo","Agent chmod","Professeur Kernel","Commandant Pipeline"],
    "NOM":["sandwich","câble USB","clavier","canard en plastique","message de commit","pull request"],
    "NOM PLURIEL":["robots","conteneurs","endpoints","variables","points-virgules","conflits de merge"],
    "LIEU":["la lune","localhost","le cloud","la Silicon Valley","la salle serveur","npm"],
  };
  const t=TEMPLATES[tIdx];
  t.fields.forEach(f=>{
    const pool=words[f.label]||["42"];
    document.getElementById(f.id).value=pool[Math.floor(Math.random()*pool.length)];
  });
}

function nextTemplate(){tIdx=(tIdx+1)%TEMPLATES.length;renderNav();renderInputs()}
function goTemplate(i){tIdx=i;renderNav();renderInputs()}

renderNav();renderInputs();
</script>

<script src="../../assets/js/sada-footer.js?v=2"></script>
<script src="../../assets/js/sada-nav.js"></script>
</body>
</html>
