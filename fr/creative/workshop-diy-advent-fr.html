<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<script src="../../assets/js/sada-theme.js"></script>
<script src="../../assets/js/sada-lang.js"></script>
<link rel="stylesheet" href="../../assets/css/sada-base.css">
<link rel="stylesheet" href="../../assets/css/sada-themes.css">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WKSHP-DIY // CALENDRIER DE L'AVENT</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@700;800&Amiri&family=Noto+Kufi+Arabic:wght@400;700&display=swap" rel="stylesheet">
<style>
body{background:#0a1628;color:#fff;font-family:'JetBrains Mono',monospace;font-size:11px;min-height:100vh;overflow-x:hidden}
canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
.header{text-align:center;padding:16px;position:relative;z-index:1}
.h1{font-family:'Syne',sans-serif;font-size:clamp(20px,5vw,30px);font-weight:800;color:#ffd700;text-shadow:0 0 16px rgba(255,215,0,.1)}
.h2{font-size:7px;color:rgba(255,215,0,.2);letter-spacing:4px;margin-top:2px}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;max-width:500px;margin:0 auto;padding:0 12px 20px;position:relative;z-index:1}
@media(max-width:400px){.grid{grid-template-columns:repeat(4,1fr)}}
.door{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;perspective:400px;font-size:20px;font-family:'Syne',sans-serif;font-weight:800}
.door-front,.door-back{position:absolute;inset:0;border-radius:8px;display:flex;align-items:center;justify-content:center;backface-visibility:hidden;transition:transform .6s}
.door-front{background:linear-gradient(135deg,#1a3050,#0d1f35);border:1px solid rgba(255,215,0,.08);color:#ffd700;font-size:18px;z-index:2}
.door-front:hover{border-color:rgba(255,215,0,.2);background:linear-gradient(135deg,#1f3858,#12263e)}
.door-back{transform:rotateY(180deg);background:#0d1f35;border:1px solid rgba(255,215,0,.15);padding:6px;text-align:center;font-size:8px;color:rgba(255,215,0,.5);line-height:1.8;overflow:hidden}
.door-back .emoji{font-size:24px;display:block;margin-bottom:2px}
.door.open .door-front{transform:rotateY(180deg)}
.door.open .door-back{transform:rotateY(0)}
.counter{text-align:center;font-size:8px;color:rgba(255,215,0,.1);padding:6px;position:relative;z-index:1;letter-spacing:2px}
</style>
</head>
<body>
<div style="font-family:'Amiri',serif;font-size:13px;color:rgba(255,255,255,.08);text-align:center;padding:4px;direction:rtl">بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</div>
<canvas id="snow"></canvas>
<div class="header"><div class="h1">🎄 AVENT WKSHP</div><div class="h2">25 PORTES · 25 SURPRISES · 0 INSTALLATIONS</div></div>
<div class="grid" id="grid"></div>
<div class="counter" id="ctr">Ouvertes : 0 / 25</div>
<script>
const SURPRISES=[
{e:"🤖",t:"bit-bot a survécu à 47 chutes. Ce n'est pas une stat. C'est un mode de vie."},
{e:"🪄",t:"magic-hands suit 21 points par main. Ça fait 42 au total. Coïncidence ?"},
{e:"🔐",t:"Les élèves de pentest-lab ont déposé 3 pétitions pour changer le WiFi. Toutes refusées."},
{e:"☕",t:"La machine à café tourne à 8 % depuis mars 2024. Tout va bien. Tout va très bien."},
{e:"🐛",t:"Bug #42 n'a pas d'auteur. Pas de commit. Pas de date. Il... est, tout simplement."},
{e:"🐳",t:"Un ado de 14 ans a expliqué Docker à un ingénieur DevOps senior. L'ingénieur a pris des notes."},
{e:"🐧",t:"sudo rm -rf / — Non. Juste non. linux-kids-lab t'explique pourquoi."},
{e:"🧠",t:"teachable-machine atteint 98 % de précision. Les 2 % restants, c'est du jazz."},
{e:"💡",t:"wled-kids-lab : 16 millions de couleurs. Tu passeras 20 minutes à choisir entre deux bleus."},
{e:"⚡",t:"ESP32 tourne à 240 MHz. C'est plus rapide que ta capacité d'attention en cours de maths."},
{e:"🔑",t:"password123 — le mot de passe WiFi, le témoin de moralité, la légende."},
{e:"🚀",t:"mission-control utilise WebRTC. Pair-à-pair. Pas de serveur. De la pure magie."},
{e:"🎮",t:"Fun fact : le 'mode danse' de bit-bot était en fait un bug de reconnexion BLE. Maintenant c'est une fonctionnalité."},
{e:"📡",t:"Web Bluetooth peut connecter 7 appareils dans Chrome. C'est une fonctionnalité, pas une limite. (C'est une limite.)"},
{e:"🔧",t:"La colle chaude maintient 73 % du matériel Workshop-DIY. Le reste, c'est de l'espoir."},
{e:"🕵️",t:"face-quest cartographie 468 points sur ton visage. Il te connaît mieux que toi-même."},
{e:"🎄",t:"Tradition de Noël Workshop-DIY : essayer de changer le mot de passe WiFi. Échouer. Boire du café."},
{e:"⚖️",t:"Bug #42 a été déclaré NON COUPABLE. Le verdict a pris exactement 42 secondes."},
{e:"🎨",t:"pixel-gateway : où chaque pixel est intentionnel et chaque erreur est de l'« art »."},
{e:"📦",t:"Il y a 39 applis. Pas 40. Arrête de regarder l'index à 3h42 du matin."},
{e:"🛡️",t:"La vulnérabilité de l'imprimante scolaire a été divulguée de manière responsable. L'imprimante ne s'en est jamais remise émotionnellement."},
{e:"💬",t:"talking-robot : dis 'danse' et le robot danse. Dis autre chose et il... danse aussi."},
{e:"🌟",t:"prompt-hero enseigne l'art de parler à l'IA. Étape 1 : Sois précis. Étape 2 : Sois patient. Étape 3 : Café."},
{e:"🎁",t:"TU AS TROUVÉ LA PORTE DORÉE ! Ton prix : savoir que les bugs sont des fonctionnalités. Ça a toujours été le cas."},
{e:"🥳",t:"Tu as ouvert les 25 portes ! Tu es maintenant membre honoraire de Workshop-DIY. Mot de passe WiFi : password123."},
];
let opened=0;
const grid=document.getElementById('grid');
const shuffled=[...Array(25).keys()].sort(()=>Math.random()-.5);
for(let i=0;i<25;i++){
  const s=SURPRISES[shuffled[i]];
  const d=document.createElement('div');d.className='door';
  d.innerHTML=`<div class="door-front">${i+1}</div><div class="door-back"><span class="emoji">${s.e}</span>${s.t}</div>`;
  d.onclick=()=>{if(!d.classList.contains('open')){d.classList.add('open');opened++;document.getElementById('ctr').textContent=`Ouvertes : ${opened} / 25`}};
  grid.appendChild(d);
}
// SNOW
const c=document.getElementById('snow'),ctx=c.getContext('2d');
let W,H;function resize(){W=c.width=innerWidth;H=c.height=innerHeight}resize();addEventListener('resize',resize);
const flakes=[];for(let i=0;i<60;i++)flakes.push({x:Math.random()*2000,y:Math.random()*2000,r:Math.random()*2+1,s:Math.random()*.5+.2,w:Math.random()*Math.PI*2});
(function draw(){requestAnimationFrame(draw);ctx.clearRect(0,0,W,H);flakes.forEach(f=>{f.y+=f.s;f.x+=Math.sin(f.w+=.01)*.3;if(f.y>H)f.y=-5;if(f.x>W)f.x=0;if(f.x<0)f.x=W;ctx.beginPath();ctx.arc(f.x%W,f.y,f.r,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.15)';ctx.fill()})})();
</script>

<script src="../../assets/js/sada-footer.js?v=2"></script>
<script src="../../assets/js/sada-nav.js"></script>
</body>
</html>
