<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<script src="../../assets/js/sada-theme.js"></script>
<script src="../../assets/js/sada-lang.js"></script>
<link rel="stylesheet" href="../../assets/css/sada-base.css">
<link rel="stylesheet" href="../../assets/css/sada-themes.css">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WKSHP-DIY // PACK DE CARTES</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Syne:wght@700;800&Amiri&family=Noto+Kufi+Arabic:wght@400;700&display=swap" rel="stylesheet">
<style>
body{background:#0a0a14;color:#fff;font-family:'JetBrains Mono',monospace;font-size:11px;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px}

h1{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:#ffd700;letter-spacing:2px}
.sub{font-size:7px;color:rgba(255,215,0,.1);letter-spacing:2px;margin-bottom:12px}
.pack-info{font-size:9px;color:rgba(255,255,255,.1);margin-bottom:10px}

/* CARD */
.card-container{perspective:800px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.card{width:220px;height:310px;position:relative;transform-style:preserve-3d;transition:transform .6s}
.card.flipped{transform:rotateY(180deg)}

.card-front,.card-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:12px;overflow:hidden}

/* FRONT */
.card-front{display:flex;flex-direction:column;border:3px solid var(--rarity-color,#555)}
.cf-top{flex:1;display:flex;align-items:center;justify-content:center;font-size:64px;position:relative}
.cf-name{padding:4px 8px;font-family:'Syne',sans-serif;font-size:12px;font-weight:800;text-align:center;color:#fff}
.cf-rarity{position:absolute;top:6px;right:6px;font-size:6px;padding:2px 6px;border-radius:8px;font-weight:700;letter-spacing:1px}
.cf-domain{position:absolute;top:6px;left:6px;font-size:6px;color:rgba(255,255,255,.3)}

/* BACK */
.card-back{transform:rotateY(180deg);padding:12px;display:flex;flex-direction:column;border:3px solid var(--rarity-color,#555)}
.cb-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:800;text-align:center;margin-bottom:6px}
.cb-desc{font-size:8px;color:rgba(255,255,255,.3);text-align:center;line-height:1.8;margin-bottom:6px;flex:1}
.stat-bar{display:flex;align-items:center;gap:4px;margin:2px 0}
.stat-bar .label{width:30px;font-size:7px;color:rgba(255,255,255,.2);letter-spacing:1px}
.stat-bar .bar{flex:1;height:6px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden}
.stat-bar .bar-fill{height:100%;border-radius:3px;transition:width .8s}
.stat-bar .val{width:20px;font-size:8px;color:rgba(255,255,255,.2);text-align:right}
.cb-ability{margin-top:6px;padding:4px 6px;background:rgba(255,215,0,.03);border:1px solid rgba(255,215,0,.06);border-radius:4px;font-size:7px;color:rgba(255,215,0,.3);text-align:center}
.cb-footer{font-size:5px;color:rgba(255,255,255,.06);text-align:center;margin-top:4px;letter-spacing:1px}

/* RARITY COLORS */
.rarity-common{--rarity-color:#666;--rarity-bg:rgba(100,100,100,.1)}
.rarity-rare{--rarity-color:#0088ff;--rarity-bg:rgba(0,136,255,.06)}
.rarity-epic{--rarity-color:#9966ff;--rarity-bg:rgba(153,102,255,.06)}
.rarity-legendary{--rarity-color:#ffd700;--rarity-bg:rgba(255,215,0,.06)}
.rarity-legendary .card-front{background:linear-gradient(135deg,#1a1000,#2a1800,#1a1000);animation:holoShift 3s infinite}
@keyframes holoShift{0%,100%{filter:hue-rotate(0deg)}50%{filter:hue-rotate(15deg)}}

.card-front{background:var(--rarity-bg,#111)}
.card-back{background:#111}

/* CONTROLS */
.controls{margin-top:10px;display:flex;gap:6px;align-items:center}
.btn{padding:6px 16px;border-radius:16px;border:1px solid rgba(255,215,0,.1);background:rgba(255,215,0,.02);color:rgba(255,215,0,.3);font-family:inherit;font-size:9px;cursor:pointer;transition:all .2s}
.btn:hover{border-color:rgba(255,215,0,.2);color:#ffd700}
.progress{font-size:8px;color:rgba(255,255,255,.08)}

.footer{font-size:5px;color:rgba(255,255,255,.02);letter-spacing:1px;margin-top:10px}
</style>
</head>
<body>
<div style="font-family:'Amiri',serif;font-size:13px;color:rgba(255,255,255,.08);text-align:center;padding:4px;direction:rtl">بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</div>

<h1>PACK DE CARTES</h1>
<div class="sub">WORKSHOP-DIY ÉDITION COLLECTOR · SÉRIE 1</div>
<div class="pack-info" id="packInfo">Cliquez pour retourner · SUIVANT pour la prochaine</div>

<div class="card-container" onclick="flipCard()">
  <div class="card" id="card"></div>
</div>

<div class="controls">
  <button class="btn" onclick="prevCard()">← PRÉC</button>
  <span class="progress" id="progress">1 / 8</span>
  <button class="btn" onclick="nextCard()">SUIV →</button>
</div>

<div class="footer">CARTES WKSHP · SÉRIE 1 · ©2026 · LES BUGS SONT HOLOGRAPHIQUES</div>

<script>
const CARDS=[
{name:"bit-bot",emoji:"🤖",domain:"ROBOTIQUE",rarity:"legendary",desc:"Le robot éducatif indestructible. Propulsé par ESP32, connecté en BLE, renforcé à la colle chaude. A survécu à 47 chutes de bureau sans se plaindre.",atk:42,def:99,spd:15,lck:47,ability:"IMMUNITÉ AUX CHUTES — Ne peut être détruit par une chute de moins de 2 mètres. La colle chaude se régénère."},
{name:"Bug #42",emoji:"🐛",domain:"???",rarity:"legendary",desc:"N'a pas d'auteur. Pas de date de création. Pas de hash de commit. Apparaît à 3h42. Légalement classé Fonctionnalité après procès.",atk:42,def:42,spd:42,lck:42,ability:"AUTO-RÉSURRECTION — Ne peut être supprimé. Revient sous 24 heures. Toujours à 3h42."},
{name:"teachable-machine",emoji:"🧠",domain:"IA/ML",rarity:"epic",desc:"Entraîneur de modèles ML dans le navigateur. 98 % de précision sur la prédiction d'engagement des élèves. Pas de GPU requis.",atk:98,def:60,spd:85,lck:30,ability:"RECONNAISSANCE DE MOTIFS — 98 % de chance de prédire le prochain coup adverse."},
{name:"pentest-lab",emoji:"🔐",domain:"CYBER",rarity:"epic",desc:"Bac à sable de hacking éthique. Scanner de ports, analyseur de paquets, et le légendaire hack d'imprimante sur le port 9100.",atk:88,def:95,spd:70,lck:25,ability:"SCAN DE PORTS — Révèle toutes les stats et faiblesses cachées de l'ennemi."},
{name:"Machine à café",emoji:"☕",domain:"INFRASTRUCTURE",rarity:"rare",desc:"Fonctionne à 8 % de capacité depuis 14 mois. État du bac de récupération : préoccupant. Fait toujours un espresso parfait.",atk:8,def:8,spd:8,lck:100,ability:"PUISSANCE 8 % — Toutes les stats réduites à 8 % mais la chance est au max. Ne peut être rechargée."},
{name:"docker-lab",emoji:"🐳",domain:"OUTILS",rarity:"rare",desc:"Orchestration de conteneurs pour les jeunes. Les ados l'expliquent aux parents. Les parents prennent des notes.",atk:65,def:80,spd:50,lck:35,ability:"CONTENEURISER — Isole toute attaque dans un bac à sable. Dégâts réduits à 0."},
{name:"password123",emoji:"🔑",domain:"SÉCURITÉ",rarity:"common",desc:"Le mot de passe WiFi. Inchangé depuis 2023. Trois pétitions refusées. Nous survivra à tous.",atk:1,def:1,spd:1,lck:123,ability:"INCHANGÉ — Ne peut être modifié par aucun effet. Immunisé contre toute transformation."},
{name:"hot-glue-stick",emoji:"🔥",domain:"MATÉRIEL",rarity:"common",desc:"Le héros méconnu. Support structurel de 47 chutes de bureau. Fond à 200 °C. Tient à toute température en dessous.",atk:5,def:200,spd:0,lck:50,ability:"LIAISON STRUCTURELLE — Augmente définitivement la DÉF de toute carte de 50 une fois appliqué."},
];

let idx=0,flipped=false;

function renderCard(){
  const c=CARDS[idx];
  const card=document.getElementById('card');
  card.className=`card rarity-${c.rarity}`;
  if(flipped)card.classList.add('flipped');

  const rarityColors={common:'#666',rare:'#0088ff',epic:'#9966ff',legendary:'#ffd700'};
  const rc=rarityColors[c.rarity];

  card.innerHTML=`
    <div class="card-front">
      <div class="cf-top">
        <div class="cf-domain">${c.domain}</div>
        <div class="cf-rarity" style="background:${rc}20;color:${rc}">${c.rarity.toUpperCase()}</div>
        <span style="font-size:64px">${c.emoji}</span>
      </div>
      <div class="cf-name" style="background:${rc}15;border-top:1px solid ${rc}20">${c.name}</div>
    </div>
    <div class="card-back">
      <div class="cb-name" style="color:${rc}">${c.name}</div>
      <div class="cb-desc">${c.desc}</div>
      ${statBar('ATK',c.atk,rc)}
      ${statBar('DEF',c.def,rc)}
      ${statBar('SPD',c.spd,rc)}
      ${statBar('LCK',c.lck,rc)}
      <div class="cb-ability">⚡ ${c.ability}</div>
      <div class="cb-footer">WKSHP CARDS · #${String(idx+1).padStart(3,'0')} · SERIES 1</div>
    </div>`;
  
  document.getElementById('progress').textContent=`${idx+1} / ${CARDS.length}`;
}

function statBar(label,val,color){
  return `<div class="stat-bar"><span class="label">${label}</span><div class="bar"><div class="bar-fill" style="width:${Math.min(val,100)}%;background:${color}"></div></div><span class="val">${val}</span></div>`;
}

function flipCard(){
  flipped=!flipped;
  document.getElementById('card').classList.toggle('flipped');
}

function nextCard(){
  flipped=false;
  idx=(idx+1)%CARDS.length;
  renderCard();
}
function prevCard(){
  flipped=false;
  idx=(idx-1+CARDS.length)%CARDS.length;
  renderCard();
}

renderCard();
</script>

<script src="../../assets/js/sada-footer.js?v=2"></script>
<script src="../../assets/js/sada-nav.js"></script>
</body>
</html>
