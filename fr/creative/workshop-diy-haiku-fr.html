<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<script src="../../assets/js/sada-theme.js"></script>
<script src="../../assets/js/sada-lang.js"></script>
<link rel="stylesheet" href="../../assets/css/sada-base.css">
<link rel="stylesheet" href="../../assets/css/sada-themes.css">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WKSHP-DIY // 俳句</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Serif+JP:wght@300;500&Amiri&family=Noto+Kufi+Arabic:wght@400;700&display=swap" rel="stylesheet">
<style>
body{background:#f5f0e8;color:#333;font-family:'Noto Serif JP',serif;font-size:14px;min-height:100vh;padding:16px}

.header{text-align:center;margin-bottom:20px}
.h-jp{font-size:28px;font-weight:300;color:#555;letter-spacing:6px}
.h-en{font-size:8px;color:#aaa;font-family:'JetBrains Mono',monospace;letter-spacing:3px;margin-top:2px}

.haikus{max-width:400px;margin:0 auto;display:flex;flex-direction:column;gap:16px}

.haiku{text-align:center;padding:20px;border-bottom:1px solid rgba(0,0,0,.04);cursor:pointer;transition:all .3s;position:relative}
.haiku:hover{background:rgba(0,0,0,.01)}
.haiku .lines{font-size:14px;font-weight:300;line-height:2.4;color:#444;opacity:0;transition:opacity .6s}
.haiku.revealed .lines{opacity:1}
.haiku .subject{font-size:9px;color:#bbb;font-family:'JetBrains Mono',monospace;letter-spacing:2px;margin-top:6px;opacity:0;transition:opacity .6s .2s}
.haiku.revealed .subject{opacity:1}
.haiku .prompt{font-size:9px;color:#ccc;font-family:'JetBrains Mono',monospace;transition:opacity .3s}
.haiku.revealed .prompt{opacity:0;position:absolute}
.haiku .season{font-size:16px;margin-bottom:4px}

.footer{text-align:center;margin-top:20px;font-size:7px;color:#ccc;font-family:'JetBrains Mono',monospace;letter-spacing:1px}
</style>
</head>
<body>
<div style="font-family:'Amiri',serif;font-size:13px;color:rgba(255,255,255,.08);text-align:center;padding:4px;direction:rtl">بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</div>

<div class="header">
  <div class="h-jp">俳句 Atelier</div>
  <div class="h-en">COLLECTION DE HAÏKU WORKSHOP-DIY · CLIQUER POUR RÉVÉLER</div>
</div>

<div class="haikus" id="haikus"></div>

<div class="footer">WORKSHOP-DIY · 俳句 · CHAQUE POÈME 5-7-5 · LES BUGS SONT DES FONCTIONNALITÉS SAISONNIÈRES</div>

<script>
const H=[
{s:"🤖",lines:["Robot sur le bord","Quarante-sept chutes et ça continue","Toujours il avance"],sub:"— sur bit-bot"},
{s:"🪄",lines:["Vingt et un repères","Les doigts tracent l'invisible","Particules suivent"],sub:"— sur magic-hands"},
{s:"🔑",lines:["Mot de passe inchangé","Trois pétitions refusées","La tradition dure"],sub:"— sur password123"},
{s:"☕",lines:["Huit pour cent restent","Quatorze mois en état critique","Personne ne recharge"],sub:"— sur la machine à café"},
{s:"🐛",lines:["Pas d'auteur connu","Pas de commit ni de date","J'ai toujours existé"],sub:"— Bug #42 parle"},
{s:"🐳",lines:["L'enfant explique Docker","Le père acquiesce et note","Conteneurs de fierté"],sub:"— sur docker-lab"},
{s:"🧠",lines:["Trente échantillons","Quatre-vingt-dix-huit pour cent","La machine a appris"],sub:"— sur teachable-machine"},
{s:"🔐",lines:["Hacking éthique","L'élève trouve le port","Enfant responsable"],sub:"— sur pentest-lab"},
{s:"🐧",lines:["Le terminal attend","ls cd mkdir rm","Attention au dernier"],sub:"— sur linux-kids-lab"},
{s:"💡",lines:["Seize millions de teintes","Une requête HTTP","Le ruban s'allume"],sub:"— sur wled-kids-lab"},
{s:"🔥",lines:["Soudure sur le fil","Baiser à trois cent cinquante","Connexion est faite"],sub:"— sur la soudure"},
{s:"📡",lines:["Signal Bluetooth faiblit","Chrome déconnecte sans cause","Reconnecter, danser"],sub:"— sur le BLE"},
{s:"⬛",lines:["Trois heures quarante-deux","Le compteur montre quarante","Puis trente-neuf encore"],sub:"— sur la 40e appli"},
{s:"🌐",lines:["Pas de npm install","Pas de webpack ni config","Juste ouvrir la page"],sub:"— sur zéro installation"},
{s:"⚖️",lines:["L'audience est ouverte","Le jury délibère","Feature. Non coupable."],sub:"— sur le procès"},
{s:"🚀",lines:["Pont WebRTC","Deux navigateurs se trouvent","Connexion réelle"],sub:"— sur mission-control"},
{s:"🎮",lines:["Pixel posé avec soin","Art 8-bit sur écrans neufs","Le rétro revit"],sub:"— sur pixel-gateway"},
{s:"📊",lines:["Huit cents avis lus","Quatre virgule neuf sur cinq","Le point un c'est café"],sub:"— sur l'accueil"},
{s:"🔧",lines:["Pistolet à colle prêt","Il maintient le monde ensemble","Scotch d'ingénieur"],sub:"— sur les outils"},
{s:"🌸",lines:["Trente-neuf petits mondes","Chacun construit dans une page","Savoir fleurit au printemps"],sub:"— sur Workshop-DIY"},
];

const el=document.getElementById('haikus');
H.forEach((h,i)=>{
  const d=document.createElement('div');
  d.className='haiku';
  d.innerHTML=`<div class="season">${h.s}</div><div class="prompt">cliquer pour révéler</div><div class="lines">${h.lines.join('<br>')}</div><div class="subject">${h.sub}</div>`;
  d.onclick=()=>d.classList.add('revealed');
  el.appendChild(d);
});
</script>

<script src="../../assets/js/sada-footer.js?v=2"></script>
<script src="../../assets/js/sada-nav.js"></script>
</body>
</html>
