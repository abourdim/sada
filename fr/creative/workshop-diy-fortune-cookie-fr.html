<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<script src="../../assets/js/sada-theme.js"></script>
<script src="../../assets/js/sada-lang.js"></script>
<link rel="stylesheet" href="../../assets/css/sada-base.css">
<link rel="stylesheet" href="../../assets/css/sada-themes.css">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WKSHP FORTUNE</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@700;800&Amiri&display=swap" rel="stylesheet">
<style>
body{background:#1a0008;color:#ffd700;font-family:'JetBrains Mono',monospace;font-size:11px;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px}
.glow{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 50%,rgba(200,30,30,.04),transparent 60%);pointer-events:none}

.title{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:#cc0000;text-shadow:0 0 12px rgba(204,0,0,.15);margin-bottom:4px;text-align:center}
.subtitle{font-size:7px;color:rgba(255,215,0,.2);letter-spacing:3px;margin-bottom:20px;text-align:center}

/* COOKIE */
.cookie-area{position:relative;width:200px;height:200px;cursor:pointer;margin:0 auto}
.cookie{font-size:100px;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);transition:all .5s;filter:drop-shadow(0 8px 20px rgba(0,0,0,.3))}
.cookie.cracked{opacity:0;transform:translate(-50%,-50%) scale(1.5)}
.click-hint{text-align:center;font-size:8px;color:rgba(255,215,0,.15);margin-top:4px;letter-spacing:2px;transition:opacity .3s}
.click-hint.hide{opacity:0}

/* FORTUNE SLIP */
.fortune{max-width:350px;text-align:center;opacity:0;transform:translateY(20px);transition:all .6s;pointer-events:none}
.fortune.show{opacity:1;transform:translateY(0);pointer-events:auto}
.slip{background:linear-gradient(180deg,#fff8e0,#fff5d0);border-radius:2px;padding:16px 20px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.1);position:relative}
.slip::before,.slip::after{content:'';position:absolute;top:0;bottom:0;width:10px}
.slip::before{left:0;background:linear-gradient(90deg,rgba(0,0,0,.02),transparent)}
.slip::after{right:0;background:linear-gradient(-90deg,rgba(0,0,0,.02),transparent)}
.fortune-text{font-size:13px;color:#333;line-height:2;font-style:italic;font-family:Georgia,serif}
.fortune-lucky{font-size:8px;color:#888;margin-top:8px;font-family:'JetBrains Mono',monospace}
.fortune-app{font-size:8px;color:#cc0000;margin-top:2px;font-family:'JetBrains Mono',monospace}

.new-btn{padding:6px 20px;background:rgba(204,0,0,.06);border:1px solid rgba(204,0,0,.15);border-radius:4px;color:#cc0000;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;cursor:pointer;letter-spacing:1px;transition:all .2s}
.new-btn:hover{background:rgba(204,0,0,.1)}

.counter{font-size:7px;color:rgba(255,215,0,.1);margin-top:16px;letter-spacing:2px}
.footer{font-size:6px;color:rgba(255,215,0,.06);margin-top:8px;text-align:center;letter-spacing:1px}
</style>
</head>
<body>
<div style="font-family:'Amiri',serif;font-size:13px;color:rgba(0,0,0,.06);text-align:center;padding:4px;direction:rtl">بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</div>
<div class="glow"></div>

<div class="title">🥠 WKSHP FORTUNE</div>
<div class="subtitle">OUVREZ VOTRE DESTINÉE</div>

<div class="cookie-area" id="cookieArea" onclick="crack()">
  <div class="cookie" id="cookie">🥠</div>
</div>
<div class="click-hint" id="hint">CLIQUEZ SUR LE BISCUIT</div>

<div class="fortune" id="fortune">
  <div class="slip">
    <div class="fortune-text" id="fortuneText"></div>
    <div class="fortune-lucky" id="fortuneLucky"></div>
    <div class="fortune-app" id="fortuneApp"></div>
  </div>
  <button class="new-btn" onclick="reset()">🥠 NOUVELLE FORTUNE</button>
</div>

<div class="counter" id="counter">Fortunes lues : 0</div>
<div class="footer">WKSHP BISCUIT DE FORTUNE CO. · PAS DE VRAIES PRÉDICTIONS · LES BUGS SONT DES FONCTIONNALITÉS DANS TOUTES LES CHRONOLOGIES</div>

<script>
const FORTUNES=[
  {text:"Un bug dans ton code se révélera être une fonctionnalité déguisée. Accepte-le.",lucky:"42, 39, 7, 12, 47, 8",app:"Appli chanceuse : Bug #42"},
  {text:"Le mot de passe WiFi que tu cherches est devant toi depuis le début. C'est password123.",lucky:"1, 2, 3, 39, 42, 0",app:"Appli chanceuse : password123"},
  {text:"Un sage robot a dit un jour : « Ce n'est pas une chute — c'est un test de gravité. » Tu survivras.",lucky:"47, 3, 7, 12, 42, 1",app:"Appli chanceuse : bit-bot"},
  {text:"Ton prochain projet fonctionnera parfaitement du premier coup. Non, je rigole. Vérifie la console.",lucky:"500, 404, 200, 301, 42, 0",app:"Appli chanceuse : pentest-lab"},
  {text:"Tu expliqueras un sujet complexe si bien qu'un expert apprendra de toi.",lucky:"14, 42, 7, 39, 3, 99",app:"Appli chanceuse : docker-lab"},
  {text:"Le café n'est pas la réponse. Le café est la question. La réponse est oui.",lucky:"8, 1337, 42, 7, 3, 0",app:"Appli chanceuse : coffee-supply"},
  {text:"Le meilleur code que tu écriras jamais n'aura aucun commentaire. Et pourtant il fonctionnera.",lucky:"0, 42, 39, 7, 1, 23",app:"Appli chanceuse : linux-kids-lab"},
  {text:"Un geste de la main changera ton destin. Fais signe à ta webcam et regarde ce qui se passe.",lucky:"21, 42, 7, 3, 98, 5",app:"Appli chanceuse : magic-hands"},
  {text:"Ton visage renferme 468 secrets. L'un d'eux est ton meilleur score.",lucky:"468, 42, 7, 39, 100, 3",app:"Appli chanceuse : face-quest"},
  {text:"Enseigne à une machine, et elle apprend. Enseigne à un enfant, et il apprend Docker à ses parents.",lucky:"98, 42, 14, 7, 39, 3",app:"Appli chanceuse : teachable-machine"},
  {text:"Dans un monde de GUI, celui qui connaît 'ls -la' est roi.",lucky:"755, 644, 777, 42, 0, 1",app:"Appli chanceuse : linux-kids-lab"},
  {text:"16 millions de couleurs, et tu choisiras celle qui ne va avec rien. C'est ça, la créativité.",lucky:"16, 777, 215, 255, 0, 42",app:"Appli chanceuse : wled-kids-lab"},
  {text:"La colle chaude est temporaire. Les amitiés créées en atelier sont éternelles.",lucky:"350, 42, 7, 39, 47, 1",app:"Appli chanceuse : esp32-c3-lab"},
  {text:"Le conteneur qui renferme ton avenir tourne déjà. Vérifie le tableau de bord.",lucky:"80, 443, 3000, 42, 8, 27",app:"Appli chanceuse : docker-lab"},
  {text:"Il y a 39 chemins devant toi. Choisis n'importe lequel. Ils mènent tous à l'apprentissage.",lucky:"39, 7, 12, 42, 1, 0",app:"Appli chanceuse : toutes"},
  {text:"Le fer à souder est chaud. Ton potentiel aussi. Manipule les deux avec soin.",lucky:"350, 42, 330, 5, 3, 7",app:"Appli chanceuse : esp32-c3-lab"},
  {text:"Quelqu'un essaiera de changer le mot de passe WiFi demain. Il échouera.",lucky:"1, 2, 3, 42, 0, 39",app:"Appli chanceuse : password123"},
  {text:"Ton robot survivra à sa prochaine chute. Il survit toujours.",lucky:"47, 48, 49, 42, 7, 1",app:"Appli chanceuse : bit-bot"},
];

let count=0;
function crack(){
  document.getElementById('cookie').classList.add('cracked');
  document.getElementById('hint').classList.add('hide');
  
  const f=FORTUNES[Math.floor(Math.random()*FORTUNES.length)];
  document.getElementById('fortuneText').textContent=f.text;
  document.getElementById('fortuneLucky').textContent='Numéros chanceux : '+f.lucky;
  document.getElementById('fortuneApp').textContent=f.app;
  
  setTimeout(()=>{
    document.getElementById('fortune').classList.add('show');
    count++;
    document.getElementById('counter').textContent='Fortunes lues : '+count;
  },500);
}

function reset(){
  document.getElementById('fortune').classList.remove('show');
  document.getElementById('cookie').classList.remove('cracked');
  document.getElementById('hint').classList.remove('hide');
}
</script>
<script src="../../assets/js/sada-footer.js?v=2"></script>
<script src="../../assets/js/sada-nav.js"></script>
</body>
</html>
