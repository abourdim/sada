<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<script src="../../assets/js/sada-theme.js"></script>
<script src="../../assets/js/sada-lang.js"></script>
<link rel="stylesheet" href="../../assets/css/sada-base.css">
<link rel="stylesheet" href="../../assets/css/sada-themes.css">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MUSÉE WKSHP-DIY</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&Amiri&family=Noto+Kufi+Arabic:wght@400;700&display=swap" rel="stylesheet">
<style>
body{background:#f5f3ef;color:#222;font-family:'Playfair Display',serif;font-size:13px;min-height:100vh}

.museum-top{text-align:center;padding:24px 16px 16px;border-bottom:1px solid #ddd}
.m-name{font-size:clamp(22px,5vw,34px);font-weight:700;letter-spacing:2px;color:#111}
.m-sub{font-size:10px;color:#999;font-family:'JetBrains Mono',monospace;letter-spacing:3px;margin-top:2px}

/* GALERIE TABS */
.wings{display:flex;justify-content:center;gap:0;border-bottom:1px solid #ddd;font-family:'JetBrains Mono',monospace;font-size:9px}
.wing{padding:8px 16px;cursor:pointer;color:#999;border-bottom:2px solid transparent;transition:all .2s;letter-spacing:1px}
.wing:hover{color:#555}.wing.active{color:#111;border-bottom-color:#111}

/* GALERIE */
.gallery{max-width:750px;margin:0 auto;padding:20px 16px}

.exhibit{display:flex;gap:20px;margin-bottom:28px;padding-bottom:28px;border-bottom:1px solid #eee;align-items:flex-start}
@media(max-width:500px){.exhibit{flex-direction:column;align-items:center;text-align:center}}

.artwork{width:120px;height:120px;background:#fff;border:1px solid #e0e0e0;display:flex;align-items:center;justify-content:center;font-size:56px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.05);position:relative}
.artwork::after{content:'';position:absolute;inset:0;box-shadow:inset 0 0 0 1px rgba(0,0,0,.03)}
.artwork-light{position:absolute;top:-20px;left:50%;transform:translateX(-50%);width:40px;height:4px;background:linear-gradient(90deg,transparent,rgba(255,220,150,.3),transparent);border-radius:2px}

.placard{flex:1}
.placard-title{font-size:18px;font-weight:700;color:#111;margin-bottom:2px}
.placard-artist{font-size:11px;color:#888;font-style:italic;margin-bottom:6px;font-family:'JetBrains Mono',monospace}
.placard-desc{font-size:12px;color:#555;line-height:2;margin-bottom:6px}
.placard-meta{font-size:9px;color:#aaa;font-family:'JetBrains Mono',monospace;display:flex;gap:12px;flex-wrap:wrap}
.placard-meta span{display:flex;align-items:center;gap:3px}

/* AUDIO GUIDE */
.audio-tag{display:inline-flex;align-items:center;gap:3px;font-size:8px;color:#888;border:1px solid #ddd;padding:2px 8px;border-radius:10px;font-family:'JetBrains Mono',monospace;cursor:pointer;margin-top:4px}
.audio-tag:hover{border-color:#999;color:#555}

.room-label{font-size:9px;color:#bbb;font-family:'JetBrains Mono',monospace;letter-spacing:3px;margin:16px 0 10px;text-align:center}

.museum-footer{text-align:center;padding:16px;border-top:1px solid #ddd;font-size:8px;color:#bbb;font-family:'JetBrains Mono',monospace;letter-spacing:1px;line-height:2.2}
</style>
</head>
<body>
<div style="font-family:'Amiri',serif;font-size:13px;color:rgba(0,0,0,.06);text-align:center;padding:4px;direction:rtl">بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</div>

<div class="museum-top">
  <div class="m-name">Musée Workshop-DIY</div>
  <div class="m-sub">COLLECTION PERMANENTE · ÉT. 2023 · FRANCE</div>
</div>

<div class="wings">
  <div class="wing active" onclick="showAile('all',this)">TOUT</div>
  <div class="wing" onclick="showAile('robotics',this)">ROBOTIQUE</div>
  <div class="wing" onclick="showAile('ai',this)">AI</div>
  <div class="wing" onclick="showAile('cyber',this)">CYBER</div>
  <div class="wing" onclick="showAile('learning',this)">APPRENTISSAGE</div>
</div>

<div class="gallery" id="gallery"></div>

<div class="museum-footer">
  MUSÉE WORKSHOP-DIY · COLLECTION PERMANENTE<br>
  OUVERT 24/7 · ENTRÉE : GRATUITE · WIFI : password123<br>
  PAS DE FLASH · LES ROBOTS PEUVENT ÊTRE TOUCHÉS (DÉLICATEMENT)
</div>

<script>
const EXPOSITIONS=[
{e:"🤖",title:"bit-bot (Étude pour Robot dans Chrome)",artist:"Workshop-DIY, 2023",desc:"L'œuvre fondatrice de la collection. Un contrôleur de robot basé navigateur utilisant le Web Bluetooth — une technique considérée radicale au moment de sa création. L'œuvre a survécu à 47 impacts physiques, chacun ajoutant à sa patine.",meta:{medium:"HTML/CSS/JS, Web Bluetooth",dims:"Infini × Responsive",acquired:"2023, Collection fondatrice"},wing:"robotics",audio:"L'artiste a commencé avec une seule question : et si un enfant pouvait contrôler un robot sans rien installer ?"},
{e:"🪄",title:"magic-hands (Particules dans l'Espace)",artist:"Workshop-DIY × MediaPipe, 2024",desc:"Une œuvre fascinante dans laquelle le spectateur devient l'art. 21 points de repère de la main sont suivis en temps réel, conjurant des particules qui répondent aux gestes de l'observateur. Une méditation sur la frontière entre physique et numérique.",meta:{medium:"MediaPipe, Canvas API",dims:"21 points × ∞ particules",acquired:"2024"},wing:"ai",audio:"La main est simultanément le pinceau, la toile et le public."},
{e:"🕵️",title:"face-quest (468 Points de Lumière)",artist:"Workshop-DIY × TensorFlow, 2024",desc:"L'artiste cartographie 468 points de repère faciaux en un système de score, transformant le visage humain en plateau de jeu. Remarquable pour son approche strictement privacy-first : aucune donnée ne quitte le navigateur. Une déclaration sur la culture de surveillance.",meta:{medium:"TensorFlow.js, Face Mesh",dims:"468 points de repère",acquired:"2024"},wing:"ai",audio:"À l'ère de la reconnaissance faciale, cette œuvre retourne la caméra vers l'intérieur — un miroir qui rejoue."},
{e:"🔐",title:"pentest-lab (Forteresse, Déconstruite)",artist:"Workshop-DIY, 2024",desc:"Une œuvre controversée qui enseigne le hacking éthique par simulation interactive. L'injection SQL, le XSS et l'escalade de privilèges sont présentés comme des puzzles plutôt que des menaces. Acquise après qu'un élève a utilisé les techniques apprises ici pour divulguer de manière responsable une vulnérabilité d'imprimante scolaire.",meta:{medium:"JavaScript sandboxé",dims:"Variable (selon la surface d'attaque)",acquired:"2024"},wing:"cyber",audio:"La ligne entre hacker et défenseur se dessine dans la documentation."},
{e:"🐧",title:"linux-kids-lab (Le Jardin Terminal)",artist:"Workshop-DIY, 2024",desc:"Un système de fichiers Linux complet simulé dans le navigateur. Le visiteur navigue dans les répertoires comme on traverserait des pièces. Des commandes comme 'ls' et 'cd' deviennent des gestes d'exploration. Une lettre d'amour à la ligne de commande.",meta:{medium:"JavaScript, FS virtuel",dims:"∞ répertoires de profondeur",acquired:"2024"},wing:"learning",audio:"Il y a de la poésie dans 'ls -la'. Il y a du pouvoir dans 'chmod'. Il y a du danger dans 'rm -rf'."},
{e:"🐳",title:"docker-lab (Baleine, Contenue)",artist:"Workshop-DIY, 2025",desc:"Une œuvre pédagogique devenue involontairement comique. Les jeunes visiteurs expliquent systématiquement les concepts de conteneurisation plus clairement que leurs parents ingénieurs logiciels professionnels. L'artiste n'avait pas prévu cela.",meta:{medium:"Concepts Docker, Simulation navigateur",dims:"N conteneurs × M volumes",acquired:"2025"},wing:"learning",audio:"La baleine porte des mondes dans des mondes. Chaque conteneur un univers. Chaque 'docker-compose up' un mythe de création."},
{e:"🧠",title:"teachable-machine (L'Élève Devient le Maître)",artist:"Workshop-DIY × TensorFlow.js, 2024",desc:"Dans cette installation interactive, le visiteur entraîne un modèle de machine learning en démontrant des gestes. Le modèle atteint 98 % de précision — un chiffre devenu légendaire dans la collection.",meta:{medium:"TensorFlow.js, Webcam",dims:"30 échantillons × 98 % de précision",acquired:"2024"},wing:"ai",audio:"Montre-moi trois fois et je te reconnaîtrai pour toujours."},
{e:"☕",title:"Sans titre (Machine à café à 8 %)",artist:"Anonyme (La Machine à café), 2023–présent",desc:"Un readymade. La machine à café de l'association, affichant en permanence « 8 % restant », est devenue la mascotte de facto et le centre spirituel de Workshop-DIY. Elle a préparé environ 1 337 tasses. Son niveau d'approvisionnement n'a jamais dépassé le seuil critique.",meta:{medium:"Espresso, électricité, désespoir",dims:"Unité commerciale standard",acquired:"2023, objet trouvé"},wing:"all",audio:"Je n'ai pas été faite pour être de l'art. J'ai été faite pour servir des espressos. Et pourtant me voilà, dans un musée."},
];

function render(wing){
  const g=document.getElementById('gallery');
  const items=wing==='all'?EXPOSITIONS:EXPOSITIONS.filter(e=>e.wing===wing||wing==='all');
  g.innerHTML=items.map(ex=>`
    <div class="exhibit">
      <div style="position:relative">
        <div class="artwork-light"></div>
        <div class="artwork">${ex.e}</div>
      </div>
      <div class="placard">
        <div class="placard-title">${ex.title}</div>
        <div class="placard-artist">${ex.artist}</div>
        <div class="placard-desc">${ex.desc}</div>
        <div class="placard-meta">
          <span>Médium : ${ex.meta.medium}</span>
          <span>Dimensions : ${ex.meta.dims}</span>
          <span>Acquis : ${ex.meta.acquired}</span>
        </div>
        <div class="audio-tag" onclick="this.textContent=this.textContent.includes('🔊')?'🎧 Audioguide':'🔊 ${ex.audio}'">🎧 Audioguide</div>
      </div>
    </div>
  `).join('');
}

function showAile(w,el){
  document.querySelectorAll('.wing').forEach(w=>w.classList.remove('active'));
  el.classList.add('active');
  render(w);
}

render('all');
</script>

<script src="../../assets/js/sada-footer.js?v=2"></script>
<script src="../../assets/js/sada-nav.js"></script>
</body>
</html>
