<style>
:root{--g:#00ff41;--c:#00d4ff;--r:#ff0033;--o:#ff8800;--y:#ffd700;--p:#bf00ff}
html,body{height:100%;overflow:hidden}
body{background:#0a0a0a;color:var(--g);font-family:'JetBrains Mono',monospace;font-size:13px}

/* CRT */
.crt{position:fixed;inset:0;z-index:999;pointer-events:none}
.crt::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,rgba(0,0,0,.03) 0px,rgba(0,0,0,.03) 1px,transparent 1px,transparent 3px)}
.crt::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse,transparent 60%,rgba(0,0,0,.4))}

/* MATRIX BG */
#mx{position:fixed;inset:0;z-index:0;opacity:.04}

/* TERMINAL */
.term{position:fixed;inset:0;z-index:1;display:flex;flex-direction:column}
.term-bar{padding:6px 12px;display:flex;align-items:center;gap:8px;background:#111;border-bottom:1px solid #1a1a1a;flex-shrink:0}
.dot{width:10px;height:10px;border-radius:50%}.dot-r{background:#ff5f57}.dot-y{background:#ffbd2e}.dot-g{background:#28c840}
.term-title{margin-left:auto;font-size:9px;color:#444;letter-spacing:1px}
.term-body{flex:1;overflow-y:auto;padding:16px 18px;scroll-behavior:smooth}
.term-body::-webkit-scrollbar{width:4px}.term-body::-webkit-scrollbar-track{background:transparent}.term-body::-webkit-scrollbar-thumb{background:#1a1a1a;border-radius:2px}

/* OUTPUT */
.out{margin-bottom:2px;line-height:1.8;white-space:pre-wrap;word-break:break-word}
.out.dim{color:rgba(0,255,65,.2)}.out.cyan{color:var(--c)}.out.red{color:var(--r)}.out.orange{color:var(--o)}.out.yellow{color:var(--y)}.out.purple{color:var(--p)}
.out.bold{font-weight:700}.out.heading{color:var(--c);font-weight:700;font-size:14px;margin-top:6px}
.out.art{color:var(--g);opacity:.6;line-height:1.25;margin:4px 0}
.out.warn{color:var(--o);border-left:2px solid var(--o);padding-left:8px;margin:4px 0}
.out.error{color:var(--r);border-left:2px solid var(--r);padding-left:8px;margin:4px 0}
.out.success{color:var(--g);border-left:2px solid var(--g);padding-left:8px;margin:4px 0}
.out.box{border:1px solid rgba(0,255,65,.08);border-radius:3px;padding:8px 12px;margin:6px 0;background:rgba(0,255,65,.01)}
.out a{color:var(--c);text-decoration:none}.out a:hover{text-decoration:underline}

/* app card in terminal */
.app-card{border:1px solid rgba(0,255,65,.08);border-radius:3px;padding:10px 14px;margin:6px 0;background:rgba(0,255,65,.01);display:inline-block;max-width:400px}
.app-card .name{font-weight:700;color:var(--c);font-size:14px;margin-bottom:2px}
.app-card .desc{color:rgba(0,255,65,.45);font-size:11px;line-height:1.7}
.app-card .cats{margin-top:4px;font-size:9px;color:var(--p)}
.app-card .badge{display:inline-block;padding:1px 6px;border-radius:2px;font-size:8px;font-weight:700;letter-spacing:1px;margin-top:4px}
.badge-popular{background:rgba(255,215,0,.1);color:var(--y);border:1px solid rgba(255,215,0,.2)}
.badge-stable{background:rgba(0,255,65,.06);color:var(--g);border:1px solid rgba(0,255,65,.12)}
.badge-dev{background:rgba(191,0,255,.08);color:var(--p);border:1px solid rgba(191,0,255,.15)}
.badge-new{background:rgba(0,212,255,.08);color:var(--c);border:1px solid rgba(0,212,255,.15)}

/* progress bar */
.pbar{width:200px;height:8px;background:rgba(0,255,65,.06);border-radius:2px;overflow:hidden;display:inline-block;vertical-align:middle;margin-left:6px}
.pbar-f{height:100%;background:var(--g);box-shadow:0 0 4px var(--g);border-radius:2px;animation:pGrow 1.5s ease forwards}
@keyframes pGrow{from{width:0}to{width:100%}}

/* INPUT */
.input-row{padding:8px 18px;display:flex;align-items:center;gap:0;border-top:1px solid #1a1a1a;flex-shrink:0;background:#0a0a0a}
.prompt{color:var(--c);white-space:nowrap;flex-shrink:0}
.prompt .at{color:var(--g)}.prompt .path{color:var(--y)}
#cmdInput{background:none;border:none;color:var(--g);font-family:inherit;font-size:13px;flex:1;outline:none;caret-color:var(--g);padding-left:6px}

/* STATUT BAR */
.status{padding:3px 12px;display:flex;justify-content:space-between;font-size:7px;color:#333;border-top:1px solid #111;flex-shrink:0;background:#080808}

/* MATRIX TOGGLE */
.matrix-mode #mx{opacity:.15!important}
.matrix-mode .term-body{background:rgba(0,0,0,.85)}
</style>
</head>
<body>
<div style="font-family:'Amiri',serif;font-size:13px;color:rgba(255,255,255,.08);text-align:center;padding:4px;direction:rtl">بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</div>

}

  d.className='app-card';
  d.innerHTML=`<div class="name">${app.e} ${app.n}</div><div class="desc">${app.d}</div><div class="cats">${app.c.map(c=>CATS[c]?CATS[c].e+' '+CATS[c].n:c).join(' · ')}</div><div class="badge ${bMap[app.b]||''}</div>`;
  out.appendChild(d);
  out.scrollTop=out.scrollHeight;
}

// PROCESS
async function processCmd(raw){
  const trimmed=raw.trim();
  if(!trimmed)return;
  cmdHistory.push(trimmed);
  histIdx=cmdHistory.length;
  cmdCount++;
  document.getElementById('cmdCount').textContent=cmdCount+' commands';

  printPrompt(trimmed);
  const parts=trimmed.split(/\s+/);
  const cmd=parts[0].toLowerCase();
  const args=parts.slice(1).join(' ');

  if(commands[cmd]){
    await commands[cmd](args);
  }else if(cmd==='sudo'&&args){
    await commands.sudo(args);
  }else{
    print(`bash: ${cmd}: commande non trouvée`,'error');
    print(`// essaie "help" pour la liste des commandes`,'dim');
  }
  print('');
}

// INPUT
inp.addEventListener('keydown',e=>{
  if(e.key==='Enter'){processCmd(inp.value);inp.value=''}
  if(e.key==='ArrowUp'){e.preventDefault();if(histIdx>0){histIdx--;inp.value=cmdHistory[histIdx]}}
  if(e.key==='ArrowDown'){e.preventDefault();if(histIdx<cmdHistory.length-1){histIdx++;inp.value=cmdHistory[histIdx]}else{histIdx=cmdHistory.length;inp.value=''}}
  if(e.key==='Tab'){
    e.preventDefault();
    const v=inp.value.trim().toLowerCase();
    const match=Object.keys(commands).find(c=>c.startsWith(v));
    if(match)inp.value=match+' ';
  }
  if(e.key==='l'&&e.ctrlKey){e.preventDefault();commands.clear()}
});
document.addEventListener('click',()=>inp.focus());
