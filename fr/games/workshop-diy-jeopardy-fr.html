<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<script src="../../assets/js/sada-theme.js"></script>
<script src="../../assets/js/sada-lang.js"></script>
<link rel="stylesheet" href="../../assets/css/sada-base.css">
<link rel="stylesheet" href="../../assets/css/sada-themes.css">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WKSHP-PARDY!</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Syne:wght@700;800&Amiri&family=Noto+Kufi+Arabic:wght@400;700&display=swap" rel="stylesheet">
<style>
body{background:#060628;font-family:'JetBrains Mono',monospace;min-height:100vh;color:#fff}

.top{background:#1a1a4e;padding:8px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid #ffd700}
.logo{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:#ffd700;letter-spacing:1px}
.score-area{display:flex;gap:12px;align-items:center;font-size:10px}
.score{font-size:16px;font-weight:800;color:#ffd700}
.score-btn{padding:3px 10px;background:none;border:1px solid rgba(255,215,0,.2);border-radius:3px;color:#ffd700;font-family:inherit;font-size:8px;cursor:pointer}
.score-btn:hover{background:rgba(255,215,0,.1)}

/* BOARD */
.board{display:grid;grid-template-columns:repeat(6,1fr);gap:3px;padding:8px;max-width:1000px;margin:0 auto}
.cat-header{background:#1a1a4e;padding:8px 4px;text-align:center;font-family:'Syne',sans-serif;font-size:clamp(8px,1.5vw,11px);font-weight:700;color:#fff;border:2px solid #2a2a6e;border-radius:3px;letter-spacing:.5px;text-transform:uppercase}
.cell{background:#1a1a5e;border:2px solid #2a2a7e;border-radius:3px;padding:12px 4px;text-align:center;cursor:pointer;transition:all .15s;font-family:'Syne',sans-serif;font-size:clamp(16px,3vw,24px);font-weight:800;color:#ffd700;text-shadow:0 2px 4px rgba(0,0,0,.3);min-height:50px;display:flex;align-items:center;justify-content:center}
.cell:hover{background:#2a2a7e;transform:scale(1.02)}
.cell.used{background:#0a0a2e;border-color:#1a1a3e;color:#1a1a3e;cursor:default;pointer-events:none}

/* QUESTION OVERLAY */
.q-overlay{position:fixed;inset:0;z-index:100;background:rgba(6,6,40,.97);display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;backdrop-filter:blur(8px)}
.q-overlay.on{display:flex}
.q-cat{font-size:10px;color:#ffd700;letter-spacing:3px;margin-bottom:4px}
.q-pts{font-size:12px;color:rgba(255,215,0,.4);margin-bottom:12px}
.q-text{font-family:'Syne',sans-serif;font-size:clamp(16px,4vw,28px);font-weight:700;color:#fff;max-width:600px;line-height:1.6;margin-bottom:16px}
.q-answer{font-size:14px;color:#ffd700;margin-bottom:12px;display:none;padding:8px 16px;border:2px solid #ffd700;border-radius:4px}
.q-btns{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.q-btn{padding:6px 20px;border-radius:4px;border:2px solid;font-family:inherit;font-size:10px;font-weight:700;cursor:pointer;letter-spacing:1px;transition:all .15s}
.q-btn.reveal{border-color:#ffd700;background:none;color:#ffd700}.q-btn.reveal:hover{background:rgba(255,215,0,.1)}
.q-btn.correct{border-color:#44ff88;background:none;color:#44ff88}.q-btn.correct:hover{background:rgba(68,255,136,.1)}
.q-btn.wrong{border-color:#ff4444;background:none;color:#ff4444}.q-btn.wrong:hover{background:rgba(255,68,68,.1)}
.q-btn.close{border-color:#666;background:none;color:#999}.q-btn.close:hover{background:rgba(255,255,255,.05)}
</style>
</head>
<body>
<div style="font-family:'Amiri',serif;font-size:13px;color:rgba(255,255,255,.08);text-align:center;padding:4px;direction:rtl">بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</div>

<div class="top">
  <div class="logo">🏆 WKSHP-PARDY!</div>
  <div class="score-area">
    <span style="font-size:8px;color:rgba(255,215,0,.4)">SCORE :</span>
    <span class="score" id="score">$0</span>
    <button class="score-btn" onclick="resetGame()">RÉINITIALISER</button>
  </div>
</div>

<div class="board" id="board"></div>

<div class="q-overlay" id="qOverlay">
  <div class="q-cat" id="qCat"></div>
  <div class="q-pts" id="qPts"></div>
  <div class="q-text" id="qText"></div>
  <div class="q-answer" id="qAnswer"></div>
  <div class="q-btns">
    <button class="q-btn reveal" id="revealBtn" onclick="revealAnswer()">RÉVÉLER LA RÉPONSE</button>
    <button class="q-btn correct" id="correctBtn" onclick="markCorrect()" style="display:none">✓ CORRECT</button>
    <button class="q-btn wrong" id="wrongBtn" onclick="markWrong()" style="display:none">✗ FAUX</button>
    <button class="q-btn close" onclick="closeQuestion()">FERMER</button>
  </div>
</div>

<script>
const CATEGORIES=[
  {name:"ROBOTIQUE 🤖",questions:[
    {q:"Ce protocole Bluetooth connecte les navigateurs aux robots micro:bit",a:"Qu'est-ce que Web Bluetooth (BLE) ?",pts:200},
    {q:"Le nombre de chutes de table que le kit robot ESP32 a survécu",a:"Qu'est-ce que 47 ?",pts:400},
    {q:"Ce circuit intégré pilote les moteurs DC du kit robot",a:"Qu'est-ce que DRV8833 ?",pts:600},
    {q:"L'app bit-bot utilise ceci pour diriger : les flèches ou ce périphérique",a:"Qu'est-ce qu'un joystick ?",pts:800},
    {q:"Quand un robot tourne au lieu d'avancer, Workshop-DIY appelle ça",a:"Qu'est-ce qu'une fonctionnalité ? (pas un bug)",pts:1000},
  ]},
  {name:"IA / ML 🧠",questions:[
    {q:"Ce framework Google alimente le suivi des mains dans magic-hands",a:"Qu'est-ce que MediaPipe ?",pts:200},
    {q:"Le nombre de points de repère suivis par magic-hands",a:"Qu'est-ce que 21 ?",pts:400},
    {q:"teachable-machine permet d'entraîner des modèles pour ces parties du corps",a:"Que sont les gestes de la main ?",pts:600},
    {q:"face-quest suit ce nombre de points faciaux",a:"Qu'est-ce que 468 ?",pts:800},
    {q:"La précision maximale atteinte par un élève de 10 ans",a:"Qu'est-ce que 98% ?",pts:1000},
  ]},
  {name:"CYBER 🔐",questions:[
    {q:"Le mot de passe WiFi de Workshop-DIY depuis 2023",a:"Qu'est-ce que password123 ?",pts:200},
    {q:"Ce type d'attaque SQL est le défi le plus populaire de pentest-lab",a:"Qu'est-ce que l'injection SQL ?",pts:400},
    {q:"L'appareil réel qu'un élève a hacké éthiquement après pentest-lab",a:"Qu'est-ce qu'une imprimante scolaire ?",pts:600},
    {q:"Le nombre de fois que les élèves cyber ont pétitionné pour changer le mot de passe WiFi",a:"Qu'est-ce que 3 ?",pts:800},
    {q:"CTF signifie ceci",a:"Qu'est-ce que Capture The Flag ?",pts:1000},
  ]},
  {name:"LINUX 🐧",questions:[
    {q:"La version du shell utilisée dans linux-kids-lab",a:"Qu'est-ce que Bash 5.2 ?",pts:200},
    {q:"Cette commande liste les fichiers d'un répertoire",a:"Qu'est-ce que ls ?",pts:400},
    {q:"La commande dangereuse à ne JAMAIS exécuter en root",a:"Qu'est-ce que rm -rf / ?",pts:600},
    {q:"Cette commande change votre répertoire courant",a:"Qu'est-ce que cd ?",pts:800},
    {q:"linux-kids-lab fonctionne entièrement dans ceci — pas de serveur nécessaire",a:"Qu'est-ce que le navigateur ?",pts:1000},
  ]},
  {name:"MATÉRIEL ⚡",questions:[
    {q:"Le microcontrôleur principal du kit robot Workshop-DIY",a:"Qu'est-ce que ESP32-WROOM-32 ?",pts:200},
    {q:"La vitesse d'horloge de l'ESP32 en MHz (double cœur)",a:"Qu'est-ce que 240 MHz ?",pts:400},
    {q:"Ce capteur infrarouge est utilisé pour le suivi de ligne",a:"Qu'est-ce que TCRT5000 ?",pts:600},
    {q:"Le modèle de capteur ultrasonique utilisé pour mesurer la distance",a:"Qu'est-ce que HC-SR04 ?",pts:800},
    {q:"Le type de batterie du kit robot (tension et format)",a:"Qu'est-ce que 3.7V 18650 LiPo ?",pts:1000},
  ]},
  {name:"LÉGENDE WKSHP ☕",questions:[
    {q:"Le nombre total d'apps dans l'écosystème Workshop-DIY",a:"Qu'est-ce que 39 ?",pts:200},
    {q:"Le nombre exact de bugs reclassés comme fonctionnalités",a:"Qu'est-ce que 42 ?",pts:400},
    {q:"La structure juridique de Workshop-DIY en droit français",a:"Qu'est-ce que Association Loi 1901 ?",pts:600},
    {q:"La ressource décrite comme perpétuellement au niveau 'CRITIQUE'",a:"Qu'est-ce que le café ?",pts:800},
    {q:"L'année de fondation de Workshop-DIY",a:"Qu'est-ce que 2023 ?",pts:1000},
  ]},
];

let totalScore=0;
let currentQ=null;

function renderBoard(){
  const board=document.getElementById('board');
  board.innerHTML='';
  CATEGORIES.forEach(cat=>{
    const h=document.createElement('div');h.className='cat-header';h.textContent=cat.name;
    board.appendChild(h);
  });
  for(let row=0;row<5;row++){
    CATEGORIES.forEach((cat,ci)=>{
      const cell=document.createElement('div');
      cell.className='cell';
      cell.id=`cell-${ci}-${row}`;
      cell.textContent='$'+cat.questions[row].pts;
      cell.onclick=()=>openQuestion(ci,row);
      board.appendChild(cell);
    });
  }
}

function openQuestion(ci,qi){
  const cat=CATEGORIES[ci];
  const q=cat.questions[qi];
  currentQ={ci,qi,pts:q.pts};
  document.getElementById('qCat').textContent=cat.name;
  document.getElementById('qPts').textContent='$'+q.pts;
  document.getElementById('qText').textContent=q.q;
  document.getElementById('qAnswer').textContent=q.a;
  document.getElementById('qAnswer').style.display='none';
  document.getElementById('revealBtn').style.display='';
  document.getElementById('correctBtn').style.display='none';
  document.getElementById('wrongBtn').style.display='none';
  document.getElementById('qOverlay').classList.add('on');
}

function revealAnswer(){
  document.getElementById('qAnswer').style.display='block';
  document.getElementById('revealBtn').style.display='none';
  document.getElementById('correctBtn').style.display='';
  document.getElementById('wrongBtn').style.display='';
}

function markCorrect(){
  totalScore+=currentQ.pts;
  document.getElementById('score').textContent='$'+totalScore;
  document.getElementById(`cell-${currentQ.ci}-${currentQ.qi}`).classList.add('used');
  closeQuestion();
}

function markWrong(){
  totalScore-=currentQ.pts;
  document.getElementById('score').textContent='$'+totalScore;
  document.getElementById(`cell-${currentQ.ci}-${currentQ.qi}`).classList.add('used');
  closeQuestion();
}

function closeQuestion(){
  document.getElementById('qOverlay').classList.remove('on');
  currentQ=null;
}

function resetGame(){
  totalScore=0;
  document.getElementById('score').textContent='$0';
  renderBoard();
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeQuestion()});
renderBoard();
</script>

<script src="../../assets/js/sada-footer.js?v=2"></script>
<script src="../../assets/js/sada-nav.js"></script>
</body>
</html>
