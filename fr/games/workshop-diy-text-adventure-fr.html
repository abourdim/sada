<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<script src="../../assets/js/sada-theme.js"></script>
<script src="../../assets/js/sada-lang.js"></script>
<link rel="stylesheet" href="../../assets/css/sada-base.css">
<link rel="stylesheet" href="../../assets/css/sada-themes.css">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WKSHP-DIY // AVENTURE TEXTE</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&Amiri&family=Noto+Kufi+Arabic:wght@400;700&display=swap" rel="stylesheet">
<style>
body{background:#050508;color:#00ff41;font-family:'JetBrains Mono',monospace;font-size:12px;height:100vh;display:flex;flex-direction:column}
.output{flex:1;overflow-y:auto;padding:12px;line-height:2.2}
.output::-webkit-scrollbar{width:3px}.output::-webkit-scrollbar-thumb{background:rgba(0,255,65,.15)}
.output .room{color:#ffd700;font-weight:700;font-size:13px;margin-top:8px}
.output .desc{color:rgba(0,255,65,.5)}
.output .item{color:#0af}
.output .npc{color:#ff0066}
.output .sys{color:rgba(0,255,65,.2);font-size:10px}
.output .err{color:#ff4444}
.output .win{color:#ffd700;font-size:14px;font-weight:700}
.input-row{display:flex;border-top:1px solid rgba(0,255,65,.08);padding:6px 12px;background:#080810}
.prompt{color:#00ff41;margin-right:6px;font-weight:700}
input{flex:1;background:none;border:none;color:#00ff41;font-family:inherit;font-size:12px;outline:none;caret-color:#00ff41}
input::placeholder{color:rgba(0,255,65,.15)}
.inv-bar{padding:4px 12px;background:#060610;border-top:1px solid rgba(0,255,65,.04);font-size:8px;color:rgba(0,255,65,.2);display:flex;gap:8px;flex-wrap:wrap}
.inv-item{color:rgba(0,255,65,.35);border:1px solid rgba(0,255,65,.06);padding:1px 6px;border-radius:2px}
</style>
</head>
<body>
<div style="font-family:'Amiri',serif;font-size:13px;color:rgba(255,255,255,.08);text-align:center;padding:4px;direction:rtl">بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</div>
<div class="output" id="out"></div>
<div class="inv-bar"><span>INVENTAIRE :</span><span id="invDisplay">vide</span></div>
<div class="input-row"><span class="prompt">&gt;</span><input id="inp" placeholder="Tapez une commande (essayez : look, go north, take, help)" autofocus></div>

<script>
const rooms={
lobby:{name:"Hall d'Accueil",desc:"Tu te tiens dans le hall lumineux de Workshop-DIY. Une bannière indique '39 Apps. 7 Domaines. ∞ Possibilités.' Des portes mènent au <b>nord</b> vers le Labo Robotique, à l'<b>est</b> vers le Studio IA, et au <b>sud</b> vers l'Antre Cyber. Une <b>machine à café</b> ronronne dans le coin. Un <b>panneau</b> est accroché au mur.",items:["sign","coffee machine"],exits:{north:"robolab",east:"aistudio",south:"cyberden"}},
robolab:{name:"Labo Robotique",desc:"Des établis couverts de cartes ESP32, moteurs et fils emmêlés. Un <b>robot</b> est posé au bord d'un bureau, dangereusement proche de la chute. Un <b>fer à souder</b> chauffe. Des portes mènent au <b>sud</b> vers le hall et à l'<b>est</b> vers la Salle Serveur.",items:["robot","soldering iron","resistor"],exits:{south:"lobby",east:"server"}},
aistudio:{name:"Studio IA",desc:"Des webcams montées partout. Un écran affiche les points de repère MediaPipe des mains en temps réel. Un <b>carnet</b> sur le bureau contient des notes d'entraînement IA. Un <b>diagramme de réseau neuronal</b> couvre un mur. L'<b>ouest</b> mène au hall, le <b>nord</b> à la Salle Serveur.",items:["notebook","neural network diagram"],exits:{west:"lobby",north:"server"}},
cyberden:{name:"Antre Cyber",desc:"Éclairage rouge tamisé. Plusieurs écrans affichent des terminaux et des schémas réseau. Un <b>terminal verrouillé</b> attend un mot de passe. Une <b>clé USB</b> est posée sur le bureau. Le <b>nord</b> ramène au hall.",items:["locked terminal","usb drive"],exits:{north:"lobby"}},
server:{name:"Salle Serveur",desc:"Froide et bourdonnante. Les baies serveur clignotent d'activité. Un <b>tableau de bord Docker</b> à l'écran montre 39 containers en cours. Une mystérieuse <b>porte verrouillée</b> au <b>nord</b> a un clavier nécessitant un code à 4 chiffres. Le <b>sud</b> mène au Studio IA, l'<b>ouest</b> au Labo Robotique.",items:["docker dashboard","locked door"],exits:{south:"aistudio",west:"robolab",north:"vault"}},
vault:{name:"Le Coffre-Fort",desc:"Tu as trouvé la salle secrète ! Des étagères de prototypes matériels, des apps non publiées, et un <b>trophée</b> doré inscrit : 'Champion Workshop-DIY — Les Bugs Sont Des Fonctionnalités Depuis 2023.' Un <b>tableau blanc</b> montre les plans de l'App #40.",items:["trophy","whiteboard"],exits:{south:"server"},locked:true},
};

let cur="lobby",inv=[],out=document.getElementById("out"),unlocked={vault:false},termUnlocked=false,moves=0;
const found=new Set();

function print(txt,cls=""){out.innerHTML+=`<div class="${cls}">${txt}</div>`;out.scrollTop=out.scrollHeight}
function printRoom(){
  const r=rooms[cur];
  print(r.name,"room");
  print(r.desc,"desc");
  print(`Sorties : ${Object.keys(r.exits).join(", ")}`,"sys");
}
function updateInv(){
  document.getElementById("invDisplay").innerHTML=inv.length?inv.map(i=>`<span class="inv-item">${i}</span>`).join(""):"vide";
}

function parse(input){
  const raw=input.toLowerCase().trim();
  if(!raw)return;
  moves++;
  print(`<span style="color:rgba(0,255,65,.15)">> ${input}</span>`);
  const words=raw.split(/\s+/);
  const cmd=words[0];
  const rest=words.slice(1).join(" ");

  if(cmd==="help"){
    print("Commandes : <b>look</b>, <b>go [direction]</b>, <b>take [objet]</b>, <b>use [objet]</b>, <b>inventory</b>, <b>examine [objet]</b>, <b>talk</b>, <b>hint</b>","sys");
    return;
  }
  if(cmd==="look"||cmd==="l"){printRoom();return}
  if(cmd==="inventory"||cmd==="inv"||cmd==="i"){
    print(inv.length?`Tu portes : ${inv.join(", ")}`:"Ton inventaire est vide.");return;
  }
  if(cmd==="go"||cmd==="move"||cmd==="n"||cmd==="s"||cmd==="e"||cmd==="w"||cmd==="north"||cmd==="south"||cmd==="east"||cmd==="west"){
    let dir=rest||cmd;
    if(dir==="n")dir="north";if(dir==="s")dir="south";if(dir==="e")dir="east";if(dir==="w")dir="west";
    const r=rooms[cur];
    if(!r.exits[dir]){print("Vous ne pouvez pas aller par là.","err");return}
    const dest=r.exits[dir];
    if(rooms[dest].locked&&!unlocked[dest]){
      print("La porte est verrouillée. Elle nécessite un code à 4 chiffres.","err");
      print("Essaie : <b>use code [nombre]</b>","sys");
      return;
    }
    cur=dest;printRoom();return;
  }
  if(cmd==="take"||cmd==="get"||cmd==="grab"||cmd==="pick"){
    const r=rooms[cur];
    const item=r.items?.find(i=>i.toLowerCase().includes(rest));
    if(!item){print("Tu ne vois pas ça ici.","err");return}
    if(["coffee machine","locked terminal","docker dashboard","locked door","neural network diagram","robot","whiteboard"].includes(item)){
      print(`Tu ne peux pas prendre le/la ${item}. Essaie <b>examine</b> ou <b>use</b> à la place.`);return;
    }
    inv.push(item);
    r.items=r.items.filter(i=>i!==item);
    found.add(item);
    print(`Tu prends le/la <span class="item">${item}</span>.`);
    updateInv();
    return;
  }
  if(cmd==="examine"||cmd==="x"||cmd==="look at"||cmd==="inspect"){
    if(rest.includes("sign"))print("Le panneau indique : 'WiFi : password123 — Non, on ne le change pas. Arrêtez de demander.'");
    else if(rest.includes("coffee"))print("La machine à café affiche : 'STOCK CRITIQUE — 8% restant.' Un autocollant dit 'Cette machine a préparé 1 337 tasses.'");
    else if(rest.includes("robot"))print("Un petit robot ESP32 sur roues. Il a survécu à 47 chutes. Une étiquette indique 'bit-bot v4.2'. Il a l'air... courageux.","item");
    else if(rest.includes("terminal"))print(termUnlocked?"Le terminal est déverrouillé. Il affiche : 'ACCÈS ACCORDÉ — CODE COFFRE : 4242'":"L'écran du terminal montre : 'ENTRER MOT DE PASSE : ________'. Le curseur clignote de manière menaçante.","item");
    else if(rest.includes("notebook"))print("Le carnet contient des diagrammes dessinés à la main des points de repère MediaPipe. La page 42 est cornée. Écrit dans la marge : 'Le mot de passe est le mot de passe WiFi.'","item");
    else if(rest.includes("docker"))print("39 containers en cours. Tous en bonne santé. Le container #42 a l'étiquette : 'NE PAS SUPPRIMER — C'EST UNE FONCTIONNALITÉ'","item");
    else if(rest.includes("usb"))print("Une clé USB étiquetée 'SAUVEGARDE — IMPORTANT'. Elle pourrait être utile quelque part avec un terminal...","item");
    else if(rest.includes("resistor"))print("Une résistance de 330Ω. Marron-orange-marron-or. Essentielle pour les circuits LED. Tout maker en a besoin.","item");
    else if(rest.includes("soldering"))print("Un Hakko FX-888D à 350°C. Assez chaud pour souder des fils. Assez chaud pour brûler des doigts. À manipuler avec respect.");
    else if(rest.includes("trophy"))print("🏆 Le trophée doré brille doucement. Inscription : 'À celui qui a trouvé cette salle — tu es la 40e app. Les bugs sont des fonctionnalités. Tu es une fonctionnalité.'","win");
    else if(rest.includes("whiteboard"))print("Plans pour 'App #40 : ???'. Notes : 'Utilise les 7 domaines simultanément. Fonctionne au café. Date de sortie : quand c'est prêt (donc jamais).'");
    else if(rest.includes("door"))print("Une porte en acier renforcé avec un clavier. Elle nécessite un code à 4 chiffres. Il doit y avoir un indice quelque part...");
    else if(rest.includes("network")||rest.includes("diagram"))print("Un diagramme de réseau neuronal montrant 39 nœuds (apps) connectés à travers 7 couches cachées (domaines). Beau et terrifiant.");
    else print("Tu ne vois rien de spécial à ce sujet.","err");
    return;
  }
  if(cmd==="use"){
    if(rest.includes("coffee")){print("Tu appuies sur le bouton. La machine ronronne... et distribue un espresso parfait. ☕ Tu te sens plein d'énergie. +10 concentration.","item");return}
    if(rest.includes("usb")&&cur==="cyberden"){
      if(!inv.includes("usb drive")){print("Tu dois d'abord ramasser la clé USB.","err");return}
      print("Tu branches la clé USB dans le terminal. Les fichiers se chargent... elle contient l'outil de récupération de mot de passe !","item");
      termUnlocked=true;
      print("L'écran du terminal affiche maintenant : 'ACCÈS ACCORDÉ'","item");
      print("Tu vois un message : 'CODE COFFRE : <b>4242</b>'","win");
      return;
    }
    if(rest.includes("code")){
      const code=rest.match(/\d+/);
      if(code&&code[0]==="4242"){
        unlocked.vault=true;
        print("✅ CODE ACCEPTÉ. La porte du coffre s'ouvre avec un sifflement mécanique.","win");
        print("Tape <b>go north</b> pour entrer dans le coffre.","sys");
      }else{
        print("❌ CODE INCORRECT. Le clavier bipe de colère.","err");
      }
      return;
    }
    if(rest.includes("soldering")){print("Tu soudes soigneusement un fil. Un filet de fumée s'élève. C'est étrangement satisfaisant.");return}
    if(rest.includes("robot")){print("Tu touches le robot. Il vacille dangereusement au bord du bureau. Peut-être pas.");return}
    print("Tu ne peux pas utiliser ça ici.","err");return;
  }
  if(cmd==="talk"){
    if(cur==="robolab")print("<span class='npc'>Le robot bipe :</span> 'J'ai survécu à 47 chutes. Je suis indestructible. S'il te plaît, ne teste pas cette théorie.'","npc");
    else if(cur==="aistudio")print("<span class='npc'>Une voix sort des haut-parleurs :</span> 'Je suis le teachable-machine. Montre-moi 30 exemples et j'apprendrai tout. Sauf la patience.'","npc");
    else if(cur==="cyberden")print("<span class='npc'>Une silhouette dans l'ombre murmure :</span> 'Le mot de passe... il a toujours été le même. Tout le monde le connaît. Personne ne le change. Il est... éternel.'","npc");
    else if(cur==="server")print("<span class='npc'>Démon Docker :</span> 'Je contiens 39 mondes, chacun isolé, chacun parfait. Le container #42 devait être supprimé. Il a refusé.'","npc");
    else if(cur==="vault")print("<span class='npc'>Le trophée parle :</span> 'Tu m'as trouvé. Peu y arrivent. Tu as la curiosité d'un vrai maker. Maintenant, va construire quelque chose.'","npc");
    else print("Il n'y a personne à qui parler ici.");
    return;
  }
  if(cmd==="hint"){
    print("💡 Indices : 1) Lis le carnet dans le Studio IA. 2) La clé USB dans l'Antre Cyber est utile avec le terminal. 3) Le code du coffre est révélé après avoir déverrouillé le terminal. 4) Examine tout !","sys");
    return;
  }
  if(raw==="xyzzy"){print("Rien ne se passe. Ce n'est pas ce genre d'aventure. ...Ou si ?");return}
  if(raw==="password123"){print("C'est le mot de passe WiFi, pas une commande. Mais oui, on le connaît tous.");return}
  print(`Je ne comprends pas '${raw}'. Tape <b>help</b> pour les commandes.`,"err");
}

// INIT
print(`<div style="color:#ffd700;font-size:14px;font-weight:700">WORKSHOP-DIY : L'AVENTURE TEXTE</div>`);
print(`<div style="color:rgba(0,255,65,.2);font-size:8px;letter-spacing:2px">UNE EXPÉRIENCE DE FICTION INTERACTIVE RÉTRO</div>`);
print("","");
print("Tu te réveilles au siège de Workshop-DIY. Les lumières sont allumées. La machine à café ronronne. 39 apps sont déployées. Mais quelque part dans ce bâtiment, il y a un coffre-fort secret contenant le légendaire Trophée du Vrai Maker.","desc");
print("","");
print("Tape <b>help</b> pour les commandes. <b>look</b> pour regarder autour. <b>go [direction]</b> pour se déplacer.","sys");
print("","");
printRoom();

document.getElementById("inp").addEventListener("keydown",e=>{
  if(e.key==="Enter"){const v=e.target.value;e.target.value="";parse(v)}
});
</script>

<script src="../../assets/js/sada-footer.js?v=2"></script>
<script src="../../assets/js/sada-nav.js"></script>
</body>
</html>
