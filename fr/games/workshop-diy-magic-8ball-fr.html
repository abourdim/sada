<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<script src="../../assets/js/sada-theme.js"></script>
<script src="../../assets/js/sada-lang.js"></script>
<link rel="stylesheet" href="../../assets/css/sada-base.css">
<link rel="stylesheet" href="../../assets/css/sada-themes.css">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WKSHP-DIY // BOULE MAGIQUE 42</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@700;800&Amiri&family=Noto+Kufi+Arabic:wght@400;700&display=swap" rel="stylesheet">
<style>
body{background:radial-gradient(ellipse at center,#1a0a2a,#0a0a14);color:#fff;font-family:'JetBrains Mono',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;overflow:hidden}

h1{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:rgba(255,255,255,.1);letter-spacing:4px;margin-bottom:4px}
.sub{font-size:8px;color:rgba(255,255,255,.05);letter-spacing:2px;margin-bottom:14px}

/* 8-BALL */
.ball-container{position:relative;cursor:pointer;-webkit-tap-highlight-color:transparent}

.ball{width:clamp(200px,50vw,260px);height:clamp(200px,50vw,260px);border-radius:50%;background:radial-gradient(ellipse at 35% 30%,#444,#111,#000);box-shadow:inset -10px -10px 30px rgba(0,0,0,.8),0 0 40px rgba(0,0,0,.3),0 0 80px rgba(100,0,200,.05);display:flex;align-items:center;justify-content:center;transition:transform .1s}
.ball:active{transform:scale(.97)}
.ball.shake{animation:shake .5s}
@keyframes shake{0%,100%{transform:rotate(0)}25%{transform:rotate(-5deg) scale(.97)}50%{transform:rotate(5deg) scale(.97)}75%{transform:rotate(-3deg) scale(.97)}}

/* WINDOW */
.window{width:110px;height:110px;border-radius:50%;background:radial-gradient(circle,#0a0a3a,#050520);border:3px solid #222;display:flex;align-items:center;justify-content:center;overflow:hidden}

/* TRIANGLE */
.triangle{width:0;height:0;border-left:40px solid transparent;border-right:40px solid transparent;border-bottom:70px solid rgba(0,50,200,.15);position:relative;opacity:0;transition:opacity .8s;display:flex;align-items:center;justify-content:center}
.triangle.show{opacity:1}
.answer{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-size:8px;font-weight:700;color:#fff;text-align:center;width:70px;line-height:1.5;text-shadow:0 0 6px rgba(100,150,255,.3)}

/* QUESTION INPUT */
.ask{margin-top:16px;text-align:center;max-width:300px}
.ask input{width:100%;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);border-radius:20px;padding:8px 16px;color:rgba(255,255,255,.3);font-family:inherit;font-size:11px;text-align:center;outline:none}
.ask input::placeholder{color:rgba(255,255,255,.08)}
.ask input:focus{border-color:rgba(100,0,200,.15)}

.instruction{font-size:8px;color:rgba(255,255,255,.06);margin-top:8px;text-align:center;letter-spacing:1px}

.counter{font-size:7px;color:rgba(255,255,255,.03);margin-top:6px;letter-spacing:1px}

.footer{position:fixed;bottom:8px;font-size:5px;color:rgba(255,255,255,.02);letter-spacing:1px}
</style>
</head>
<body>
<div style="font-family:'Amiri',serif;font-size:13px;color:rgba(255,255,255,.08);text-align:center;padding:4px;direction:rtl">بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</div>

<h1>BOULE MAGIQUE 42</h1>
<div class="sub">CONSULTEZ L'ORACLE DE WORKSHOP-DIY</div>

<div class="ball-container" onclick="shake()">
  <div class="ball" id="ball">
    <div class="window">
      <div class="triangle" id="tri">
        <div class="answer" id="answer">DEMANDEZ-MOI</div>
      </div>
    </div>
  </div>
</div>

<div class="ask">
  <input type="text" id="question" placeholder="Posez une question Workshop-DIY..." onkeydown="if(event.key==='Enter')shake()">
</div>

<div class="instruction">CLIQUEZ SUR LA BOULE OU APPUYEZ SUR ENTRÉE POUR RECEVOIR LA SAGESSE</div>
<div class="counter" id="counter">Consultations : 0</div>

<div class="footer">BOULE MAGIQUE 42 · NON RESPONSABLE DES CRISES EXISTENTIELLES · LES BUGS SONT TOUJOURS LA RÉPONSE</div>

<script>
const ANSWERS=[
  // POSITIF
  "C'EST CERTAIN\n(comme password123)",
  "SANS AUCUN\nDOUTE",
  "OUI — LA\nCOLLE CHAUDE\nTIENDRA",
  "TOUT INDIQUE\nQUE OUI\n(et le Bug #42)",
  "ABSOLUMENT.\nPAS DE NPM\nNÉCESSAIRE.",
  "LA MACHINE\nÀ CAFÉ\nAPPROUVE",
  "AUSSI SÛR\nQUE LA\nCHUTE #47",
  "OUI. C'EST\nUNE\nFONCTIONNALITÉ.",

  // NEUTRE
  "REPOSEZ LA\nQUESTION\nÀ 3H42",
  "RÉPONSE FLOUE\n— RECONNEXION\nBLE",
  "LA 40E APP\nSAIT MAIS\nNE DIT RIEN",
  "CONCENTREZ-\nVOUS ET\nREDEMANDEZ",
  "MIEUX VAUT\nNE PAS DIRE\n(pour l'instant)",
  "LE SERVO\nRÉFLÉCHIT\n(en si♭ mineur)",

  // NÉGATIF
  "N'Y COMPTEZ\nPAS",
  "MA RÉPONSE\nEST NON —\nCOMME PÉTITION #3",
  "PERSPECTIVES\nPAS BONNES\n(8% capacité)",
  "TRÈS\nDOUTEUX",
  "ESLINT\nDIT NON\n(17 violations)",

  // SPÉCIAL
  "LE BUG #42\nÉTAIT LÀ\nAVANT TOI",
  "LA RÉPONSE\nEST 42.\nTOUJOURS 42.",
  "MOT DE PASSE\nRESTÉ\n123",
  "JE NE SUIS\nPAS UN BUG.\nJE SUIS UNE\nFONCTIONNALITÉ.",
  "VÉRIFIEZ\nLA LIGNE 42\nDU CODE\nSOURCE",
];

let count=0;
function shake(){
  const ball=document.getElementById('ball');
  const tri=document.getElementById('tri');
  const ans=document.getElementById('answer');
  
  ball.classList.remove('shake');
  tri.classList.remove('show');
  void ball.offsetWidth;
  ball.classList.add('shake');
  
  setTimeout(()=>{
    const a=ANSWERS[Math.floor(Math.random()*ANSWERS.length)];
    ans.textContent=a;
    tri.classList.add('show');
    count++;
    document.getElementById('counter').textContent=`Consultations : ${count}`;
  },600);
}
</script>

<script src="../../assets/js/sada-footer.js?v=2"></script>
<script src="../../assets/js/sada-nav.js"></script>
</body>
</html>
