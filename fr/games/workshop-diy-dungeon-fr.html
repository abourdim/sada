<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<script src="../../assets/js/sada-theme.js"></script>
<script src="../../assets/js/sada-lang.js"></script>
<link rel="stylesheet" href="../../assets/css/sada-base.css">
<link rel="stylesheet" href="../../assets/css/sada-themes.css">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WKSHP-DIY // DONJON</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&Amiri&family=Noto+Kufi+Arabic:wght@400;700&display=swap" rel="stylesheet">
<style>
html,body{height:100%;overflow:hidden}
body{background:#0a0a0e;color:#00ff41;font-family:'JetBrains Mono',monospace;font-size:13px}
.crt{position:fixed;inset:0;z-index:999;pointer-events:none}.crt::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,rgba(0,0,0,.03) 0,rgba(0,0,0,.03) 1px,transparent 1px,transparent 3px)}
.app{position:fixed;inset:0;display:flex;flex-direction:column;z-index:1}
.hud{padding:4px 10px;display:flex;justify-content:space-between;font-size:8px;color:rgba(0,255,65,.2);border-bottom:1px solid rgba(0,255,65,.04);flex-shrink:0}
.game{flex:1;display:flex;overflow:hidden}

/* MAP */
.map-panel{width:180px;border-right:1px solid rgba(0,255,65,.04);padding:8px;flex-shrink:0;display:flex;flex-direction:column}
.map-h{font-size:8px;color:#0af;letter-spacing:2px;margin-bottom:6px}
.map-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:2px;margin-bottom:10px}
.map-cell{aspect-ratio:1;border:1px solid rgba(0,255,65,.04);border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:10px;background:rgba(0,255,65,.005);transition:all .2s}
.map-cell.visited{background:rgba(0,255,65,.02);border-color:rgba(0,255,65,.08)}
.map-cell.current{background:rgba(0,255,65,.06);border-color:#0f0;box-shadow:0 0 6px rgba(0,255,65,.15)}
.map-cell.hidden{opacity:.15}

/* STATS */
.stat-box{border:1px solid rgba(0,255,65,.04);border-radius:3px;padding:6px;margin-bottom:6px;font-size:9px}
.stat-row{display:flex;justify-content:space-between;margin-bottom:2px}
.stat-row .l{color:rgba(0,255,65,.3)}.stat-row .v{color:#0f0}
.hp-bar{height:6px;background:rgba(0,255,65,.06);border-radius:3px;overflow:hidden;margin-top:3px}
.hp-fill{height:100%;background:#0f0;border-radius:3px;transition:width .3s}
.inv{margin-top:auto}
.inv-h{font-size:8px;color:#ffd700;letter-spacing:2px;margin-bottom:4px}
.inv-item{font-size:9px;color:rgba(0,255,65,.4);padding:1px 0}

/* OUTPUT */
.output-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.output{flex:1;overflow-y:auto;padding:10px 14px;line-height:1.8;font-size:12px}
.output::-webkit-scrollbar{width:3px}.output::-webkit-scrollbar-thumb{background:rgba(0,255,65,.1)}
.output .room{color:#0af;font-weight:700;font-size:13px}.output .desc{color:rgba(0,255,65,.4)}.output .action{color:#ffd700}.output .enemy{color:#f03}.output .item{color:#0f0}.output .sys{color:rgba(0,255,65,.15);font-size:10px}
.output .ascii{color:rgba(0,255,65,.25);font-size:10px;line-height:1.3}

/* INPUT */
.input-area{padding:6px 14px;border-top:1px solid rgba(0,255,65,.04);display:flex;gap:6px;flex-shrink:0}
.input-area input{flex:1;background:rgba(0,255,65,.02);border:1px solid rgba(0,255,65,.06);border-radius:3px;padding:6px 10px;color:#0f0;font-family:inherit;font-size:12px;outline:none}
.input-area input:focus{border-color:rgba(0,255,65,.15)}
.cmd-btns{display:flex;gap:3px;padding:4px 14px;border-top:1px solid rgba(0,255,65,.02);flex-shrink:0;flex-wrap:wrap}
.cmd-btn{background:rgba(0,255,65,.02);border:1px solid rgba(0,255,65,.04);border-radius:2px;color:rgba(0,255,65,.3);font-family:inherit;font-size:8px;padding:3px 8px;cursor:pointer;transition:all .1s}
.cmd-btn:hover{color:#0f0;border-color:rgba(0,255,65,.12);background:rgba(0,255,65,.04)}
</style>
</head>
<body>
<div style="font-family:'Amiri',serif;font-size:13px;color:rgba(255,255,255,.08);text-align:center;padding:4px;direction:rtl">بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</div>
<div class="crt"></div>
<div class="app">
<div class="hud"><span>DONJON_CRAWLER v1.0</span><span>WORKSHOP-DIY // AVENTURE TEXTUELLE</span></div>
<div class="game">
<div class="map-panel">
  <div class="map-h">CARTE DU DONJON</div>
  <div class="map-grid" id="mapGrid"></div>
  <div class="stat-box">
    <div class="stat-row"><span class="l">HP</span><span class="v" id="hpVal">100/100</span></div>
    <div class="hp-bar"><div class="hp-fill" id="hpFill" style="width:100%"></div></div>
    <div class="stat-row" style="margin-top:4px"><span class="l">NIVEAU</span><span class="v" id="lvl">1</span></div>
    <div class="stat-row"><span class="l">XP</span><span class="v" id="xp">0/100</span></div>
    <div class="stat-row"><span class="l">BUGS CORRIGÉS</span><span class="v" id="bugs">0</span></div>
    <div class="stat-row"><span class="l">CAFÉ</span><span class="v" id="coffee">☕☕☕</span></div>
  </div>
  <div class="inv">
    <div class="inv-h">INVENTAIRE</div>
    <div id="invList"><div class="inv-item">📝 Vide...</div></div>
  </div>
</div>
<div class="output-area">
  <div class="output" id="output"></div>
  <div class="cmd-btns">
    <button class="cmd-btn" onclick="cmd('north')">⬆ nord</button>
    <button class="cmd-btn" onclick="cmd('south')">⬇ sud</button>
    <button class="cmd-btn" onclick="cmd('east')">➡ est</button>
    <button class="cmd-btn" onclick="cmd('west')">⬅ ouest</button>
    <button class="cmd-btn" onclick="cmd('look')">👁 regarder</button>
    <button class="cmd-btn" onclick="cmd('take')">🤚 prendre</button>
    <button class="cmd-btn" onclick="cmd('fight')">⚔ combattre</button>
    <button class="cmd-btn" onclick="cmd('use coffee')">☕ café</button>
    <button class="cmd-btn" onclick="cmd('help')">❓ aide</button>
  </div>
  <div class="input-area">
    <input type="text" id="inp" placeholder="Entrez une commande..." onkeydown="if(event.key==='Enter')cmd(this.value)">
  </div>
</div>
</div>
</div>

<script>
const ROOMS={
  "0,2":{name:"🚪 Entrée de l'Atelier",desc:"Tu te tiens aux portes du donjon Workshop-DIY. Les néons clignotent. L'odeur de soudure et de café remplit l'air. Les sorties mènent au <b>nord</b> et à l'<b>est</b>.",exits:{north:"1,2",east:"0,3"},item:"📝 Carte de l'Atelier",ascii:`   ┌───────────┐
   │ WORKSHOP  │
   │   -DIY-   │
   │  ENTRER → │
   └───────────┘`},
  "1,2":{name:"🤖 Arène Robot",desc:"Une vaste salle remplie de petits robots ESP32 qui foncent partout. L'un fait des tours sur lui-même depuis 3 heures. Un <span class='enemy'>Essaim de Bugs (PV : 30)</span> bloque la sortie nord.",exits:{south:"0,2",north:"2,2",east:"1,3"},enemy:{name:"Essaim de Bugs",hp:30,dmg:8,xp:40},item:"🔧 Clé de Débogage"},
  "2,2":{name:"🧠 Laboratoire IA",desc:"Des réseaux neuronaux pulsent sur des écrans holographiques. Un <b>teachable-machine</b> attend d'apprendre de toi. Des contrôles gestuels scintillent dans les airs.",exits:{south:"1,2",east:"2,3"},item:"🧠 Module Cortex IA"},
  "0,3":{name:"💡 Chambre LED",desc:"Chaque surface est couverte de rubans Neopixel. Ils parcourent des motifs arc-en-ciel. C'est comme une rave, mais éducative. Un coffre au trésor brille dans le coin.",exits:{west:"0,2",north:"1,3"},item:"💡 Cristal de Puissance RGB"},
  "1,3":{name:"🐧 Salle des Terminaux",desc:"Des rangées de terminaux. Quelqu'un a tapé <code>sudo rm -rf /</code> et la salle a ri. Un <span class='enemy'>Kernel Panic (PV : 45)</span> rôde ici.",exits:{south:"0,3",west:"1,2",north:"2,3"},enemy:{name:"Kernel Panic",hp:45,dmg:12,xp:60},item:"🐧 Clé d'Accès Root"},
  "2,3":{name:"🔐 Coffre Cyber",desc:"Les pare-feux scintillent comme des champs de force. Des flux de données chiffrées coulent sur les murs. Le <b>Bug Final</b> garde la sortie — un énorme <span class='enemy'>Segmentation Fault (PV : 80)</span>.",exits:{south:"1,3",west:"2,2"},enemy:{name:"Segmentation Fault",hp:80,dmg:18,xp:100},item:"🏆 Point-Virgule Doré"},
};

let state={pos:"0,2",hp:100,maxHp:100,lvl:1,xp:0,bugs:0,coffee:3,inv:[],visited:new Set(["0,2"]),enemies:{}};

const out=document.getElementById('output');
function print(html,cls=''){out.innerHTML+=`<div class="${cls}">${html}</div>`;out.scrollTop=out.scrollHeight}

function look(){
  const r=ROOMS[state.pos];
  if(!r){print("Tu es dans le vide. Ça ne devrait pas arriver.",'sys');return}
  print(`<br><span class="room">${r.name}</span>`);
  if(r.ascii)print(`<pre class="ascii">${r.ascii}</pre>`);
  let desc=r.desc;
  if(r.enemy&&!state.enemies[state.pos])desc=desc;
  else if(r.enemy)desc=desc.replace(/<span class='enemy'>.*?<\/span>/,'<span class="item">✓ vaincu</span>');
  print(desc,'desc');
  if(r.item&&!state.inv.includes(r.item))print(`Tu vois : <span class="item">${r.item}</span>`,'action');
  const exits=Object.keys(r.exits).join(', ');
  print(`Sorties : ${exits}`,'sys');
}

function move(dir){
  const r=ROOMS[state.pos];
  if(!r||!r.exits[dir]){print("Tu ne peux pas aller par là.",'sys');return}
  if(r.enemy&&!state.enemies[state.pos]){print(`Le ${r.enemy.name} bloque ton chemin ! Tu dois d'abord <b>combattre</b>.`,'enemy');return}
  state.pos=r.exits[dir];state.visited.add(state.pos);
  look();updateMap();updateStats();
}

function fight(){
  const r=ROOMS[state.pos];
  if(!r?.enemy||state.enemies[state.pos]){print("Rien à combattre ici.",'sys');return}
  const e={...r.enemy};
  print(`<br>⚔ COMBAT : Toi vs ${e.name} (PV : ${e.hp})`,'enemy');
  const atk=15+(state.inv.includes('🔧 Clé de Débogage')?10:0)+(state.inv.includes('🧠 Module Cortex IA')?8:0);
  while(e.hp>0&&state.hp>0){
    const dmg=Math.floor(Math.random()*atk)+5;
    e.hp-=dmg;print(`Tu infliges ${dmg} dégâts !`,'action');
    if(e.hp<=0)break;
    const eDmg=Math.floor(Math.random()*e.dmg)+3;
    state.hp-=eDmg;print(`${e.name} te frappe pour ${eDmg} !`,'enemy');
  }
  if(state.hp<=0){
    state.hp=1;print("Tu as survécu de justesse ! Bois du café pour te soigner.",'enemy');
  }
  if(e.hp<=0){
    print(`<span class="item">✓ ${e.name} vaincu ! +${e.xp} XP</span>`);
    state.enemies[state.pos]=true;state.xp+=e.xp;state.bugs++;
    if(state.xp>=state.lvl*100){state.lvl++;state.xp=0;state.maxHp+=20;state.hp=state.maxHp;print(`<span class="action">🎉 NIVEAU SUPÉRIEUR ! Tu es maintenant niveau ${state.lvl} !</span>`)}
    if(state.pos==="2,3")print(`<br><span class="action">🏆 TU AS CONQUIS LE DONJON WORKSHOP-DIY !</span><br><span class="action">Stats finales : Niveau ${state.lvl} | Bugs corrigés : ${state.bugs} | Objets : ${state.inv.length}</span><br><span class="sys">// tous les bugs sont maintenant des fonctionnalités. bravo.</span>`);
  }
  updateStats();
}

function take(){
  const r=ROOMS[state.pos];
  if(!r?.item||state.inv.includes(r.item)){print("Rien à prendre.",'sys');return}
  state.inv.push(r.item);print(`<span class="item">Ramassé : ${r.item}</span>`);
  updateStats();
}

function useCoffee(){
  if(state.coffee<=0){print("Plus de café. C'est une crise.",'enemy');return}
  state.coffee--;state.hp=Math.min(state.hp+40,state.maxHp);
  print(`<span class="action">☕ Tu bois du café. PV restaurés ! (+40 PV)</span>`);
  if(state.coffee===0)print(`<span class="enemy">⚠ CAFÉ ÉPUISÉ. STATUT CRITIQUE.</span>`);
  updateStats();
}

function cmd(c){
  c=c.trim().toLowerCase();document.getElementById('inp').value='';
  if(!c)return;
  print(`<span class="sys">> ${c}</span>`);
  if(c==='north'||c==='n')move('north');
  else if(c==='south'||c==='s')move('south');
  else if(c==='east'||c==='e')move('east');
  else if(c==='west'||c==='w')move('west');
  else if(c==='look'||c==='l')look();
  else if(c==='take'||c==='get'||c==='grab')take();
  else if(c==='fight'||c==='attack'||c==='kill')fight();
  else if(c.includes('coffee')||c==='heal')useCoffee();
  else if(c==='inventory'||c==='inv'||c==='i'){print('Inventaire : '+(state.inv.length?state.inv.join(', '):'vide'),'action')}
  else if(c==='help')print(`Commandes : <b>north/south/east/west</b> — se déplacer | <b>look</b> — examiner la salle | <b>take</b> — ramasser un objet | <b>fight</b> — combattre l'ennemi | <b>use coffee</b> — soigner +40 PV | <b>inventory</b> — afficher les objets`,'sys');
  else print(`Commande inconnue : "${c}". Tapez <b>help</b>.`,'sys');
}

// MAP
function updateMap(){
  const grid=document.getElementById('mapGrid');grid.innerHTML='';
  for(let y=2;y>=0;y--)for(let x=0;x<5;x++){
    const key=`${y},${x}`;const r=ROOMS[key];
    const d=document.createElement('div');
    d.className='map-cell'+(key===state.pos?' current':state.visited.has(key)?' visited':' hidden');
    if(r&&(state.visited.has(key)||key===state.pos))d.textContent=r.name.split(' ')[0];
    grid.appendChild(d);
  }
}

function updateStats(){
  document.getElementById('hpVal').textContent=`${state.hp}/${state.maxHp}`;
  document.getElementById('hpFill').style.width=(state.hp/state.maxHp*100)+'%';
  document.getElementById('hpFill').style.background=state.hp<30?'#f03':state.hp<60?'#ff0':'#0f0';
  document.getElementById('lvl').textContent=state.lvl;
  document.getElementById('xp').textContent=`${state.xp}/${state.lvl*100}`;
  document.getElementById('bugs').textContent=state.bugs;
  document.getElementById('coffee').textContent='☕'.repeat(state.coffee)||(state.coffee<=0?'💀 VIDE':'');
  document.getElementById('invList').innerHTML=state.inv.length?state.inv.map(i=>`<div class="inv-item">${i}</div>`).join(''):'<div class="inv-item">📝 Vide...</div>';
}

// INIT
print(`<pre class="ascii">
 ╔══════════════════════════════════════╗
 ║   WORKSHOP-DIY DONJON CRAWLER      ║
 ║   ──────────────────────────────     ║
 ║   Explore les salles. Collecte.      ║
 ║   Combats les bugs. Bois du café.   ║
 ║   Tape HELP pour les commandes.     ║
 ╚══════════════════════════════════════╝
</pre>`);
look();updateMap();updateStats();
document.getElementById('inp').focus();
</script>

<script src="../../assets/js/sada-footer.js?v=2"></script>
<script src="../../assets/js/sada-nav.js"></script>
</body>
</html>
