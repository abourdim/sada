<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<script src="../../assets/js/sada-theme.js"></script>
<script src="../../assets/js/sada-lang.js"></script>
<link rel="stylesheet" href="../../assets/css/sada-base.css">
<link rel="stylesheet" href="../../assets/css/sada-themes.css">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WKSHP-DIY // TÉMOIGNAGES</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@700;800&Amiri&family=Noto+Kufi+Arabic:wght@400;700&display=swap" rel="stylesheet">
<style>
body{background:#050508;color:#fff;font-family:'JetBrains Mono',monospace;font-size:12px;min-height:100vh}
.crt{position:fixed;inset:0;z-index:99;pointer-events:none}.crt::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,rgba(0,0,0,.03) 0,rgba(0,0,0,.03) 1px,transparent 1px,transparent 3px)}

.header{text-align:center;padding:24px 16px 12px;position:relative}
.header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(0,255,65,.03),transparent 70%)}
.h-title{font-family:'Syne',sans-serif;font-size:clamp(22px,5vw,34px);font-weight:800;color:#00ff41;text-shadow:0 0 14px rgba(0,255,65,.15)}
.h-sub{font-size:8px;color:rgba(0,255,65,.2);letter-spacing:3px;margin-top:2px}

/* SCORE BAR */
.score-bar{display:flex;align-items:center;justify-content:center;gap:20px;padding:14px;margin:10px auto;max-width:600px;border:1px solid rgba(0,255,65,.04);border-radius:6px;background:rgba(0,255,65,.005);flex-wrap:wrap}
.sc-big{text-align:center}.sc-big .v{font-size:40px;font-weight:800;color:#ffd700}.sc-big .étoiles{color:#ffd700;font-size:16px;letter-spacing:2px}.sc-big .ct{font-size:8px;color:rgba(0,255,65,.2);margin-top:2px}
.sc-bars{flex:1;min-width:150px;max-width:200px}
.sc-row{display:flex;align-items:center;gap:4px;margin-bottom:2px}
.sc-row .lbl{font-size:8px;color:rgba(0,255,65,.2);width:10px}.sc-row .track{flex:1;height:5px;background:rgba(0,255,65,.03);border-radius:3px;overflow:hidden}.sc-row .fill{height:100%;background:#ffd700;border-radius:3px}.sc-row .pct{font-size:7px;color:rgba(0,255,65,.15);width:24px;text-align:right}
.sc-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.sc-stat{text-align:center;padding:6px;border:1px solid rgba(0,255,65,.03);border-radius:3px}
.sc-stat .v{font-size:14px;font-weight:800;color:#00d4ff}.sc-stat .l{font-size:5px;color:rgba(0,255,65,.15);letter-spacing:1px}

/* FILTERS */
.filters{display:flex;gap:4px;justify-content:center;padding:8px 16px;flex-wrap:wrap}
.filter{padding:4px 12px;border-radius:12px;border:1px solid rgba(0,255,65,.06);font-size:8px;color:rgba(0,255,65,.3);cursor:pointer;transition:all .15s;background:none;font-family:inherit}
.filter:hover,.filter.on{background:rgba(0,255,65,.04);border-color:rgba(0,255,65,.15);color:#00ff41}

/* REVIEWS GRID */
.revues{max-width:800px;margin:12px auto;padding:0 16px;columns:2;column-gap:8px}
@media(max-width:600px){.revues{columns:1}}

.review{break-inside:avoid;border:1px solid rgba(0,255,65,.04);border-radius:6px;padding:12px;margin-bottom:8px;background:rgba(0,255,65,.005);transition:all .2s;cursor:default}
.review:hover{border-color:rgba(0,255,65,.12);background:rgba(0,255,65,.01)}
.rev-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.rev-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.rev-avatar.student{background:rgba(0,212,255,.06);border:1px solid rgba(0,212,255,.1)}
.rev-avatar.parent{background:rgba(191,0,255,.06);border:1px solid rgba(191,0,255,.1)}
.rev-avatar.teacher{background:rgba(255,215,0,.06);border:1px solid rgba(255,215,0,.1)}
.rev-avatar.maker{background:rgba(0,255,65,.06);border:1px solid rgba(0,255,65,.1)}
.rev-name{font-size:10px;font-weight:700;color:#fff}
.rev-role{font-size:7px;color:rgba(0,255,65,.2);letter-spacing:1px}
.rev-date{font-size:7px;color:rgba(0,255,65,.1);margin-left:auto}
.rev-étoiles{color:#ffd700;font-size:10px;margin-bottom:4px;letter-spacing:1px}
.rev-text{font-size:10px;color:rgba(255,255,255,.5);line-height:2}
.rev-text b{color:rgba(0,255,65,.5)}
.rev-app{margin-top:6px;display:inline-block;font-size:7px;padding:2px 7px;border-radius:2px;border:1px solid rgba(0,255,65,.06);color:rgba(0,255,65,.25)}
.rev-likes{margin-top:4px;font-size:8px;color:rgba(0,255,65,.12)}
</style>
</head>
<body>
<div style="font-family:'Amiri',serif;font-size:13px;color:rgba(255,255,255,.08);text-align:center;padding:4px;direction:rtl">بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</div>
<div class="crt"></div>

<div class="header">
  <div class="h-title">TÉMOIGNAGES</div>
  <div class="h-sub">CE QU'ILS DISENT DE WORKSHOP-DIY</div>
</div>

<div class="score-bar">
  <div class="sc-big"><div class="v">4.9</div><div class="étoiles">★★★★★</div><div class="ct">847 avis</div></div>
  <div class="sc-bars" id="bars"></div>
  <div class="sc-stats">
    <div class="sc-stat"><div class="v">98%</div><div class="l">RECOMMANDÉ</div></div>
    <div class="sc-stat"><div class="v">39</div><div class="l">APPS ÉVALUÉES</div></div>
    <div class="sc-stat"><div class="v">42</div><div class="l">BUGS (FONCTIONNALITÉS)</div></div>
    <div class="sc-stat"><div class="v">∞</div><div class="l">CAFÉ CONSOMMÉ</div></div>
  </div>
</div>

<div class="filters">
  <button class="filter on" data-f="all">Tous</button>
  <button class="filter" data-f="student">Élèves</button>
  <button class="filter" data-f="parent">Parents</button>
  <button class="filter" data-f="teacher">Enseignants</button>
  <button class="filter" data-f="maker">Makers</button>
</div>

<div class="revues" id="revues"></div>

<script>
// RATING BARS
const barData=[{s:5,p:87},{s:4,p:9},{s:3,p:3},{s:2,p:1},{s:1,p:0}];
document.getElementById('bars').innerHTML=barData.map(b=>`<div class="sc-row"><span class="lbl">${b.s}</span><div class="track"><div class="fill" style="width:${b.p}%"></div></div><span class="pct">${b.p}%</span></div>`).join('');

const REVIEWS=[
{a:"👦",n:"Lucas M.",role:"élève",r:"student",s:5,d:"Fév 2025",t:"L'app <b>bit-bot</b> est dingue. J'ai piloté un robot depuis mon navigateur en 30 secondes. Aucune installation, aucune configuration, juste le Bluetooth et c'est parti. Je code tous les jours depuis.",app:"🤖 bit-bot",likes:24},
{a:"👩",n:"Sophie D.",role:"parent",r:"parent",s:5,d:"Jan 2025",t:"Ma fille est passée de YouTube à la création de modèles IA. Elle a entraîné <b>teachable-machine</b> à reconnaître des gestes de la main et l'a connecté à un robot. Elle a 11 ans.",app:"🧠 teachable-machine",likes:31},
{a:"👨‍🏫",n:"Karim B.",role:"enseignant",r:"teacher",s:5,d:"Fév 2025",t:"Enfin une plateforme où je ne passe pas 45 minutes sur des problèmes d'installation. Les élèves ouvrent une URL et commencent à apprendre. <b>linux-kids-lab</b> a enseigné les commandes terminal en une seule session.",app:"🐧 linux-kids-lab",likes:19},
{a:"👧",n:"Amira T.",role:"élève",r:"student",s:5,d:"Déc 2024",t:"<b>magic-hands</b> c'est de la pure magie. J'ai fait des effets de particules devant mon écran pendant une heure. Puis j'ai appris comment MediaPipe fonctionne vraiment. Éducation en douce.",app:"🪄 magic-hands",likes:27},
{a:"👨",n:"Marc L.",role:"parent",r:"parent",s:4,d:"Nov 2024",t:"Super collection. Un petit souci : mon fils de 14 ans m'explique maintenant les conteneurs Docker. Je suis ingénieur logiciel senior. C'est... humiliant.",app:"🐳 docker-lab",likes:42},
{a:"👩‍💻",n:"Nour K.",role:"maker",r:"maker",s:5,d:"Jan 2025",t:"J'ai construit un tableau de bord IoT complet avec <b>smart-home</b> et connecté de vrais capteurs via ESP32. La documentation est claire, le code est propre, et tout est gratuit.",app:"🏡 smart-home",likes:15},
{a:"👦",n:"Youssef A.",role:"élève",r:"student",s:5,d:"Fév 2025",t:"Les défis de <b>pentest-lab</b> sont addictifs. J'ai résolu le niveau injection SQL et trouvé une vraie vulnérabilité dans l'imprimante de l'école. Signalée de manière éthique, bien sûr.",app:"🔐 pentest-lab",likes:33},
{a:"👩‍🏫",n:"Marie F.",role:"enseignante",r:"teacher",s:5,d:"Déc 2024",t:"J'utilise <b>classroom</b> pour gérer mes ateliers STEM. Assigner des défis, suivre la progression, tout au même endroit. Les élèves ne réalisent même pas à quel point ils apprennent.",app:"🏫 classroom",likes:16},
{a:"👧",n:"Léa P.",role:"élève",r:"student",s:5,d:"Jan 2025",t:"<b>face-quest</b> a transformé la détection faciale en jeu. J'ai marqué 847 points et appris la vision par ordinateur sans ouvrir un manuel. Encore plus comme ça s'il vous plaît.",app:"🕵️ face-quest",likes:21},
{a:"👨",n:"David R.",role:"maker",r:"maker",s:5,d:"Nov 2024",t:"Le kit robot ESP32 a survécu à 47 chutes par mes élèves. La qualité du matériel est impressionnante, et l'app <b>bit-bot</b> rend le contrôle sans effort.",app:"🤖 bit-bot",likes:18},
{a:"👩",n:"Fatima Z.",role:"parent",r:"parent",s:5,d:"Fév 2025",t:"Mon fils a découvert <b>prompt-hero</b> et maintenant il m'apprend à parler à l'IA. L'élève est devenu le maître. Je ne sais pas trop comment je me sens.",app:"✨ prompt-hero",likes:25},
{a:"👦",n:"Thomas W.",role:"élève",r:"student",s:5,d:"Déc 2024",t:"J'ai appris Git grâce à <b>git-lab</b> et maintenant je versionne mes devoirs. Ma prof ne sait pas ce qu'est une 'pull request' mais elle est impressionnée.",app:"🔀 git-lab",likes:14},
{a:"👩‍💻",n:"Jade M.",role:"maker",r:"maker",s:5,d:"Jan 2025",t:"<b>wled-kids-lab</b> m'a permis de contrôler un ruban LED entier depuis mon téléphone. J'ai créé des animations personnalisées pour ma chambre. Les enfants de l'atelier étaient jaloux.",app:"💡 wled-kids-lab",likes:12},
{a:"👨‍🏫",n:"Omar H.",role:"enseignant",r:"teacher",s:5,d:"Fév 2025",t:"39 apps, toutes dans le navigateur, toutes gratuites. J'enseigne les STEM depuis 15 ans et c'est la plateforme la plus accessible que j'ai jamais utilisée. Zéro prise de tête de configuration.",app:"Toutes les apps",likes:38},
{a:"👧",n:"Clara S.",role:"élève",r:"student",s:5,d:"Jan 2025",t:"L'éditeur pixel art de <b>pixel-gateway</b> est thérapeutique. J'ai créé de l'art pendant une heure, puis exporté sur la matrice LED de mon micro:bit. Créatif ET technique.",app:"🎨 pixel-gateway",likes:11},
{a:"👨",n:"Pierre G.",role:"parent",r:"parent",s:5,d:"Nov 2024",t:"Enfin trouvé quelque chose de mieux que Fortnite. Mes enfants se battent pour utiliser l'app <b>magic-hands</b>. Jamais pensé que je dirais ça d'un outil éducatif.",app:"🪄 magic-hands",likes:29},
];

let curFilter='all';
function render(){
  const el=document.getElementById('revues');
  const filtered=curFilter==='all'?REVIEWS:REVIEWS.filter(r=>r.r===curFilter);
  el.innerHTML=filtered.map(r=>`<div class="review"><div class="rev-head"><div class="rev-avatar ${r.r}">${r.a}</div><div><div class="rev-name">${r.n}</div><div class="rev-role">${r.role.toUpperCase()}</div></div><span class="rev-date">${r.d}</span></div><div class="rev-étoiles">${'★'.repeat(r.s)}${'☆'.repeat(5-r.s)}</div><div class="rev-text">${r.t}</div><span class="rev-app">${r.app}</span><div class="rev-likes">👍 ${r.likes} ont trouvé cela utile</div></div>`).join('');
}

document.querySelectorAll('.filter').forEach(f=>f.onclick=()=>{
  document.querySelectorAll('.filter').forEach(x=>x.classList.remove('on'));
  f.classList.add('on');curFilter=f.dataset.f;render();
});
render();
</script>

<script src="../../assets/js/sada-footer.js?v=2"></script>
<script src="../../assets/js/sada-nav.js"></script>
</body>
</html>
