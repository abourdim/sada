<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<script src="../../assets/js/sada-theme.js"></script>
<script src="../../assets/js/sada-lang.js"></script>
<link rel="stylesheet" href="../../assets/css/sada-base.css">

<title>Workshop-DIY — App Demo Reel</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=Fredoka:wght@400;500;600;700&Amiri&family=Noto+Kufi+Arabic:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--cy:#00d4ff;--bl:#4f6ef7;--pk:#ff2d8a;--or:#ff6b35;--lm:#a3e635;--pr:#9333ea;--yw:#fbbf24;--gn:#22c55e;--rd:#ef4444}
html,body{height:100%;overflow:hidden}
body{background:#040608;color:#fff;font-family:'Fredoka',sans-serif}
canvas#bg{position:fixed;inset:0;z-index:0}

/* LAYOUT */
.main{position:fixed;inset:0;z-index:1;display:flex;flex-direction:column}

/* HEADER */
.hdr{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.04);flex-shrink:0;position:relative;z-index:10}
.hdr-brand{display:flex;align-items:center;gap:10px}
.hdr-logo{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;letter-spacing:-1px}
.hdr-logo .gr{background:linear-gradient(135deg,var(--cy),var(--bl));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr-sub{font-family:'JetBrains Mono',monospace;font-size:9px;color:rgba(255,255,255,.25);letter-spacing:2px}
.hdr-stats{display:flex;gap:16px}
.hdr-stat{text-align:center}
.hdr-stat .v{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--cy)}
.hdr-stat .l{font-size:7px;color:rgba(255,255,255,.2);letter-spacing:1.5px;text-transform:uppercase}

/* FILTERS */
.filters{padding:10px 20px;display:flex;gap:6px;flex-wrap:wrap;border-bottom:1px solid rgba(255,255,255,.03);flex-shrink:0}
.fbtn{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:5px 12px;font-size:11px;font-weight:600;color:rgba(255,255,255,.5);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px;font-family:'Fredoka',sans-serif}
.fbtn:hover{background:rgba(255,255,255,.06);color:#fff}
.fbtn.on{background:rgba(0,212,255,.1);border-color:rgba(0,212,255,.25);color:var(--cy)}
.fbtn .cnt{font-family:'JetBrains Mono',monospace;font-size:8px;background:rgba(255,255,255,.06);padding:1px 5px;border-radius:4px}
.fbtn.on .cnt{background:rgba(0,212,255,.15)}

/* STAGE */
.stage{flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;padding:20px}

/* APP CARD */
.card{width:min(92%,520px);position:relative;perspective:1200px}
.card-inner{position:relative;transition:transform .7s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d}
.card.flipping .card-inner{transform:rotateY(90deg)}

.card-face{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:20px;overflow:hidden;backface-visibility:hidden}

/* Card Content */
.card-top{padding:32px 32px 24px;text-align:center;position:relative}
.card-emoji{font-size:72px;margin-bottom:12px;filter:drop-shadow(0 8px 24px rgba(0,0,0,.4));display:block;animation:cardFloat 3s ease-in-out infinite}
@keyframes cardFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.card-badge{display:inline-block;padding:2px 10px;border-radius:99px;font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
.badge-popular{background:rgba(251,191,36,.12);color:var(--yw);border:1px solid rgba(251,191,36,.2)}
.badge-stable{background:rgba(34,197,94,.1);color:var(--gn);border:1px solid rgba(34,197,94,.2)}
.badge-dev{background:rgba(147,51,234,.1);color:var(--pr);border:1px solid rgba(147,51,234,.2)}
.badge-new{background:rgba(0,212,255,.1);color:var(--cy);border:1px solid rgba(0,212,255,.2)}
.card-name{font-family:'Syne',sans-serif;font-size:clamp(22px,4vw,32px);font-weight:800;letter-spacing:-1px;margin-bottom:6px}
.card-desc{font-size:13px;color:rgba(255,255,255,.45);line-height:1.6;max-width:400px;margin:0 auto}

/* Categories */
.card-cats{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;padding:0 32px 20px}
.cat-pill{font-size:10px;padding:3px 10px;border-radius:6px;font-weight:600;letter-spacing:.5px}

/* Tags row */
.card-tags{padding:12px 32px 20px;display:flex;gap:4px;flex-wrap:wrap;justify-content:center}
.tag-chip{font-family:'JetBrains Mono',monospace;font-size:8px;padding:2px 8px;border-radius:4px;background:rgba(255,255,255,.04);color:rgba(255,255,255,.3);border:1px solid rgba(255,255,255,.04)}

/* Progress bar */
.card-prog{height:3px;background:rgba(255,255,255,.03);position:relative}
.card-prog-fill{height:100%;background:linear-gradient(90deg,var(--cy),var(--bl));transition:width .1s linear;box-shadow:0 0 8px rgba(0,212,255,.3)}

/* Counter */
.card-counter{padding:10px 32px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(255,255,255,.2);letter-spacing:2px;border-top:1px solid rgba(255,255,255,.03)}

/* CONTROLS */
.ctrls{padding:12px 20px;display:flex;align-items:center;justify-content:center;gap:10px;border-top:1px solid rgba(255,255,255,.04);flex-shrink:0}
.cbtn{background:none;border:1px solid rgba(255,255,255,.08);color:#fff;cursor:pointer;font-size:16px;width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:'Fredoka',sans-serif}
.cbtn:hover{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.15)}
.cbtn.play-btn{width:42px;height:42px;border-radius:50%;font-size:18px;border-color:rgba(0,212,255,.25);background:rgba(0,212,255,.06)}
.cbtn.play-btn:hover{background:rgba(0,212,255,.12)}
.speed-sel{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.5);font-size:10px;padding:4px 8px;border-radius:6px;cursor:pointer;font-family:'JetBrains Mono',monospace}
.speed-sel option{background:#111;color:#fff}

/* MINI GRID (bottom) */
.mini-grid{padding:8px 12px;display:flex;gap:3px;flex-wrap:wrap;justify-content:center;border-top:1px solid rgba(255,255,255,.03);flex-shrink:0;max-height:42px;overflow:hidden}
.mini-dot{width:16px;height:16px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:8px;cursor:pointer;background:rgba(255,255,255,.03);border:1px solid transparent;transition:all .2s}
.mini-dot:hover{background:rgba(255,255,255,.08)}
.mini-dot.on{border-color:var(--cy);background:rgba(0,212,255,.1);box-shadow:0 0 6px rgba(0,212,255,.2)}

/* Category colors */
.cat-microbit{background:rgba(0,212,255,.1);color:var(--cy);border:1px solid rgba(0,212,255,.15)}
.cat-camera{background:rgba(251,191,36,.1);color:var(--yw);border:1px solid rgba(251,191,36,.15)}
.cat-ai{background:rgba(147,51,234,.1);color:var(--pr);border:1px solid rgba(147,51,234,.15)}
.cat-hardware{background:rgba(255,107,53,.1);color:var(--or);border:1px solid rgba(255,107,53,.15)}
.cat-learning{background:rgba(34,197,94,.1);color:var(--gn);border:1px solid rgba(34,197,94,.15)}
.cat-classroom{background:rgba(79,110,247,.1);color:var(--bl);border:1px solid rgba(79,110,247,.15)}
.cat-tools{background:rgba(255,45,138,.1);color:var(--pk);border:1px solid rgba(255,45,138,.15)}

/* Link row */
.link-row{display:flex;justify-content:center;padding:4px 32px 16px}
.app-link{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--cy);text-decoration:none;opacity:.5;transition:opacity .2s;letter-spacing:1px}
.app-link:hover{opacity:1}
</style>
</head>

<script>
// ===== REAL APP DATA =====
const ALL_APPS=[
{e:"🤖",n:"bit-bot",c:["microbit"],b:"popular",d:"Pilotez un robot Bit:Bot depuis votre navigateur via Bluetooth — joystick virtuel, suivi de ligne et évitement d'obstacles.",t:["robot","micro:bit","BLE","moteur","gamepad"]},
{e:"🪄",n:"magic-hands",c:["camera","ai"],b:"popular",d:"Agitez vos mains devant la caméra pour déclencher des effets magiques — confettis, traînées, néon — propulsé par MediaPipe.",t:["caméra","suivi-mains","mediapipe","effets"]},
{e:"🕵️",n:"face-quest",c:["camera","ai"],b:"popular",d:"Un jeu de détection faciale avec votre webcam — souriez, clignez, tournez la tête pour marquer. 100% local, zéro donnée envoyée.",t:["caméra","détection-faciale","jeu","vie-privée"]},

{e:"😄",n:"bitmoji-lab",c:["microbit"],b:"stable",d:"Choisissez des emojis et transformez-les en pixel art LED 5×5 coloré sur micro:bit — transfert BLE instantané.",t:["emoji","LED","pixel-art","BLE"]},
{e:"🚀",n:"mission-control",c:["classroom","microbit"],b:"stable",d:"Tableau de bord avec vidéo/chat en direct via WebRTC — envoyez des commandes aux micro:bits de la salle.",t:["WebRTC","vidéo","chat","tableau-de-bord"]},
{e:"🧩",n:"bit-playground",c:["microbit"],b:"stable",d:"L'ultime terrain de jeu BLE micro:bit — contrôlez LEDs, capteurs, servos et moteurs depuis une seule page.",t:["BLE","capteurs","servos","moteurs","LEDs"]},

{e:"🎨",n:"pixel-gateway",c:["tools"],b:"stable",d:"Un portail rétro de pixel art — dessinez sur une grille, animez des frames, prévisualisez et partagez vos créations.",t:["pixel-art","animation","sprites","dessin"]},

{e:"🐧",n:"linux-kids-lab",c:["learning"],b:"stable",d:"Commandes Linux dans un bac à sable navigateur sécurisé — fichiers, pipes, scripts, maîtrisez le terminal.",t:["Linux","terminal","bash","commandes"]},
{e:"🏭",n:"production-chain",c:["learning"],b:"stable",d:"Visualisez et simulez une chaîne de production industrielle — placez les stations, réglez le débit, observez le flux.",t:["simulation","industrie","production","flux"]},
{e:"🏫",n:"classroom",c:["classroom"],b:"stable",d:"Classe virtuelle PeerJS — créez une salle avec un code, partagez l'écran, chattez et collaborez en temps réel.",t:["PeerJS","classe","collaboration","partage-écran"]},
{e:"🔌",n:"usb-logger",c:["microbit"],b:"stable",d:"Communiquez avec votre micro:bit via USB série depuis le navigateur — envoyez des commandes, recevez des données.",t:["USB","série","logs","débogage"]},
{e:"📡",n:"ble-logger",c:["microbit"],b:"stable",d:"Logger Bluetooth et terrain de jeu débogage pour micro:bit — connectez, inspectez les services, lisez/écrivez.",t:["BLE","débogage","services","caractéristiques"]},
{e:"🧰",n:"claude-toolkit",c:["ai","tools"],b:"dev",d:"Boîte à outils pour créer des apps avec IA — modèles de prompts, interface de chat et helpers API.",t:["Claude","IA","prompts","API"]},
{e:"🎭",n:"puppeteer-playground",c:["tools"],b:"stable",d:"Expérimentez l'automatisation navigateur avec Puppeteer — écrivez des scripts pour scraper, capturer et tester.",t:["Puppeteer","automatisation","scraping","test"]},
{e:"🔋",n:"circuit-lab",c:["hardware","learning"],b:"dev",d:"Construisez et simulez des circuits électroniques dans le navigateur — LEDs, résistances, condensateurs, résultats en temps réel.",t:["circuits","simulation","électronique","composants"]},
{e:"🛡️",n:"rocket-shield-vpn",c:["tools"],b:"dev",d:"Guide visuel des VPN et de la sécurité réseau — voyez comment les tunnels chiffrés protègent vos données.",t:["VPN","sécurité","chiffrement","réseaux"]},
{e:"🧊",n:"3d-lab",c:["learning"],b:"dev",d:"Explorez la conception 3D dans le navigateur — créez, pivotez et éclairez des objets avec Three.js.",t:["3D","Three.js","modélisation","design"]},
{e:"🔀",n:"git-lab",c:["learning"],b:"dev",d:"Apprenez Git étape par étape — leçons interactives sur commit, branche, fusion et pull requests.",t:["Git","contrôle-version","branche","fusion"]},
{e:"✨",n:"prompt-hero",c:["ai","learning"],b:"dev",d:"Maîtrisez le prompting IA — techniques pour écrire des prompts efficaces pour ChatGPT et autres LLMs.",t:["IA","prompts","LLM","techniques"]},
{e:"🌍",n:"save-our-planet",c:["learning"],b:"dev",d:"Leçons interactives sur le changement climatique, le recyclage et la durabilité — quiz, faits et plans d'action.",t:["climat","durabilité","écologie","quiz"]},
{e:"📋",n:"ops-catalog",c:["tools"],b:"dev",d:"Catalogue d'outils et workflows DevOps consultable — pipelines CI/CD, Docker, Kubernetes et plus.",t:["DevOps","CI/CD","Docker","Kubernetes"]},
{e:"💻",n:"code-kids",c:["learning"],b:"dev",d:"Apprenez à coder depuis zéro — exercices pas-à-pas en HTML, CSS et JavaScript pour débutants.",t:["HTML","CSS","JavaScript","débutant"]},
{e:"🏡",n:"smart-home",c:["hardware","learning"],b:"dev",d:"Tableau de bord maison connectée — capteurs, lumières, automatisations et expériences IoT.",t:["IoT","maison-connectée","capteurs","automatisation"]},
{e:"🧱",n:"makecode-adventures",c:["microbit","learning"],b:"dev",d:"Aventures de programmation par blocs avec MakeCode — projets guidés enseignant la programmation pas à pas.",t:["MakeCode","blocs","programmation","projets"]},
{e:"🤖",n:"bit-54-activities",c:["microbit","learning"],b:"dev",d:"54 activités pratiques pour BBC micro:bit — de la LED clignotante aux robots BLE, débutant à avancé.",t:["54-activités","micro:bit","pratique","progressif"]},
{e:"💰",n:"crypto-vault",c:["learning"],b:"dev",d:"Bases de cryptographie pratique — chiffrez des messages, hachez des mots de passe, générez des clés.",t:["cryptographie","chiffrement","hachage","clés"]},
{e:"🔗",n:"dhcp-lab",c:["hardware"],b:"new",d:"Serveur DHCP Python sans dépendance avec tableau de bord web en temps réel — visualisez les attributions réseau.",t:["DHCP","réseau","Python","tableau-de-bord"]},
{e:"🐳",n:"docker-lab",c:["learning"],b:"new",d:"Labo Docker — explorez conteneurs, images et volumes dans un environnement d'apprentissage interactif.",t:["Docker","conteneurs","DevOps"]},
{e:"🔴",n:"nodered-lab",c:["learning"],b:"new",d:"Programmation visuelle Node-RED — connectez APIs, services et matériel en glisser-déposer.",t:["Node-RED","flux","visuel","IoT"]},
{e:"⛽",n:"ocpp",c:["tools"],b:"new",d:"Écosystème complet de simulation OCPP 1.6J qualité production pour l'apprentissage et la recharge VE.",t:["OCPP","recharge-VE","simulation","protocole"]},
{e:"🖥️",n:"tty",c:["microbit"],b:"new",d:"Interface terminal pour micro:bit — console série directement depuis votre navigateur web.",t:["terminal","série","console","micro:bit"]}
];

const CATS=[
  {e:"⭐",n:"Tout",k:"all",col:"#fff"},
  {e:"🤖",n:"micro:bit",k:"microbit",col:"#00d4ff"},
  {e:"📚",n:"Apprentissage",k:"learning",col:"#22c55e"},
  {e:"🛠️",n:"Outils",k:"tools",col:"#ff2d8a"},
  {e:"🧠",n:"IA",k:"ai",col:"#9333ea"},
  {e:"🔩",n:"Matériel",k:"hardware",col:"#ff6b35"},
  {e:"📸",n:"Caméra",k:"camera",col:"#fbbf24"},
  {e:"🏫",n:"Classe",k:"classroom",col:"#4f6ef7"}
];

let apps=[...ALL_APPS],cur=0,playing=true,speed=5000,elapsed=0,lastT=Date.now(),filter='all';

// ===== STARFIELD =====
const cv=document.getElementById('bg'),cx=cv.getContext('2d');
let W,H,stars=[];
function onR(){W=cv.width=innerWidth;H=cv.height=innerHeight;stars=Array.from({length:80},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.1+.2,a:Math.random(),s:Math.random()*.2+.06}))}
onR();addEventListener('resize',onR);
(function draw(){cx.clearRect(0,0,W,H);stars.forEach(s=>{s.a+=s.s*.01;cx.globalAlpha=Math.abs(Math.sin(s.a))*.3;cx.fillStyle='#fff';cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fill()});cx.globalAlpha=1;requestAnimationFrame(draw)})();

// ===== FILTERS =====
const filtersEl=document.getElementById('filters');
CATS.forEach(c=>{
  const cnt=c.k==='all'?ALL_APPS.length:ALL_APPS.filter(a=>a.c.includes(c.k)).length;
  const b=document.createElement('button');
  b.className='fbtn'+(c.k==='all'?' on':'');
  b.dataset.k=c.k;
  b.innerHTML=`${c.e} ${c.n} <span class="cnt">${cnt}</span>`;
  b.onclick=()=>{
    filter=c.k;
    apps=c.k==='all'?[...ALL_APPS]:ALL_APPS.filter(a=>a.c.includes(c.k));
    document.querySelectorAll('.fbtn').forEach(f=>f.classList.toggle('on',f.dataset.k===c.k));
    document.getElementById('totalShown').textContent=apps.length;
    document.getElementById('catShown').textContent=c.n;
    cur=0;buildMiniGrid();showApp(0);
  };
  filtersEl.appendChild(b);
});

// ===== MINI GRID =====
function buildMiniGrid(){
  const mg=document.getElementById('miniGrid');
  mg.innerHTML='';
  apps.forEach((a,i)=>{
    const d=document.createElement('div');
    d.className='mini-dot'+(i===0?' on':'');
    d.textContent=a.e;
    d.title=a.n;
    d.onclick=()=>{cur=i;showApp(i)};
    mg.appendChild(d);
  });
}
buildMiniGrid();

// ===== SHOW APP =====
const card=document.getElementById('card');
function showApp(idx){
  if(idx<0)idx=apps.length-1;if(idx>=apps.length)idx=0;
  cur=idx;elapsed=0;lastT=Date.now();

  // Flip animation
  card.classList.add('flipping');
  setTimeout(()=>{
    const a=apps[idx];
    document.getElementById('cEmoji').textContent=a.e;
    document.getElementById('cName').textContent=a.n;
    document.getElementById('cDesc').textContent=a.d;
    document.getElementById('cLink').href=`https://abourdim.github.io/${a.n}/`;
    document.getElementById('cCounter').textContent=`${String(idx+1).padStart(2,'0')} / ${String(apps.length).padStart(2,'0')}`;

    // Badge
    const bb=document.getElementById('cBadge');
    const bMap={popular:'⭐ Popular',stable:'✅ Stable',dev:'🔧 Dev',new:'✨ New'};
    bb.innerHTML=`<span class="card-badge badge-${a.b}">${bMap[a.b]||a.b}</span>`;

    // Categories
    const cc=document.getElementById('cCats');
    cc.innerHTML=a.c.map(c=>`<span class="cat-pill cat-${c}">${c}</span>`).join('');

    // Tags
    const tt=document.getElementById('cTags');
    tt.innerHTML=(a.t||[]).map(t=>`<span class="tag-chip">#${t}</span>`).join('');

    // Mini grid highlight
    document.querySelectorAll('.mini-dot').forEach((d,i)=>d.classList.toggle('on',i===idx));

    card.classList.remove('flipping');
  },350);
}
showApp(0);

// ===== CONTROLS =====
document.getElementById('prevBtn').onclick=()=>showApp(cur-1);
document.getElementById('nextBtn').onclick=()=>showApp(cur+1);
document.getElementById('shuffleBtn').onclick=()=>{
  apps.sort(()=>Math.random()-.5);
  cur=0;buildMiniGrid();showApp(0);
};
document.getElementById('playBtn').onclick=function(){
  playing=!playing;this.textContent=playing?'⏸':'▶';lastT=Date.now();
};
document.getElementById('speedSel').onchange=function(){
  speed=+this.value;elapsed=0;lastT=Date.now();
};

// ===== TIMER =====
const progFill=document.getElementById('progFill');
(function tick(){
  if(playing){
    const n=Date.now();elapsed+=n-lastT;lastT=n;
    progFill.style.width=(Math.min(elapsed/speed,1)*100)+'%';
    if(elapsed>=speed)showApp(cur+1);
  }else lastT=Date.now();
  requestAnimationFrame(tick);
})();

// ===== KEYBOARD =====
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight')showApp(cur+1);
  if(e.key==='ArrowLeft')showApp(cur-1);
  if(e.key===' '){e.preventDefault();document.getElementById('playBtn').click()}
});
</script>
