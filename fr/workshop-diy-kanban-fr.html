.col-count{font-size:8px;color:rgba(0,255,65,.15);margin-left:auto;background:rgba(0,255,65,.02);padding:1px 6px;border-radius:8px}

.col-cards::-webkit-scrollbar{width:2px}.col-cards::-webkit-scrollbar-thumb{background:rgba(0,255,65,.06)}

.lb-robo{background:#00ff41}.lb-ai{background:#bf00ff}.lb-cyber{background:#ff0033}.lb-learn{background:#00d4ff}.lb-hw{background:#ff8800}.lb-devops{background:#0066ff}.lb-bug{background:#ffd700}.lb-feat{background:#ff00ff}

    {t:"Add MQTT support to smart-home",labels:["hw"],desc:"Enable MQTT protocol for real IoT device communication",tags:["feature"],avs:["⚡"],due:"Mar 20",dueClass:"due-ok"},
    {t:"Multiplayer pentest challenges",labels:["cyber"],desc:"Competitive CTF mode where students race to solve challenges",tags:["feature","multiplayer"],avs:["🔐"],due:"Apr 1",dueClass:"due-ok"},
    {t:"Dark/light theme toggle for all apps",labels:["feat"],desc:"User preference for theme across entire ecosystem",tags:["UX"],avs:["🎨"],check:"0/39"},
    {t:"PWA support — offline mode",labels:["feat"],desc:"Service worker + cache for offline access to apps",tags:["infrastructure"],avs:["💻"]},
    {t:"Gamepad API for robot control",labels:["robo"],desc:"Use USB/BT game controllers as robot input",tags:["feature"],avs:["🎮"]},
  ]},
  {name:"IN PROGRESS",color:"#00d4ff",cards:[
    {t:"🐛 BLE disconnect on Chrome 122+",labels:["robo","bug"],desc:"Web Bluetooth drops connection after ~2 min on latest Chrome. Investigating keepAlive workaround.",tags:["bug","P1"],avs:["👨‍💻","🤖"],due:"Feb 28",dueClass:"due-overdue",check:"2/5"},
    {t:"Teachable Machine → ESP32 bridge",labels:["ai","robo"],desc:"Direct gesture model output to ESP32 via WebSocket instead of micro:bit BLE only",tags:["feature"],avs:["🧠","⚡"],due:"Mar 5",dueClass:"due-soon",check:"3/6"},
    {t:"New CTF challenge pack: Network",labels:["cyber"],desc:"10 new challenges covering DNS, ARP, DHCP, packet analysis",tags:["content"],avs:["🔐"],due:"Mar 8",dueClass:"due-soon",check:"6/10"},
    {t:"Docker Compose tutorial module",labels:["learn","devops"],desc:"Step-by-step docker-compose lab with multi-container setup",tags:["content"],avs:["🐳"],due:"Mar 10",dueClass:"due-ok",check:"2/4"},
  ]},
  {name:"REVIEW",color:"#ffd700",cards:[
    {t:"linux-kids-lab: Add 10 new commands",labels:["learn"],desc:"grep, awk, sed, chmod, chown, tar, curl, wget, ssh, scp — all simulated in browser sandbox",tags:["content"],avs:["🐧","👨‍💻"],due:"Feb 25",dueClass:"due-overdue",check:"10/10"},
    {t:"pixel-gateway: Export to micro:bit",labels:["learn","robo"],desc:"Send pixel art directly to micro:bit LED matrix via BLE",tags:["feature"],avs:["🎨"],check:"4/4"},
    {t:"Homepage redesign v3",labels:["feat"],desc:"New landing page with interactive demo, app showcase grid, and animated stats",tags:["design"],avs:["🎨","👩‍💻"],check:"5/5"},
  ]},
  {name:"DONE ✓",color:"#00ff41",cards:[
    {t:"✅ bit-bot v3.2 — BLE reconnection fix",labels:["robo"],desc:"Fixed auto-reconnect, smoother servo transitions, added dance() method",tags:["release"],avs:["👨‍💻"],due:"Feb 20",dueClass:"due-ok"},
    {t:"✅ 39th app: tty serial terminal",labels:["tool"],desc:"Web Serial API terminal for direct USB communication with microcontrollers",tags:["release"],avs:["🔌"]},
    {t:"✅ magic-hands v2: particle effects",labels:["ai"],desc:"New confetti, fire, and lightning particle effects triggered by hand gestures",tags:["release"],avs:["🪄"]},
    {t:"✅ App catalog page redesign",labels:["feat"],desc:"New grid layout with filtering, search, and category badges. 39 apps organized.",tags:["design"],avs:["🎨"]},
    {t:"✅ Bug #42 declared a feature",labels:["bug"],desc:"After 3 months of investigation, bug #42 was formally reclassified as 'intended behavior.'",tags:["tradition"],avs:["🤖","☕"]},
  ]},
];

const board=document.getElementById('board');
COLS.forEach(col=>{
  const c=document.createElement('div');c.className='col';
  c.innerHTML=`<div class="col-h"><div class="col-dot" style="background:${col.color}"></div><span class="col-name">${col.name}</span><span class="col-count">${col.cards.length}</span></div><div class="col-cards">${col.cards.map(card=>`<div class="card">
    <div class="card-labels">${(card.labels||[]).map(l=>`<div class="label lb-${l}"></div>`).join('')}</div>
    <div class="card-title">${card.t}</div>
    ${card.desc?`<div class="card-desc">${card.desc}</div>`:''}
    <div class="card-footer">
      ${(card.tags||[]).map(t=>`<span class="card-tag">${t}</span>`).join('')}
      ${card.check?`<span class="card-check">☑ ${card.check}</span>`:''}
      ${card.due?`<span class="card-due ${card.dueClass||''}">${card.due}</span>`:''}
      <div class="card-assignees">${(card.avs||[]).map(a=>`<div class="card-av">${a}</div>`).join('')}</div>
    </div>
  </div>`).join('')}</div>`;
  board.appendChild(c);
});
</script>
