<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<script src="../../assets/js/sada-theme.js"></script>
<script src="../../assets/js/sada-lang.js"></script>
<link rel="stylesheet" href="../../assets/css/sada-base.css">
<link rel="stylesheet" href="../../assets/css/sada-themes.css">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WKSHP-DIY // KANBAN</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@700;800&Amiri&family=Noto+Kufi+Arabic:wght@400;700&display=swap" rel="stylesheet">
<style>
body{background:#0a0a0e;color:#fff;font-family:'JetBrains Mono',monospace;font-size:11px;overflow-x:auto}
.crt{position:fixed;inset:0;z-index:99;pointer-events:none}.crt::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,rgba(0,0,0,.03) 0,rgba(0,0,0,.03) 1px,transparent 1px,transparent 3px)}

.topbar{background:#080810;border-bottom:1px solid rgba(0,255,65,.04);padding:6px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
.topbar-logo{font-family:'Syne',sans-serif;font-size:13px;font-weight:800;color:#00ff41}
.topbar-board{font-size:10px;color:rgba(0,255,65,.3);margin-left:8px;border-left:1px solid rgba(0,255,65,.06);padding-left:8px}
.topbar-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.topbar-av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;border:1px solid rgba(0,255,65,.1)}

.board{display:flex;gap:8px;padding:12px;min-height:calc(100vh - 38px);align-items:flex-start;overflow-x:auto}

/* COLUMN */
.col{width:260px;flex-shrink:0;background:rgba(0,255,65,.005);border:1px solid rgba(0,255,65,.03);border-radius:6px;max-height:calc(100vh - 60px);display:flex;flex-direction:column}
.col-h{padding:8px 10px;display:flex;align-items:center;gap:6px;border-bottom:1px solid rgba(0,255,65,.03);flex-shrink:0}
.col-dot{width:8px;height:8px;border-radius:50%}
.col-name{font-size:10px;font-weight:700;color:rgba(0,255,65,.5);letter-spacing:1px}
.col-count{font-size:8px;color:rgba(0,255,65,.15);margin-left:auto;background:rgba(0,255,65,.02);padding:1px 6px;border-radius:8px}
.col-cards{flex:1;padding:6px;overflow-y:auto}
.col-cards::-webkit-scrollbar{width:2px}.col-cards::-webkit-scrollbar-thumb{background:rgba(0,255,65,.06)}

/* CARD */
.card{background:rgba(0,255,65,.008);border:1px solid rgba(0,255,65,.04);border-radius:5px;padding:8px;margin-bottom:6px;cursor:default;transition:all .15s}
.card:hover{border-color:rgba(0,255,65,.12);background:rgba(0,255,65,.015);transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.2)}
.card-labels{display:flex;gap:3px;margin-bottom:5px;flex-wrap:wrap}
.label{height:5px;width:24px;border-radius:3px}
.lb-robo{background:#00ff41}.lb-ai{background:#bf00ff}.lb-cyber{background:#ff0033}.lb-learn{background:#00d4ff}.lb-hw{background:#ff8800}.lb-devops{background:#0066ff}.lb-bug{background:#ffd700}.lb-feat{background:#ff00ff}
.card-title{font-size:10px;font-weight:700;color:rgba(255,255,255,.7);line-height:1.6;margin-bottom:4px}
.card-desc{font-size:8px;color:rgba(0,255,65,.2);line-height:1.6;margin-bottom:6px}
.card-footer{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.card-tag{font-size:6px;padding:1px 5px;border-radius:2px;border:1px solid rgba(0,255,65,.06);color:rgba(0,255,65,.2);letter-spacing:.5px}
.card-assignees{display:flex;gap:-4px;margin-left:auto}
.card-av{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;border:1px solid rgba(0,255,65,.08);background:rgba(0,0,0,.3)}
.card-due{font-size:6px;padding:1px 5px;border-radius:2px;border:1px solid;color:rgba(255,255,255,.2)}
.due-soon{border-color:rgba(255,136,0,.2);color:#ff8800;background:rgba(255,136,0,.03)}
.due-overdue{border-color:rgba(255,0,51,.2);color:#ff0033;background:rgba(255,0,51,.03)}
.due-ok{border-color:rgba(0,255,65,.1);color:rgba(0,255,65,.3)}
.card-check{font-size:7px;color:rgba(0,255,65,.15)}

/* PRIORITY */
.prio{width:3px;height:100%;position:absolute;left:0;top:0;border-radius:3px 0 0 3px}
</style>
</head>
<body>
<div style="font-family:'Amiri',serif;font-size:13px;color:rgba(255,255,255,.08);text-align:center;padding:4px;direction:rtl">بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</div>
<div class="crt"></div>

<div class="topbar">
  <div class="topbar-logo">WKSHP-BOARD</div>
  <div class="topbar-board">Développement Workshop-DIY</div>
  <div class="topbar-right">
    <div class="topbar-av">👨‍💻</div>
    <div class="topbar-av">👩‍💻</div>
    <div class="topbar-av">🤖</div>
  </div>
</div>

<div class="board" id="board"></div>

<script>
const COLS=[
  {name:"BACKLOG",color:"#555",cards:[
    {t:"Contrôle vocal pour robots ESP32",labels:["robo","ai"],desc:"Ajouter l'API Web Speech à l'application de contrôle robot ESP32",tags:["amélioration"],avs:["🧠"],due:"15 mars",dueClass:"due-ok",check:"0/4"},
    {t:"Ajouter support MQTT à smart-home",labels:["hw"],desc:"Activer le protocole MQTT pour la communication avec de vrais appareils IoT",tags:["fonctionnalité"],avs:["⚡"],due:"20 mars",dueClass:"due-ok"},
    {t:"Défis pentest multijoueurs",labels:["cyber"],desc:"Mode CTF compétitif où les élèves font la course pour résoudre les défis",tags:["fonctionnalité","multijoueur"],avs:["🔐"],due:"1 avr",dueClass:"due-ok"},
    {t:"Bascule thème sombre/clair pour toutes les apps",labels:["feat"],desc:"Préférence utilisateur pour le thème dans tout l'écosystème",tags:["UX"],avs:["🎨"],check:"0/39"},
    {t:"Support PWA — mode hors ligne",labels:["feat"],desc:"Service worker + cache pour l'accès hors ligne aux apps",tags:["infrastructure"],avs:["💻"]},
    {t:"API Gamepad pour contrôle robot",labels:["robo"],desc:"Utiliser des manettes USB/BT comme entrée robot",tags:["fonctionnalité"],avs:["🎮"]},
  ]},
  {name:"EN COURS",color:"#00d4ff",cards:[
    {t:"🐛 Déconnexion BLE sur Chrome 122+",labels:["robo","bug"],desc:"Web Bluetooth perd la connexion après ~2 min sur le dernier Chrome. Investigation du contournement keepAlive.",tags:["bug","P1"],avs:["👨‍💻","🤖"],due:"28 fév",dueClass:"due-overdue",check:"2/5"},
    {t:"Pont Teachable Machine → ESP32",labels:["ai","robo"],desc:"Sortie directe du modèle de gestes vers ESP32 via WebSocket au lieu de BLE micro:bit uniquement",tags:["fonctionnalité"],avs:["🧠","⚡"],due:"5 mars",dueClass:"due-soon",check:"3/6"},
    {t:"Nouveau pack de défis CTF : Réseau",labels:["cyber"],desc:"10 nouveaux défis couvrant DNS, ARP, DHCP, analyse de paquets",tags:["contenu"],avs:["🔐"],due:"8 mars",dueClass:"due-soon",check:"6/10"},
    {t:"Module tutoriel Docker Compose",labels:["learn","devops"],desc:"Lab docker-compose étape par étape avec configuration multi-conteneurs",tags:["contenu"],avs:["🐳"],due:"10 mars",dueClass:"due-ok",check:"2/4"},
  ]},
  {name:"REVUE",color:"#ffd700",cards:[
    {t:"linux-kids-lab : Ajouter 10 nouvelles commandes",labels:["learn"],desc:"grep, awk, sed, chmod, chown, tar, curl, wget, ssh, scp — toutes simulées dans un bac à sable navigateur",tags:["contenu"],avs:["🐧","👨‍💻"],due:"25 fév",dueClass:"due-overdue",check:"10/10"},
    {t:"pixel-gateway : Export vers micro:bit",labels:["learn","robo"],desc:"Envoyer du pixel art directement à la matrice LED micro:bit via BLE",tags:["fonctionnalité"],avs:["🎨"],check:"4/4"},
    {t:"Refonte de la page d'accueil v3",labels:["feat"],desc:"Nouvelle page d'accueil avec démo interactive, grille de présentation des apps et statistiques animées",tags:["design"],avs:["🎨","👩‍💻"],check:"5/5"},
  ]},
  {name:"TERMINÉ ✓",color:"#00ff41",cards:[
    {t:"✅ bit-bot v3.2 — Correction reconnexion BLE",labels:["robo"],desc:"Correction de la reconnexion auto, transitions servo plus fluides, ajout de la méthode dance()",tags:["version"],avs:["👨‍💻"],due:"20 fév",dueClass:"due-ok"},
    {t:"✅ 39e app : terminal série tty",labels:["tool"],desc:"Terminal API Web Serial pour communication USB directe avec les microcontrôleurs",tags:["version"],avs:["🔌"]},
    {t:"✅ magic-hands v2 : effets de particules",labels:["ai"],desc:"Nouveaux effets de particules confettis, feu et éclairs déclenchés par les gestes de la main",tags:["version"],avs:["🪄"]},
    {t:"✅ Refonte de la page catalogue des apps",labels:["feat"],desc:"Nouvelle disposition en grille avec filtrage, recherche et badges de catégorie. 39 apps organisées.",tags:["design"],avs:["🎨"]},
    {t:"✅ Bug #42 déclaré fonctionnalité",labels:["bug"],desc:"Après 3 mois d'investigation, bug #42 a été officiellement reclassifié comme « comportement intentionnel ».",tags:["tradition"],avs:["🤖","☕"]},
  ]},
];

const board=document.getElementById('board');
COLS.forEach(col=>{
  const c=document.createElement('div');c.className='col';
  c.innerHTML=`<div class="col-h"><div class="col-dot" style="background:${col.color}"></div><span class="col-name">${col.name}</span><span class="col-count">${col.cards.length}</span></div><div class="col-cards">${col.cards.map(card=>`<div class="card">
    <div class="card-labels">${(card.labels||[]).map(l=>`<div class="label lb-${l}"></div>`).join('')}</div>
    <div class="card-title">${card.t}</div>
    ${card.desc?`<div class="card-desc">${card.desc}</div>`:''}
    <div class="card-footer">
      ${(card.tags||[]).map(t=>`<span class="card-tag">${t}</span>`).join('')}
      ${card.check?`<span class="card-check">☑ ${card.check}</span>`:''}
      ${card.due?`<span class="card-due ${card.dueClass||''}">${card.due}</span>`:''}
      <div class="card-assignees">${(card.avs||[]).map(a=>`<div class="card-av">${a}</div>`).join('')}</div>
    </div>
  </div>`).join('')}</div>`;
  board.appendChild(c);
});
</script>

<script src="../../assets/js/sada-footer.js?v=2"></script>
<script src="../../assets/js/sada-nav.js"></script>
</body>
</html>
