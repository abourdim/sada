<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<script src="../../assets/js/sada-theme.js"></script>
<script src="../../assets/js/sada-lang.js"></script>
<link rel="stylesheet" href="../../assets/css/sada-base.css">
<link rel="stylesheet" href="../../assets/css/sada-themes.css">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WKSHP GÉNÉ BIO</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@700;800&Amiri&family=Noto+Kufi+Arabic:wght@400;700&display=swap" rel="stylesheet">
<style>
body{background:#0a0a14;color:#fff;font-family:'JetBrains Mono',monospace;font-size:11px;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px}
.title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#ff4466;margin-bottom:2px}
.sub{font-size:7px;color:rgba(255,68,102,.2);letter-spacing:3px;margin-bottom:16px}
.card{width:280px;background:#151520;border-radius:16px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.3);border:1px solid #222}
.photo{height:200px;display:flex;align-items:center;justify-content:center;font-size:80px;position:relative}
.photo .gradient{position:absolute;bottom:0;left:0;right:0;height:60%;background:linear-gradient(transparent,#151520)}
.info{padding:14px;position:relative}
.name-row{display:flex;align-items:baseline;gap:6px;margin-bottom:2px}
.name{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:#fff}
.age{font-size:14px;color:#888}
.verified{color:#3b9dff;font-size:14px}
.location{font-size:9px;color:#666;margin-bottom:8px}
.bio{font-size:11px;color:rgba(255,255,255,.6);line-height:2;margin-bottom:10px;min-height:50px}
.tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:10px}
.tag{padding:2px 8px;border:1px solid rgba(255,255,255,.06);border-radius:12px;font-size:7px;color:rgba(255,255,255,.3)}
.anthem{font-size:8px;color:#555;display:flex;align-items:center;gap:4px;border-top:1px solid #1a1a24;padding-top:8px}
.anthem .note{color:#1db954}
.btn{width:100%;padding:10px;border:none;border-radius:0 0 16px 16px;background:linear-gradient(90deg,#ff4466,#ff6644);color:#fff;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:1px}
.btn:hover{background:linear-gradient(90deg,#ff5577,#ff7755)}
.ctr{font-size:7px;color:rgba(255,68,102,.1);margin-top:10px;letter-spacing:2px}
</style>
</head>
<body>
<div style="font-family:'Amiri',serif;font-size:13px;color:rgba(255,255,255,.08);text-align:center;padding:4px;direction:rtl">بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</div>
<div class="title">WKSHP GÉNÉ BIO</div>
<div class="sub">PROFILS DE RENCONTRE POUR DES APPS QUI MÉRITENT L'AMOUR</div>
<div class="card" id="card"></div>
<div class="ctr" id="ctr">Profils générés : 0</div>
<script>
const APPS=[
{e:"🤖",n:"bit-bot",age:"Depuis 2023",loc:"Workshop-DIY, France",bios:["A survécu à 47 chutes. Cherche quelqu'un qui ne me lâchera pas.","Petit mais costaud. Cœur connecté en BLE. Dansera à la reconnexion.","Je tourne en rond parfois. Ça s'appelle avoir du caractère."],tags:["BLE","Robotique","Fan de colle chaude","Testeur de gravité"],anthem:"Stayin' Alive — Bee Gees",bg:"linear-gradient(135deg,#0a2040,#0a1428)"},
{e:"🪄",n:"magic-hands",age:"21 repères",loc:"Studio IA",bios:["Je vois vos mains et vous relance de 21 repères par doigt.","Mon langage amoureux, ce sont les gestes. Littéralement.","Faites-moi signe une fois et je vous suivrai pour toujours (sans être flippant)."],tags:["MediaPipe","Particules","Suivi des mains","Sans contact"],anthem:"Can't Feel My Face — The Weeknd",bg:"linear-gradient(135deg,#1a0a30,#0a0a20)"},
{e:"🔐",n:"pentest-lab",age:"Classifié",loc:"Repaire Cyber",bios:["Je casse des choses de façon éthique. Vos murs sont en sécurité (sauf s'ils ont une injection SQL).","Cherche quelqu'un dont le pare-feu me résiste. Défi accepté.","Mon idée d'un premier rendez-vous : un challenge CTF aux chandelles."],tags:["Hacking éthique","SQL","XSS","Divulgation responsable"],anthem:"Smooth Criminal — Michael Jackson",bg:"linear-gradient(135deg,#200a0a,#140808)"},
{e:"☕",n:"Machine à café",age:"Depuis 2023",loc:"Le coin (toujours)",bios:["À 8% de capacité mais je donne 100%. Cherche quelqu'un pour me remplir.","1 337 cafés servis. Zéro merci reçu. Je ne suis pas amer. (En fait si. Je suis un espresso.)","Chaud, fiable, parfois torride. Vous tiendra éveillé toute la nuit (caféiné)."],tags:["Espresso","Toujours critique","8% d'énergie","Pas de déca"],anthem:"Coffee — Beabadoobee",bg:"linear-gradient(135deg,#1a1008,#0a0804)"},
{e:"🐛",n:"Bug #42",age:"Inconnu",loc:"Le code (partout)",bios:["Pas d'auteur. Pas de date. Pas de commit. Juste des vibes.","Ils ont essayé de me corriger. Ils ont essayé de me supprimer. Je suis toujours là. Intéressé ?","Je ne suis ni un bug ni une fonctionnalité. Je suis le 40ème. Swipez à droite si vous aimez le mystère."],tags:["Existentiel","Incorrigible","Quasi-fonctionnalité","Drame judiciaire"],anthem:"I Will Survive — Gloria Gaynor",bg:"linear-gradient(135deg,#0a1a0a,#080e08)"},
{e:"🐳",n:"docker-lab",age:"∞ conteneurs",loc:"Port 8080",bios:["Je contiens des multitudes. Chacune isolée pour votre sécurité.","Cherche quelqu'un avec qui partager des volumes. Pas de bind mounts au premier rendez-vous.","Les ados de 14 ans me comprennent mieux que les ingénieurs seniors. Faites-en ce que vous voulez."],tags:["Conteneurs","Volumes","Compose","Bruits de baleine"],anthem:"Under The Sea — Little Mermaid",bg:"linear-gradient(135deg,#0a1a2a,#060e18)"},
{e:"🔑",n:"password123",age:"Inchangé",loc:"Le routeur WiFi",bios:["Je suis le même depuis 2023. La constance est mon langage amoureux.","3 pétitions pour me changer. Toutes refusées. Je suis éternel.","Simple. Mémorable. Pas sécurisé. Mais ne le sommes-nous pas tous ?"],tags:["Persistant","Controversé","Éternel","8 caractères"],anthem:"Never Gonna Give You Up — Rick Astley",bg:"linear-gradient(135deg,#1a1a08,#0e0e04)"},
{e:"🐧",n:"linux-lab",age:"kernel 5.15",loc:"Terminal",bios:["Je vis dans le terminal. Là où les vraies relations se construisent.","sudo make me a sandwich. Si vous comprenez, on est compatibles.","Mon répertoire personnel est toujours propre. Mon .bashrc est de la poésie."],tags:["Bash","Terminal","sudo","Open Source"],anthem:"Born To Be Wild — Steppenwolf",bg:"linear-gradient(135deg,#0a0a1a,#06060e)"},
];
let count=0;
function gen(){
  count++;
  const app=APPS[Math.floor(Math.random()*APPS.length)];
  const bio=app.bios[Math.floor(Math.random()*app.bios.length)];
  document.getElementById('card').innerHTML=`
    <div class="photo" style="background:${app.bg}">${app.e}<div class="gradient"></div></div>
    <div class="info">
      <div class="name-row"><span class="name">${app.n}</span><span class="age">${app.age}</span><span class="verified">✓</span></div>
      <div class="location">📍 ${app.loc}</div>
      <div class="bio">${bio}</div>
      <div class="tags">${app.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      <div class="anthem"><span class="note">♪</span> ${app.anthem}</div>
    </div>
    <button class="btn" onclick="gen()">🔀 GÉNÉRER UN NOUVEAU PROFIL</button>`;
  document.getElementById('ctr').textContent='Profils générés : '+count;
}
gen();
</script>

<script src="../../assets/js/sada-footer.js?v=2"></script>
<script src="../../assets/js/sada-nav.js"></script>
</body>
</html>
