add('  [  0.300000] NET: WiFi connected to "Workshop-DIY-5G"','dim');

  out.appendChild(div);
  document.body.style.cursor='text';
},delay);

// Allow fake typing after boot
delay+=500;
setTimeout(()=>{
  document.addEventListener('keydown',e=>{
    if(e.key.length===1){
      const cursors=document.querySelectorAll('.cursor-block');
      const last=cursors[cursors.length-1];
      if(last){
        const span=document.createElement('span');
        span.className='green';span.textContent=e.key;
        last.parentElement.insertBefore(span,last);
      }
    }
    if(e.key==='Enter'){
      const cursors=document.querySelectorAll('.cursor-block');
      cursors.forEach(c=>c.remove());
      const div=document.createElement('div');div.className='line';
      div.innerHTML='<span class="green">maker@wkshp-os:~$ </span><span class="cursor-block"></span>';
