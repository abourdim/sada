<script>
const PLATES=[
  {text:"BIT-BOT",sub:"ROBOTICS DIVISION",e:"🤖"},
  {text:"B42-FTR",sub:"BUG #42 · FEATURE",e:"🐛"},
  {text:"PSW-123",sub:"UNCHANGED SINCE 2023",e:"🔑"},
  {text:"DKR-LAB",sub:"CONTAINERS ONLY",e:"🐳"},

  {text:"WLD-LED",sub:"16M COLORS",e:"💡"},
  {text:"PEN-TST",sub:"ETHICAL ONLY",e:"🔐"},
  {text:"HAK-42M",sub:"THE 40TH APP",e:"⬛"},
  {text:"WKS-039",sub:"39 APPS · 0 INSTALL",e:"🚀"},

const el=document.getElementById('plates');
PLATES.forEach(p=>{
  el.innerHTML+=`<div class="plate">
    <div class="eu-strip"><div class="stars">★★★<br>★★★<br>★★★★</div><div class="country">F</div></div>
    <div class="text-area"><div class="plate-text">${p.text}</div><div class="plate-sub">${p.sub}</div></div>
    <div class="emoji-r">${p.e}</div>
  </div>`;
});

function updatePreview(){
  const t=document.getElementById('customText').value.toUpperCase()||'WKSHP';
  document.getElementById('preview').innerHTML=`<div class="plate" style="margin:8px auto">
    <div class="eu-strip"><div class="stars">★★★<br>★★★<br>★★★★</div><div class="country">F</div></div>

    <div class="emoji-r">🏁</div>
  </div>`;
}
updatePreview();
</script>
