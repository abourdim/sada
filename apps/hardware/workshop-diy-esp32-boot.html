.line{opacity:0;animation:appear .05s forwards}
@keyframes appear{to{opacity:1}}

.info{color:#00aaff}
.white{color:#aaa}

<div id="out"></div>

const out=document.getElementById('out');
let delay=0;

function add(text,cls,d){
  delay+=d||40;
  setTimeout(()=>{
    const div=document.createElement('div');
    div.className='line'+(cls?' '+cls:'');
    div.innerHTML=text;
    out.appendChild(div);
    window.scrollTo(0,document.body.scrollHeight);
  },delay);
}
