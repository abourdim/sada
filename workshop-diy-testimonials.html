const REVIEWS=[
{a:"👦",n:"Lucas M.",role:"student",r:"student",s:5,d:"Feb 2025",t:"The <b>bit-bot</b> app is insane. I drove a robot from my browser in 30 seconds. No installs, no configuration, just Bluetooth and go. I've been coding every day since.",app:"🤖 bit-bot",likes:24},
{a:"👩",n:"Sophie D.",role:"parent",r:"parent",s:5,d:"Jan 2025",t:"My daughter went from watching YouTube to building AI models. She trained <b>teachable-machine</b> to recognize hand gestures and connected it to a robot. She's 11.",app:"🧠 teachable-machine",likes:31},
{a:"👨‍🏫",n:"Karim B.",role:"teacher",r:"teacher",s:5,d:"Feb 2025",t:"Finally, a platform where I don't spend 45 minutes on installation issues. Students open a URL and start learning. <b>linux-kids-lab</b> taught terminal commands in one session.",app:"🐧 linux-kids-lab",likes:19},
{a:"👧",n:"Amira T.",role:"student",r:"student",s:5,d:"Dec 2024",t:"<b>magic-hands</b> is pure magic. I waved at my screen for an hour making particle effects. Then I learned how MediaPipe actually works. Sneaky education.",app:"🪄 magic-hands",likes:27},
{a:"👨",n:"Marc L.",role:"parent",r:"parent",s:4,d:"Nov 2024",t:"Great collection. One minor concern: my 14-year-old now explains Docker containers to me. I'm a senior software engineer. This is... humbling.",app:"🐳 docker-lab",likes:42},
{a:"👩‍💻",n:"Nour K.",role:"maker",r:"maker",s:5,d:"Jan 2025",t:"Built a complete IoT dashboard with <b>smart-home</b> and connected it to real sensors via ESP32. The documentation is clear, the code is clean, and it's all free.",app:"🏡 smart-home",likes:15},
{a:"👦",n:"Youssef A.",role:"student",r:"student",s:5,d:"Feb 2025",t:"The <b>pentest-lab</b> challenges are addictive. I solved the SQL injection level and found an actual vulnerability in our school printer. Ethically reported, of course.",app:"🔐 pentest-lab",likes:33},
{a:"👩‍🏫",n:"Marie F.",role:"teacher",r:"teacher",s:5,d:"Dec 2024",t:"I use <b>classroom</b> to manage my STEM workshops. Assign challenges, track progress, everything in one place. The students don't even realize how much they're learning.",app:"🏫 classroom",likes:16},
{a:"👧",n:"Léa P.",role:"student",r:"student",s:5,d:"Jan 2025",t:"<b>face-quest</b> turned face detection into a game. I scored 847 points and learned about computer vision without opening a textbook. More of this please.",app:"🕵️ face-quest",likes:21},
{a:"👨",n:"David R.",role:"maker",r:"maker",s:5,d:"Nov 2024",t:"The ESP32 robot kit survived being dropped 47 times by my students. The hardware quality is impressive, and the <b>bit-bot</b> app makes control effortless.",app:"🤖 bit-bot",likes:18},
{a:"👩",n:"Fatima Z.",role:"parent",r:"parent",s:5,d:"Feb 2025",t:"My son discovered <b>prompt-hero</b> and now he's teaching me how to talk to AI. The student has become the master. I'm not sure how I feel about this.",app:"✨ prompt-hero",likes:25},
{a:"👦",n:"Thomas W.",role:"student",r:"student",s:5,d:"Dec 2024",t:"I learned Git through <b>git-lab</b> and now I version control my homework. My teacher doesn't know what a 'pull request' is but she's impressed.",app:"🔀 git-lab",likes:14},
{a:"👩‍💻",n:"Jade M.",role:"maker",r:"maker",s:5,d:"Jan 2025",t:"<b>wled-kids-lab</b> let me control an entire LED strip from my phone. I built custom animations for my room. The kids at the workshop were jealous.",app:"💡 wled-kids-lab",likes:12},
{a:"👨‍🏫",n:"Omar H.",role:"teacher",r:"teacher",s:5,d:"Feb 2025",t:"39 apps, all browser-based, all free. I've been teaching STEM for 15 years and this is the most accessible platform I've ever used. Zero configuration headaches.",app:"All apps",likes:38},
{a:"👧",n:"Clara S.",role:"student",r:"student",s:5,d:"Jan 2025",t:"The <b>pixel-gateway</b> pixel art editor is therapeutic. I made art for an hour, then exported it to my micro:bit's LED matrix. Creative AND technical.",app:"🎨 pixel-gateway",likes:11},
{a:"👨",n:"Pierre G.",role:"parent",r:"parent",s:5,d:"Nov 2024",t:"Finally found something better than Fortnite. My kids fight over who gets to use the <b>magic-hands</b> app next. Never thought I'd say that about an educational tool.",app:"🪄 magic-hands",likes:29},
];

let curFilter='all';
function render(){
  const el=document.getElementById('reviews');
  const filtered=curFilter==='all'?REVIEWS:REVIEWS.filter(r=>r.r===curFilter);
  el.innerHTML=filtered.map(r=>`<div class="review"><div class="rev-head"><div class="rev-avatar ${r.r}">${r.a}</div><div><div class="rev-name">${r.n}</div><div class="rev-role">${r.role.toUpperCase()}</div></div><span class="rev-date">${r.d}</span></div><div class="rev-stars">${'★'.repeat(r.s)}${'☆'.repeat(5-r.s)}</div><div class="rev-text">${r.t}</div><span class="rev-app">${r.app}</span><div class="rev-likes">👍 ${r.likes} found this helpful</div></div>`).join('');
}

document.querySelectorAll('.filter').forEach(f=>f.onclick=()=>{
  document.querySelectorAll('.filter').forEach(x=>x.classList.remove('on'));
  f.classList.add('on');curFilter=f.dataset.f;render();
});
render();
