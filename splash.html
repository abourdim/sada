<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>صدى sada</title>
<meta http-equiv="refresh" content="2;url=start_here.html">
<script src="assets/js/sada-theme.js"></script>
<link rel="stylesheet" href="assets/css/sada-themes.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#06060e;color:#fff;font-family:system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}
.logo{text-align:center;animation:fadeIn 1s ease-out}
.logo-ar{font-family:serif;font-size:clamp(4rem,12vw,8rem);background:linear-gradient(135deg,#14b8a6,#06b6d4,#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.2}
.logo-en{font-size:1.2rem;color:rgba(255,255,255,.15);letter-spacing:8px;margin-top:8px}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="logo">
  <div class="logo-ar">صدى</div>
  <div class="logo-en">sada</div>
</div>
<script>setTimeout(function(){location.replace('start_here.html')},2000)</script>
</body>
</html>
