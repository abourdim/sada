<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>صدى sada — Storyboard: ESP32 vs micro:bit</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=JetBrains+Mono:wght@400;500&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06080f;--s1:#0c1018;--brd:rgba(255,255,255,.07);--txt:#e2e6f0;--dim:rgba(255,255,255,.35);--acc:#ef4444;--pk:#ff2d8a;--bl:#4f6ef7;--cy:#00d4ff;--gn:#22c55e;--yw:#fbbf24}
body{background:var(--bg);color:var(--txt);font-family:'Fredoka',sans-serif;min-height:100vh;overflow:hidden}
.player{width:100%;height:100vh;display:flex;flex-direction:column}
.stage{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden}
.scene{text-align:center;max-width:700px;width:100%;opacity:0;transform:translateY(30px);transition:opacity .6s,transform .6s;position:absolute}
.scene.active{opacity:1;transform:translateY(0);position:relative}
.scene .num{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:3px;color:var(--acc);text-transform:uppercase;margin-bottom:10px}
.scene .emoji{font-size:clamp(60px,15vw,100px);margin-bottom:16px;display:block;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.scene h2{font-family:'Syne',sans-serif;font-size:clamp(20px,4vw,32px);font-weight:800;line-height:1.2;margin-bottom:12px}
.scene h2 b{color:var(--acc)}.scene h2 i{font-style:normal;color:var(--bl)}
.scene .vo{font-size:clamp(13px,2.5vw,16px);color:var(--dim);line-height:1.8;max-width:550px;margin:0 auto 12px;font-style:italic}
.scene .dir{font-family:'JetBrains Mono',monospace;font-size:9px;color:rgba(255,255,255,.15);letter-spacing:.5px;max-width:500px;margin:0 auto;line-height:1.6}
.scene .time{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--acc);margin-top:8px;letter-spacing:2px}
.bar{height:48px;background:var(--s1);border-top:1px solid var(--brd);display:flex;align-items:center;padding:0 16px;gap:8px}
.dots{display:flex;gap:6px;flex:1;justify-content:center}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.1);cursor:pointer;transition:.2s}
.dot.on{background:var(--acc);box-shadow:0 0 8px var(--acc)}.dot:hover{background:rgba(255,255,255,.3)}
.bbtn{background:none;border:1px solid var(--brd);color:var(--dim);padding:4px 12px;border-radius:14px;font-size:10px;cursor:pointer;font-family:'Fredoka',sans-serif;transition:.2s}
.bbtn:hover{color:var(--txt);border-color:var(--acc)}
.prog{position:absolute;top:0;left:0;height:2px;background:linear-gradient(90deg,var(--acc),var(--bl));transition:width .4s;z-index:10}
.auto{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--dim);cursor:pointer}.auto.on{color:var(--acc)}
.title-bar{position:absolute;top:0;left:0;right:0;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;z-index:5}
.title-bar .logo{font-family:'Syne',sans-serif;font-size:11px;font-weight:800;color:var(--dim)}
.title-bar .logo b{background:linear-gradient(135deg,#ff6600,var(--pk));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.title-bar .info{font-family:'JetBrains Mono',monospace;font-size:8px;color:rgba(255,255,255,.15);letter-spacing:1px}
.foot{position:absolute;bottom:56px;left:0;right:0;text-align:center;font-size:7px;color:rgba(255,255,255,.08);font-family:'JetBrains Mono',monospace;letter-spacing:1px}
</style>
</head>
<body>
<div class="player">
<div class="prog" id="prog"></div>
<div class="title-bar"><div class="logo"><b>WORKSHOP</b>-DIY</div><div class="info">STORYBOARD · 8 SCENES</div></div>
<div class="stage" id="stage"></div>
<div class="foot">workshop-diy.org · Association Loi 1901 · Chelles 77500</div>
<div class="bar"><button class="bbtn" onclick="prev()">◀</button><div class="dots" id="dots"></div><button class="bbtn" onclick="next()">▶</button><span class="auto" id="autoBtn" onclick="toggleAuto()">▶ AUTO</span></div>
</div>
<script>
const S=[
{emoji:"🥊",title:"<b>المتنافسان</b>",vo:"في الزاوية اليسرى: ESP32. واي فاي. بلوتوث. نواة مزدوجة. 3 يورو. في الزاوية اليمنى: micro:bit V2. LEDs. مستشعرات. تعليمي. 15 يورو.",dir:"BOXING STYLE: Split screen. ESP32 on red side, micro:bit on blue. Stats scroll like a fighting game character select. Dramatic announcer voice. Crowd noise.",time:"0:00 — 0:12"},
{emoji:"📡",title:"الجولة 1 — <b>السعر</b>",vo:"ESP32: 3€. micro:bit: 15€. أرخص بخمس مرات. لكن السعر ليس كل شيء. اسأل password123 — مجانية ومع ذلك لا تُقدّر بثمن.",dir:"BOXING RING: Both boards 'face off'. Animated pins light up. Score cards flash. Commentator: 'The ESP32 has more versatility, but the micro:bit has accessibility!' DRAW.",time:"0:12 — 0:28"},
{emoji:"📶",title:"الجولة 2 — <b>واي فاي</b>",vo:"ESP32: واي فاي مدمج. يتصل بالإنترنت. خادم ويب مدمج. micro:bit: لا واي فاي. ولا قريب من ذلك. ESP32 يفوز بهذه الجولة.",dir:"ESP32 sends data to cloud (animated). micro:bit tries, fails, uses radio instead to talk to another micro:bit. Interesting strategy, but limited. POINT: ESP32.",time:"0:28 — 0:44"},
{emoji:"👶",title:"الجولة 3 — <b>السهولة</b>",vo:"micro:bit: MakeCode. سحب وإفلات. طفل 6 سنوات يبرمج في 5 دقائق. ESP32: Arduino IDE. كود C++. قواعد نحوية. فواصل منقوطة. micro:bit يفوز.",dir:"SPLIT SCREEN: Kid with micro:bit — smiling, blocks snapping, LED displaying heart in 30 seconds. Kid with ESP32 — confused, driver errors, asking for help. POINT: micro:bit.",time:"0:44 — 1:00"},
{emoji:"💰",title:"الجولة 4 — <b>المستشعرات</b>",vo:"micro:bit: مقياس تسارع، حرارة، ضوء، ميكروفون، مكبر صوت، بوصلة — كلها مدمجة. ESP32: منافذ GPIO عارية. اشترِ مستشعراتك. micro:bit يفوز.",dir:"PRICE TAGS drop from ceiling. ESP32: '€3'. micro:bit: '€15'. Calculator animation: 5×€3 = €15. Five ESP32s line up against one micro:bit. POINT: ESP32.",time:"1:00 — 1:14"},
{emoji:"🌐",title:"الجولة 5 — <b>القوة</b>",vo:"ESP32: 240 ميغاهرتز نواة مزدوجة. 520 كيلوبايت RAM. micro:bit: 64 ميغاهرتز نواة واحدة. 128 كيلوبايت. ESP32 يفوز. إنه وحش.",dir:"Two webs expanding: micro:bit's educational ecosystem (schools, blocks, tutorials). ESP32's professional ecosystem (IoT, industry, servers). Both impressive. DRAW.",time:"1:14 — 1:28"},
{emoji:"🤝",title:"الجولة 6 — <b>إنترنت الأشياء</b>",vo:"ESP32: MQTT, HTTP, WebSocket, OTA. شريحة IoT المثالية. micro:bit: BLE فقط. لا اتصال سحابي. ESP32 يهيمن على حلبة IoT.",dir:"JUDGES huddle. Dramatic pause. Score cards raised: 'DRAW.' Crowd confused. Then: both boards placed side-by-side. Connected via Bluetooth. Working TOGETHER.",time:"1:28 — 1:44"},
{emoji:"❤️",title:"<b>الحكم</b>",vo:"لا يوجد فائز. micro:bit للتعلم. ESP32 للبناء. ابدأ بأحدهما، وتطوّر مع الآخر. Workshop-DIY يستخدم كليهما.",dir:"FINAL: Kids using both boards. micro:bit for beginners, ESP32 for advanced. Connected. Complementary. SUPER: 'Workshop-DIY: Start anywhere. Go everywhere.' Logo. Chelles 77500.",time:"1:44 — 2:00"}
];
let cur=0,autoId=null;
function render(){const stage=document.getElementById('stage');const dots=document.getElementById('dots');stage.innerHTML=S.map((s,i)=>`<div class="scene${i===cur?' active':''}">\n<div class="num">مشهد ${i+1} من ${S.length}</div>\n<span class="emoji">${s.emoji}</span>\n<h2>${s.title}</h2>\n<div class="vo">"${s.vo}"</div>\n<div class="dir">📹 ${s.dir}</div>\n<div class="time">⏱ ${s.time}</div>\n</div>`).join('');dots.innerHTML=S.map((_,i)=>`<div class="dot${i===cur?' on':''}" onclick="go(${i})"></div>`).join('');document.getElementById('prog').style.width=((cur+1)/S.length*100)+'%';}
function go(i){cur=i;render()}function next(){cur=(cur+1)%S.length;render()}function prev(){cur=(cur-1+S.length)%S.length;render()}
function toggleAuto(){const b=document.getElementById('autoBtn');if(autoId){clearInterval(autoId);autoId=null;b.classList.remove('on');b.textContent='▶ AUTO'}else{autoId=setInterval(next,5000);b.classList.add('on');b.textContent='⏸ AUTO'}}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')next();if(e.key==='ArrowLeft')prev();if(e.key===' '){e.preventDefault();toggleAuto()}});render();
</script>

</body>
