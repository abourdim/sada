<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>صدى sada — Storyboard: password123 — A Biography</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=JetBrains+Mono:wght@400;500&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06080f;--s1:#0c1018;--brd:rgba(255,255,255,.07);--txt:#e2e6f0;--dim:rgba(255,255,255,.35);--acc:#fbbf24;--pk:#ff2d8a}
body{background:var(--bg);color:var(--txt);font-family:'Fredoka',sans-serif;min-height:100vh;overflow:hidden}
.player{width:100%;height:100vh;display:flex;flex-direction:column}
.stage{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden}
.scene{text-align:center;max-width:700px;width:100%;opacity:0;transform:translateY(30px);transition:opacity .6s,transform .6s;position:absolute}
.scene.active{opacity:1;transform:translateY(0);position:relative}
.scene .num{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:3px;color:var(--acc);text-transform:uppercase;margin-bottom:10px}
.scene .emoji{font-size:clamp(60px,15vw,100px);margin-bottom:16px;display:block;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.scene h2{font-family:'Syne',sans-serif;font-size:clamp(20px,4vw,32px);font-weight:800;line-height:1.2;margin-bottom:12px}
.scene h2 b{color:var(--acc)}
.scene .vo{font-size:clamp(13px,2.5vw,16px);color:var(--dim);line-height:1.8;max-width:550px;margin:0 auto 12px;font-style:italic}
.scene .dir{font-family:'JetBrains Mono',monospace;font-size:9px;color:rgba(255,255,255,.15);letter-spacing:.5px;max-width:500px;margin:0 auto;line-height:1.6}
.scene .time{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--acc);margin-top:8px;letter-spacing:2px}
.bar{height:48px;background:var(--s1);border-top:1px solid var(--brd);display:flex;align-items:center;padding:0 16px;gap:8px}
.dots{display:flex;gap:6px;flex:1;justify-content:center}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.1);cursor:pointer;transition:.2s}
.dot.on{background:var(--acc);box-shadow:0 0 8px var(--acc)}.dot:hover{background:rgba(255,255,255,.3)}
.bbtn{background:none;border:1px solid var(--brd);color:var(--dim);padding:4px 12px;border-radius:14px;font-size:10px;cursor:pointer;font-family:'Fredoka',sans-serif;transition:.2s}
.bbtn:hover{color:var(--txt);border-color:var(--acc)}
.prog{position:absolute;top:0;left:0;height:2px;background:linear-gradient(90deg,var(--acc),var(--pk));transition:width .4s;z-index:10}
.auto{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--dim);cursor:pointer}.auto.on{color:var(--acc)}
.title-bar{position:absolute;top:0;left:0;right:0;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;z-index:5}
.title-bar .logo{font-family:'Syne',sans-serif;font-size:11px;font-weight:800;color:var(--dim)}
.title-bar .logo b{background:linear-gradient(135deg,#ff6600,var(--pk));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.title-bar .info{font-family:'JetBrains Mono',monospace;font-size:8px;color:rgba(255,255,255,.15);letter-spacing:1px}
.foot{position:absolute;bottom:56px;left:0;right:0;text-align:center;font-size:7px;color:rgba(255,255,255,.08);font-family:'JetBrains Mono',monospace;letter-spacing:1px}
</style>
</head>
<body>
<div class="player">
<div class="prog" id="prog"></div>
<div class="title-bar"><div class="logo"><b>WORKSHOP</b>-DIY</div><div class="info">STORYBOARD · 7 SCENES</div></div>
<div class="stage" id="stage"></div>
<div class="foot">workshop-diy.org · Association Loi 1901 · Chelles 77500</div>
<div class="bar"><button class="bbtn" onclick="prev()">◀</button><div class="dots" id="dots"></div><button class="bbtn" onclick="next()">▶</button><span class="auto" id="autoBtn" onclick="toggleAuto()">▶ AUTO</span></div>
</div>
<script>
const S=[
{emoji:"👶",title:"<b>Naissance</b>",vo:"Quelqu'un a tapé 9 caractères. Personne ne se souvient qui. Tout le monde se souvient du mot de passe. password123. Le début d'une légende.",dir:"BLACK SCREEN: Characters appear one by one, typewriter style. Each keystroke echoes. Light builds. WiFi icon appears. 'Connected.' Title: 'password123 — A Biography'",time:"0:00 — 0:12"},
{emoji:"🔐",title:"Les <b>Prétendants</b>",vo:"47 enfants ont essayé de le changer. Amira : 'SeCuRe_2025!' — a duré 4 minutes. Karim : 'Workshop-DIY-Rocks' — personne ne pouvait le taper.",dir:"MONTAGE: Different devices connecting. WiFi symbol pulses with each connection. Counter: 1, 2, 5, 10 devices. password123 displayed proudly.",time:"0:12 — 0:24"},
{emoji:"📜",title:"Le <b>Hex</b> de la Discorde",vo:"Un enfant de 12 ans a généré un hex de 64 caractères. L'imprimante a refusé le QR code. Le routeur a été réinitialisé. password123 est revenu.",dir:"BOARDROOM: Formal meeting. Slide: 'Proposal: Change WiFi Password'. Discussion. Heated debate. Vote results on screen. 'MOTION DENIED.' Relief.",time:"0:24 — 0:40"},
{emoji:"📜",title:"<b>3</b> Routeurs",vo:"Le premier a surchauffé. Le deuxième a été électrocuté par un ESP32. Le troisième a abandonné. Mais password123 a survécu à chacun.",dir:"CONSULTANT enters with clipboard. Presents complex password policy. Kids stare blankly. Someone whispers 'password123'. Everyone nods. Consultant leaves.",time:"0:40 — 0:55"},
{emoji:"📜",title:"La <b>Théorie</b>",vo:"Certains disent que Bug #42 le protège. Un processus watchdog dans le firmware. D'autres disent qu'il est juste... confortable. Comme un vieux pull.",dir:"SCREEN: Security scan running. Red alert: 'PASSWORD CRITICALLY WEAK.' Someone clicks 'Dismiss.' Then 'Dismiss forever.' Then uninstalls the scanner. password123 glows serenely.",time:"0:55 — 1:10"},
{emoji:"♾️",title:"Le <b>Chœur</b>",vo:"Un nouveau parent demande le WiFi. 30 enfants se retournent en même temps. D'une seule voix : 'password123.' Le parent rit. Personne ne plaisante.",dir:"TIME-LAPSE: Seasons change through window. Equipment comes and goes. Kids grow taller. password123 remains on sticky note on router. Unchanged. Eternal.",time:"1:10 — 1:25"},
{emoji:"🏛️",title:"<b>Philosophie</b>",vo:"Ce n'est pas sécurisé. Ce n'est pas malin. Mais c'est à nous. La première chose que chaque enfant apprend ici. Et peut-être, c'est suffisant.",dir:"MONUMENT SHOT: password123 carved in stone (VFX). Camera pulls back. Workshop-DIY logo. Kids building robots in background. SUPER: 'password123 · Serving Workshop-DIY since Day 1'",time:"1:25 — 1:40"},
{emoji:"🎬",title:"<b>Éternel</b>",vo:"WiFi : Workshop-DIY. Mot de passe : password123. Depuis toujours. Pour toujours. Ainsi soit-il.",dir:"",time:""}
];
let cur=0,autoId=null;
function render(){const stage=document.getElementById('stage');const dots=document.getElementById('dots');stage.innerHTML=S.map((s,i)=>`<div class="scene${i===cur?' active':''}">\n<div class="num">Scène ${i+1} sur ${S.length}</div>\n<span class="emoji">${s.emoji}</span>\n<h2>${s.title}</h2>\n<div class="vo">"${s.vo}"</div>\n<div class="dir">📹 ${s.dir}</div>\n<div class="time">⏱ ${s.time}</div>\n</div>`).join('');dots.innerHTML=S.map((_,i)=>`<div class="dot${i===cur?' on':''}" onclick="go(${i})"></div>`).join('');document.getElementById('prog').style.width=((cur+1)/S.length*100)+'%';}
function go(i){cur=i;render()}function next(){cur=(cur+1)%S.length;render()}function prev(){cur=(cur-1+S.length)%S.length;render()}
function toggleAuto(){const b=document.getElementById('autoBtn');if(autoId){clearInterval(autoId);autoId=null;b.classList.remove('on');b.textContent='▶ AUTO'}else{autoId=setInterval(next,5000);b.classList.add('on');b.textContent='⏸ AUTO'}}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')next();if(e.key==='ArrowLeft')prev();if(e.key===' '){e.preventDefault();toggleAuto()}});render();
</script>
