<!DOCTYPE html>
<html lang="fr">
<head>
<script>(function(){if(!sessionStorage.getItem('sada-unlocked')){location.replace('../../../splash.html')}})();</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>صدى sada — Storyboard: Une Journée à l'Atelier</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=JetBrains+Mono:wght@400;500&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06080f;--s1:#0c1018;--s2:#151d30;--brd:rgba(255,255,255,.07);--txt:#e2e6f0;--dim:rgba(255,255,255,.35);--acc:#ff6b35;--pk:#ff2d8a;--cy:#00d4ff;--gn:#22c55e}
body{background:var(--bg);color:var(--txt);font-family:'Fredoka',sans-serif;min-height:100vh;overflow:hidden}
.player{width:100%;height:100vh;display:flex;flex-direction:column}
.stage{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden}
.scene{text-align:center;max-width:700px;width:100%;opacity:0;transform:translateY(30px);transition:opacity .6s,transform .6s;position:absolute}
.scene.active{opacity:1;transform:translateY(0);position:relative}
.scene .num{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:3px;color:var(--acc);text-transform:uppercase;margin-bottom:10px}
.scene .emoji{font-size:clamp(60px,15vw,100px);margin-bottom:16px;display:block;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.scene h2{font-family:'Syne',sans-serif;font-size:clamp(20px,4vw,32px);font-weight:800;line-height:1.2;margin-bottom:12px}
.scene h2 b{color:var(--acc)}
.scene .vo{font-size:clamp(13px,2.5vw,16px);color:var(--dim);line-height:1.8;max-width:550px;margin:0 auto 12px;font-style:italic}
.scene .dir{font-family:'JetBrains Mono',monospace;font-size:9px;color:rgba(255,255,255,.15);letter-spacing:.5px;max-width:500px;margin:0 auto;line-height:1.6}
.scene .time{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--acc);margin-top:8px;letter-spacing:2px}
.bar{height:48px;background:var(--s1);border-top:1px solid var(--brd);display:flex;align-items:center;padding:0 16px;gap:8px}
.dots{display:flex;gap:6px;flex:1;justify-content:center}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.1);cursor:pointer;transition:.2s}
.dot.on{background:var(--acc);box-shadow:0 0 8px var(--acc)}
.dot:hover{background:rgba(255,255,255,.3)}
.bbtn{background:none;border:1px solid var(--brd);color:var(--dim);padding:4px 12px;border-radius:14px;font-size:10px;cursor:pointer;font-family:'Fredoka',sans-serif;transition:.2s}
.bbtn:hover{color:var(--txt);border-color:var(--acc)}
.prog{position:absolute;top:0;left:0;height:2px;background:linear-gradient(90deg,var(--acc),var(--pk));transition:width .4s;z-index:10}
.auto{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--dim);cursor:pointer}.auto.on{color:var(--acc)}
.title-bar{position:absolute;top:0;left:0;right:0;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;z-index:5}
.title-bar .logo{font-family:'Syne',sans-serif;font-size:11px;font-weight:800;color:var(--dim)}
.title-bar .logo b{background:linear-gradient(135deg,var(--acc),var(--pk));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.title-bar .info{font-family:'JetBrains Mono',monospace;font-size:8px;color:rgba(255,255,255,.15);letter-spacing:1px}
.foot{position:absolute;bottom:56px;left:0;right:0;text-align:center;font-size:7px;color:rgba(255,255,255,.08);font-family:'JetBrains Mono',monospace;letter-spacing:1px}
</style>
</head>
<body>
<div class="player">
<div class="prog" id="prog"></div>
<div class="title-bar"><div class="logo"><b>WORKSHOP</b>-DIY</div><div class="info">STORYBOARD · 7 SCENES</div></div>
<div class="stage" id="stage"></div>
<div class="foot">workshop-diy.org · Association Loi 1901 · Chelles 77500</div>
<div class="bar">
<button class="bbtn" onclick="prev()">◀</button>
<div class="dots" id="dots"></div>
<button class="bbtn" onclick="next()">▶</button>
<span class="auto" id="autoBtn" onclick="toggleAuto()">▶ AUTO</span>
</div>
</div>
<script>
const S=[
{emoji:"🚉",title:"<b>9h00</b> — Ouverture",vo:"La porte s'ouvre. L'odeur de soudure et de café 8%. Les tables sont prêtes. Les micro:bits chargés. Un autre mercredi commence.",dir:"POV WALK: Exit train station. Morning light. Walk through Chelles streets. Anticipation. Sound: footsteps, birds, distant traffic.",time:"0:00 — 0:10"},
{emoji:"🚪",title:"<b>9h15</b> — Premier Code",vo:"Le premier enfant arrive. Sac à dos. Baskets. S'assoit. Ouvre le navigateur. Commence à taper. Pas de bonjour. Juste du code. On respecte ça.",dir:"DOOR OPENS: Warm light floods out. Inside: tables with components, screens glowing, kids already working. POV enters. Someone waves.",time:"0:10 — 0:20"},
{emoji:"🔧",title:"<b>10h00</b> — Le Chaos",vo:"30 enfants. 15 micro:bits. 8 robots. 3 fers à souder. 1 machine à café à 8%. Et pas une seule plainte. Juste de la concentration pure.",dir:"MACRO: Soldering iron tip meets solder. Smoke wisps. Pull back: child's focused face. Instructor nods. Thumbs up.",time:"0:20 — 0:35"},
{emoji:"💻",title:"<b>11h00</b> — Bug #42 Apparaît",vo:"Le robot de quelqu'un tourne à gauche. 'C'est Bug #42 !' crient-ils. Tout le monde rit. Tout le monde sait. Ça arrive à chaque mercredi.",dir:"OVER-SHOULDER: Screen with code editor. Child types confidently. Syntax highlighting. Save. Upload button. Progress bar.",time:"0:35 — 0:50"},
{emoji:"❌",title:"<b>12h00</b> — La Pause Pizza",vo:"Quelqu'un commande une pizza. Toujours margherita. Toujours extra fromage. On dit que Bug #42 commande automatiquement si on oublie.",dir:"CLOSE-UP: Child's face — confusion, then determination. Screen: error message. Instructor comes over. They debug together. Pointing at line 23.",time:"0:50 — 1:05"},
{emoji:"✅",title:"<b>14h00</b> — La Percée",vo:"Un enfant de 8 ans fait fonctionner le Bluetooth pour la première fois. Le robot bouge. La pièce s'arrête. Les applaudissements commencent. Un moment gravé.",dir:"TIGHT ON SCREEN: Semicolon added. Save. Upload. Robot LED lights up. Motor spins. Child pumps fist. High-five with neighbor.",time:"1:05 — 1:18"},
{emoji:"🎉",title:"<b>16h00</b> — Démonstrations",vo:"Chaque enfant montre ce qu'il a construit. Un robot. Un chatbot. Un traqueur de satellites. Un jeu. Fierté sur chaque visage.",dir:"WIDE: Robot moves across table. Children gather. Applause. Laughter. SLOW-MO: Child picks up robot, holds it up. SUPER: 'Workshop-DIY · Built in Chelles'",time:"1:18 — 1:30"},
{emoji:"🎬",title:"<b>17h00</b> — À Mercredi",vo:"Les sacs se remplissent. Les au revoir s'échangent. Le dernier enfant s'arrête à la porte. Se retourne. 'C'est quoi le mot de passe WiFi ?' Tout le monde : 'password123.'",dir:"",time:""}
];
let cur=0,autoId=null;
function render(){
const stage=document.getElementById('stage');const dots=document.getElementById('dots');
stage.innerHTML=S.map((s,i)=>`<div class="scene${i===cur?' active':''}">\n<div class="num">Scène ${i+1} sur ${S.length}</div>\n<span class="emoji">${s.emoji}</span>\n<h2>${s.title}</h2>\n<div class="vo">"${s.vo}"</div>\n<div class="dir">📹 ${s.dir}</div>\n<div class="time">⏱ ${s.time}</div>\n</div>`).join('');
dots.innerHTML=S.map((_,i)=>`<div class="dot${i===cur?' on':''}" onclick="go(${i})"></div>`).join('');
document.getElementById('prog').style.width=((cur+1)/S.length*100)+'%';}
function go(i){cur=i;render()}function next(){cur=(cur+1)%S.length;render()}function prev(){cur=(cur-1+S.length)%S.length;render()}
function toggleAuto(){const b=document.getElementById('autoBtn');if(autoId){clearInterval(autoId);autoId=null;b.classList.remove('on');b.textContent='▶ AUTO'}else{autoId=setInterval(next,5000);b.classList.add('on');b.textContent='⏸ AUTO'}}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')next();if(e.key==='ArrowLeft')prev();if(e.key===' '){e.preventDefault();toggleAuto()}});
render();
</script>
