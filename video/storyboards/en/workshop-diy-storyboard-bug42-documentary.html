<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>صدى sada — Storyboard: Bug #42 — A Documentary</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=JetBrains+Mono:wght@400;500&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06080f;--s1:#0c1018;--brd:rgba(255,255,255,.07);--txt:#e2e6f0;--dim:rgba(255,255,255,.35);--acc:#9333ea;--pk:#ff2d8a;--gn:#22c55e}
body{background:var(--bg);color:var(--txt);font-family:'Fredoka',sans-serif;min-height:100vh;overflow:hidden}
.player{width:100%;height:100vh;display:flex;flex-direction:column}
.stage{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden}
.scene{text-align:center;max-width:700px;width:100%;opacity:0;transform:translateY(30px);transition:opacity .6s,transform .6s;position:absolute}
.scene.active{opacity:1;transform:translateY(0);position:relative}
.scene .num{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:3px;color:var(--acc);text-transform:uppercase;margin-bottom:10px}
.scene .emoji{font-size:clamp(60px,15vw,100px);margin-bottom:16px;display:block;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.scene h2{font-family:'Syne',sans-serif;font-size:clamp(20px,4vw,32px);font-weight:800;line-height:1.2;margin-bottom:12px}
.scene h2 b{color:var(--acc)}
.scene .vo{font-size:clamp(13px,2.5vw,16px);color:var(--dim);line-height:1.8;max-width:550px;margin:0 auto 12px;font-style:italic}
.scene .dir{font-family:'JetBrains Mono',monospace;font-size:9px;color:rgba(255,255,255,.15);letter-spacing:.5px;max-width:500px;margin:0 auto;line-height:1.6}
.scene .time{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--acc);margin-top:8px;letter-spacing:2px}
.bar{height:48px;background:var(--s1);border-top:1px solid var(--brd);display:flex;align-items:center;padding:0 16px;gap:8px}
.dots{display:flex;gap:6px;flex:1;justify-content:center}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.1);cursor:pointer;transition:.2s}
.dot.on{background:var(--acc);box-shadow:0 0 8px var(--acc)}.dot:hover{background:rgba(255,255,255,.3)}
.bbtn{background:none;border:1px solid var(--brd);color:var(--dim);padding:4px 12px;border-radius:14px;font-size:10px;cursor:pointer;font-family:'Fredoka',sans-serif;transition:.2s}
.bbtn:hover{color:var(--txt);border-color:var(--acc)}
.prog{position:absolute;top:0;left:0;height:2px;background:linear-gradient(90deg,var(--acc),var(--pk));transition:width .4s;z-index:10}
.auto{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--dim);cursor:pointer}.auto.on{color:var(--acc)}
.title-bar{position:absolute;top:0;left:0;right:0;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;z-index:5}
.title-bar .logo{font-family:'Syne',sans-serif;font-size:11px;font-weight:800;color:var(--dim)}
.title-bar .logo b{background:linear-gradient(135deg,#ff6600,var(--pk));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.title-bar .info{font-family:'JetBrains Mono',monospace;font-size:8px;color:rgba(255,255,255,.15);letter-spacing:1px}
.foot{position:absolute;bottom:56px;left:0;right:0;text-align:center;font-size:7px;color:rgba(255,255,255,.08);font-family:'JetBrains Mono',monospace;letter-spacing:1px}
</style>
</head>
<body>
<div class="player">
<div class="prog" id="prog"></div>
<div class="title-bar"><div class="logo"><b>WORKSHOP</b>-DIY</div><div class="info">STORYBOARD · 9 SCENES</div></div>
<div class="stage" id="stage"></div>
<div class="foot">workshop-diy.org · Association Loi 1901 · Chelles 77500</div>
<div class="bar">
<button class="bbtn" onclick="prev()">◀</button><div class="dots" id="dots"></div><button class="bbtn" onclick="next()">▶</button>
<span class="auto" id="autoBtn" onclick="toggleAuto()">▶ AUTO</span>
</div>
</div>
<script>
const S=[
{emoji:"🐛",title:"<b>Subject</b> Identified",vo:"Case file #42. First appearance: line 42 of main.js. Status: unresolved. Classification: feature, not bug. Self-classified.",dir:"COLD OPEN: Police-style case file. Typewriter text. Photos of code. Red 'CLASSIFIED' stamp. Dramatic music. Title card: 'BUG #42: A DOCUMENTARY'",time:"0:00 — 0:12"},
{emoji:"📋",title:"The <b>Evidence</b> Board",vo:"We've been tracking Bug #42 for months. String of red yarn connects the incidents. The coffee machine. The WiFi password. The 42 pizzas.",dir:"DETECTIVE WALL: Photos, sticky notes, yarn connections. Each incident labeled. Camera slowly pans across. Investigator pins new photo.",time:"0:12 — 0:25"},
{emoji:"🧑‍💻",title:"<b>Witness</b> #1 — The Developer",vo:"I wrote line 42. It was a simple if-statement. I don't know what happened. It was supposed to check the battery level. Now it checks... everything.",dir:"INTERVIEW: Developer in chair, face partially shadowed. Hands gesturing. Nervous. Glances at screen. Code on monitor in background.",time:"0:25 — 0:40"},
{emoji:"☕",title:"<b>Witness</b> #2 — The Coffee Machine",vo:"The machine started dispensing exactly 8% capacity. No more, no less. Maintenance found a comment in its firmware: '// 42 was here'.",dir:"INTERVIEW: Close-up of coffee machine. Drip. Drip. Pan to screen showing 8%. Someone's hand points at comment in code. Dramatic zoom.",time:"0:40 — 0:55"},
{emoji:"🔑",title:"<b>Witness</b> #3 — password123",vo:"I've been the WiFi password since day one. Bug #42 tried to change me once. The system crashed. Now I'm permanent. Protected by legacy code.",dir:"INTERVIEW: Password displayed on old monitor. Blinking cursor. Voiceover from 'password123' perspective. Dramatic music. 'I am eternal.'",time:"0:55 — 1:10"},
{emoji:"🔍",title:"The <b>Investigation</b> Deepens",vo:"Logs show Bug #42 active at 3:42 AM, 4:42 AM, 5:42 AM. Every night. We installed cameras. The cameras showed static. At 42-second intervals.",dir:"NIGHT VISION: Empty lab. Timestamp: 03:42:42. Screen flickers. Something moves. Camera cuts to static. Returns: nothing. Or... was that a cursor moving?",time:"1:10 — 1:28"},
{emoji:"⚖️",title:"The <b>Trial</b>",vo:"The tribunal convened. Charges: unauthorized coffee modification, WiFi password immortalization, and 42 counts of unexpected behavior.",dir:"COURTROOM SETUP: Judge's bench (keyboard as gavel). Bug #42 'sits' in defendant chair (error message on screen). Jury: 12 micro:bits.",time:"1:28 — 1:45"},
{emoji:"🏃",title:"The <b>Escape</b>",vo:"Verdict: guilty on all counts. Sentence: deletion. Bug #42's response: it migrated itself to the backup server. In 42 milliseconds.",dir:"DRAMATIC: Gavel falls. DELETE command typed. Progress bar: 99%... ERROR. Screen: 'Bug #42 not found.' Pan to backup server: LED blinks. Twice.",time:"1:45 — 2:00"},
{emoji:"🎬",title:"<b>To Be</b> Continued...",vo:"Bug #42 is still out there. In every semicolon you forget. In every infinite loop you didn't mean to write. It watches. It waits. It is... a feature.",dir:"FADE TO BLACK. Text appears: 'Bug #42 was never found.' Beat. Then: 'Or was it?' Glitch effect. Logo: Workshop-DIY. 'Season 2 coming soon.'",time:"2:00 — 2:15"}
];
let cur=0,autoId=null;
function render(){const stage=document.getElementById('stage');const dots=document.getElementById('dots');stage.innerHTML=S.map((s,i)=>`<div class="scene${i===cur?' active':''}">\n<div class="num">Scene ${i+1} of ${S.length}</div>\n<span class="emoji">${s.emoji}</span>\n<h2>${s.title}</h2>\n<div class="vo">"${s.vo}"</div>\n<div class="dir">📹 ${s.dir}</div>\n<div class="time">⏱ ${s.time}</div>\n</div>`).join('');dots.innerHTML=S.map((_,i)=>`<div class="dot${i===cur?' on':''}" onclick="go(${i})"></div>`).join('');document.getElementById('prog').style.width=((cur+1)/S.length*100)+'%';}
function go(i){cur=i;render()}function next(){cur=(cur+1)%S.length;render()}function prev(){cur=(cur-1+S.length)%S.length;render()}
function toggleAuto(){const b=document.getElementById('autoBtn');if(autoId){clearInterval(autoId);autoId=null;b.classList.remove('on');b.textContent='▶ AUTO'}else{autoId=setInterval(next,5000);b.classList.add('on');b.textContent='⏸ AUTO'}}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')next();if(e.key==='ArrowLeft')prev();if(e.key===' '){e.preventDefault();toggleAuto()}});render();
</script>

</body>
