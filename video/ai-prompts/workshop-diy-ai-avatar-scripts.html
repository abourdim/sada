<style>*{margin:0;padding:0;box-sizing:border-box}:root{--bg:#080910;--s1:#0d1018;--brd:rgba(255,255,255,.06);--txt:#e4e8f2;--dim:rgba(255,255,255,.3);--hey:#10b981;--syn:#6366f1;--r:12px}body{background:var(--bg);color:var(--txt);font-family:'Nunito',sans-serif}.hero{min-height:30vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px 20px;position:relative}.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 40%,rgba(16,185,129,.05),transparent 50%);pointer-events:none}.badge{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:3px;color:var(--hey);border:1px solid rgba(16,185,129,.2);padding:4px 14px;border-radius:20px;text-transform:uppercase;margin-bottom:10px}.hero h1{font-family:'Syne',sans-serif;font-size:clamp(18px,4vw,28px);font-weight:800;margin-bottom:6px}.hero h1 b{background:linear-gradient(135deg,var(--hey),var(--syn));-webkit-background-clip:text;-webkit-text-fill-color:transparent}.hero p{font-size:11px;color:var(--dim);max-width:420px;line-height:1.5}.section{max-width:700px;margin:0 auto;padding:16px}.sc{background:var(--s1);border:1px solid var(--brd);border-radius:var(--r);margin-bottom:8px;overflow:hidden}.sc-h{display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer}.sc-h .e{font-size:16px}.sc-h .n{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;flex:1}.sc-h .d{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--dim)}.sc-b{display:none;padding:4px 12px 10px;border-top:1px solid var(--brd)}.sc.open .sc-b{display:block}.tabs{display:flex;gap:4px;margin-bottom:6px}.tab{font-family:'JetBrains Mono',monospace;font-size:8px;padding:3px 8px;border-radius:4px;cursor:pointer;border:1px solid var(--brd);color:var(--dim)}.tab.on{border-color:var(--hey);color:var(--hey);background:rgba(16,185,129,.06)}.lc{display:none;font-size:11px;line-height:1.8}.lc.on{display:block}.lc .setup{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--syn);margin-bottom:4px;padding:4px 6px;background:rgba(99,102,241,.04);border-radius:4px}.lc .line{margin:3px 0;border-bottom:1px solid rgba(255,255,255,.02);padding:2px 0}.pause{font-family:'JetBrains Mono',monospace;font-size:7px;color:#ff6600;padding:1px 3px;background:rgba(255,102,0,.05);border-radius:2px}.foot{text-align:center;padding:16px 12px;border-top:1px solid var(--brd);font-size:8px;color:var(--dim)}</style>

<div class="hero"><div class="badge">phase 9 · ai avatar scripts</div><h1>🧑‍💻 <b>AI Avatar</b> Scripts</h1><p>6 presenter scripts for HeyGen/Synthesia. Each in EN, FR, AR with timing cues.</p></div>

<div class="foot"><b>WORKSHOP-DIY</b> · Avatar Scripts · <a href="https://workshop-diy.org" style="color:#10b981;text-decoration:none">workshop-diy.org</a></div>
<script>
const D=[
{e:"👋",n:"Welcome to Workshop-DIY",d:"0:45",en:{s:"Friendly young adult · BG: Workshop interior",l:["Hi! Welcome to Workshop-DIY.","We're an educational association in Chelles, France, where kids aged 6 to 16 learn to build real technology.","Robots. Artificial intelligence. Radio receivers. Ethical hacking tools. All from a browser.","We have 86 web apps that require zero installation — just open and build.","Your first session is free. Every Wednesday.","Come build something amazing. See you at Workshop-DIY!"]},fr:{s:"Jeune adulte sympathique · BG: Intérieur atelier",l:["Salut ! Bienvenue à Workshop-DIY.","On est une association éducative à Chelles, où des enfants de 6 à 16 ans apprennent à construire de la vraie technologie.","Robots. Intelligence artificielle. Récepteurs radio. Hacking éthique. Tout dans un navigateur.","On a 86 apps web — zéro installation — ouvrez et construisez.","La première séance est gratuite. Chaque mercredi.","Venez construire quelque chose d'incroyable. À bientôt !"]},ar:{s:"شاب ودود · الخلفية: داخل الورشة",l:["مرحبًا! أهلًا بكم في Workshop-DIY.","نحن جمعية تعليمية في شيل، فرنسا، حيث يتعلم الأطفال من 6 إلى 16 سنة بناء تكنولوجيا حقيقية.","روبوتات. ذكاء اصطناعي. أجهزة استقبال راديو. قرصنة أخلاقية. كل ذلك من المتصفح.","لدينا 86 تطبيقًا — بدون تثبيت — فقط افتح وابنِ.","الجلسة الأولى مجانية. كل أربعاء.","تعالوا ابنوا شيئًا مذهلًا. نراكم في Workshop-DIY!"]}},
{e:"👨‍👩‍👧",n:"For Parents — Why Workshop-DIY",d:"0:50",en:{s:"Parent-age adult · BG: Soft workshop blur",l:["As a parent, you want screen time to mean something.","At Workshop-DIY, your child doesn't just use technology — they build it.","Real robots. Real code. Real hardware. No passive scrolling.","Every app works in French, English, and Arabic. Three difficulty levels adapt to your child's age.","And here's the best part — your child will come home and teach YOU something.","One parent told us their daughter explained Docker at dinner.","First session free. WhatsApp: 06 19 51 51 73."]},fr:{s:"Adulte chaleureux · BG: Flou atelier",l:["En tant que parent, vous voulez que le temps d'écran ait un sens.","À Workshop-DIY, votre enfant ne consomme pas la technologie — il la construit.","De vrais robots. Du vrai code. Du vrai matériel. Pas de défilement passif.","Chaque app fonctionne en français, anglais et arabe. Trois niveaux s'adaptent à l'âge.","Et le meilleur — votre enfant rentrera et VOUS apprendra quelque chose.","Un parent nous a dit que sa fille lui a expliqué Docker au dîner.","Première séance gratuite. WhatsApp : 06 19 51 51 73."]},ar:{s:"بالغ دافئ · الخلفية: ضبابية ورشة",l:["كولي أمر، تريد أن يكون وقت الشاشة ذا معنى.","في Workshop-DIY، طفلك لا يستهلك التكنولوجيا — بل يبنيها.","روبوتات حقيقية. كود حقيقي. أجهزة حقيقية. بدون تصفح سلبي.","كل تطبيق يعمل بالفرنسية والإنجليزية والعربية. ثلاثة مستويات.","والأفضل — طفلك سيعود ويُعلّمك أنت شيئًا.","والد أخبرنا أن ابنته شرحت Docker على العشاء.","الجلسة الأولى مجانية. واتساب: 06 19 51 51 73."]}},
{e:"🎯",n:"86 Apps in 30 Seconds",d:"0:30",en:{s:"Energetic · BG: App screenshots cycling",l:["86 apps. Zero installs. One browser.","Build robots with Bit-Bot. Talk to AI with OllamaBot. Catch radio signals with SDR Kids Lab.","Learn cryptography. Practice ethical hacking. Track satellites in real-time.","Three languages. Three levels. Ages 6 to 16.","Workshop-DIY. Open a browser and start building."]},fr:{s:"Énergique · BG: Screenshots défilent",l:["86 apps. Zéro installation. Un navigateur.","Construisez des robots. Parlez à l'IA. Captez des signaux radio.","Cryptographie. Hacking éthique. Satellites en temps réel.","Trois langues. Trois niveaux. De 6 à 16 ans.","Workshop-DIY. Ouvrez un navigateur et construisez."]},ar:{s:"نشيط · الخلفية: لقطات تطبيقات",l:["86 تطبيقًا. صفر تثبيت. متصفح واحد.","ابنِ روبوتات. تحدث مع الذكاء الاصطناعي. التقط إشارات راديو.","تشفير. قرصنة أخلاقية. أقمار صناعية مباشرة.","ثلاث لغات. ثلاثة مستويات. من 6 إلى 16 سنة.","Workshop-DIY. افتح متصفحًا وابدأ البناء."]}},
{e:"🐛",n:"Bug #42 — The Legend",d:"0:40",en:{s:"Conspiratorial whisper · BG: Dark mysterious",l:["Can I tell you a secret?","There's a bug in our code. Bug #42. It's been there since version 1. We're on 86 now.","It orders pizza. It changes the WiFi password to password123. It once submitted a pull request — the code was good.","We tried to fix it. The rubber duck quit. An intern switched to farming.","Now we celebrate it. Every new kid must find Bug 42 in the code to earn the Bug Hunter badge.","Come find it yourself. Workshop-DIY. The password is — well, you already know."]},fr:{s:"Ton conspirateur · BG: Sombre mystérieux",l:["Je peux vous dire un secret ?","Il y a un bug dans notre code. Le Bug #42. Depuis la version 1. On en est à la 86.","Il commande des pizzas. Il change le mot de passe WiFi en password123. Il a soumis une pull request — le code était bon.","On a essayé de le corriger. Le canard a démissionné. Un stagiaire s'est reconverti.","Maintenant on le célèbre. Chaque nouvel enfant doit le trouver dans le code.","Venez le trouver vous-même. Workshop-DIY. Le mot de passe est — vous le connaissez."]},ar:{s:"نبرة تآمرية · الخلفية: مظلمة غامضة",l:["هل يمكنني إخبارك بسر؟","هناك بق في كودنا. Bug #42. منذ الإصدار 1. نحن الآن في 86.","يطلب بيتزا. يغيّر كلمة المرور إلى password123. أرسل طلب دمج — الكود كان جيدًا.","حاولنا إصلاحه. البطة استقالت. متدرب تحوّل للزراعة.","الآن نحتفل به. كل طفل جديد عليه إيجاده للحصول على شارة صائد البق.","تعال وجده بنفسك. Workshop-DIY. كلمة المرور هي — أنت تعرفها."]}},
{e:"📱",n:"Social Media Hook (Reel)",d:"0:15",en:{s:"Direct to camera · BG: Bright vertical",l:["This 10-year-old just built a working robot. From scratch. In a browser.","No app store. No account. No data collected.","86 free apps. Robots, AI, radio, hacking.","Workshop-DIY. Link in bio."]},fr:{s:"Face caméra · BG: Lumineux vertical",l:["Cet enfant de 10 ans a construit un robot. De zéro. Dans un navigateur.","Pas d'app store. Pas de compte. Aucune donnée collectée.","86 apps gratuites. Robots, IA, radio, hacking.","Workshop-DIY. Lien en bio."]},ar:{s:"مواجه للكاميرا · الخلفية: مشرقة عمودي",l:["طفل 10 سنوات بنى روبوتًا يعمل. من الصفر. في متصفح.","بدون متجر. بدون حساب. بدون جمع بيانات.","86 تطبيقًا مجانيًا. روبوتات، ذكاء اصطناعي، راديو، قرصنة.","Workshop-DIY. الرابط في البايو."]}},
{e:"🌙",n:"Arabic Community Outreach",d:"0:40",en:{s:"Young adult · BG: Warm gradient, geometric patterns",l:["Did you know 'algorithm' comes from the Muslim scholar Al-Khwarizmi?","At Workshop-DIY, we honor that legacy. Kids learn coding, robotics, and AI — in Arabic too.","86 apps. All working in Arabic with right-to-left interface.","Technology isn't English-only. Technology is for everyone.","First session free. Every Wednesday. WhatsApp: 06 19 51 51 73."]},fr:{s:"Jeune adulte · BG: Gradient chaud, motifs géométriques",l:["Savez-vous que 'algorithme' vient du savant musulman Al-Khwarizmi ?","À Workshop-DIY, nous honorons cet héritage. Code, robotique et IA — en arabe aussi.","86 apps fonctionnent en arabe avec interface droite-à-gauche.","La technologie n'est pas qu'en anglais. Elle est pour tous.","Première séance gratuite. WhatsApp : 06 19 51 51 73."]},ar:{s:"شاب/شابة عربي · الخلفية: تدرج دافئ مع زخارف إسلامية",l:["السلام عليكم. هل تعلم أن 'خوارزمية' تأتي من العالم المسلم الخوارزمي؟","في Workshop-DIY، نُكرّم هذا الإرث. أطفالنا يتعلمون البرمجة والروبوتات والذكاء الاصطناعي — بالعربية.","86 تطبيقًا. كلها تعمل بالعربية مع واجهة من اليمين لليسار.","لأن التكنولوجيا ليست فقط بالإنجليزية. التكنولوجيا للجميع.","الجلسة الأولى مجانية. كل أربعاء. واتساب: 06 19 51 51 73."]}}
];
const el=document.getElementById('scripts');
D.forEach((d,i)=>{
const div=document.createElement('div');div.className='sc'+(i===0?' open':'');
div.innerHTML=`<div class="sc-h" onclick="this.parentElement.classList.toggle('open')"><span class="e">${d.e}</span><span class="n">${d.n}</span><span class="d">${d.d}</span></div><div class="sc-b"><div class="tabs">${['en','fr','ar'].map((l,j)=>`<div class="tab${j===0?' on':''}" onclick="sw(this,'${l}')">${l.toUpperCase()}</div>`).join('')}</div>${['en','fr','ar'].map((l,j)=>`<div class="lc${j===0?' on':''}" data-l="${l}"><div class="setup">${d[l].s}</div>${d[l].l.map(line=>`<div class="line">${line} <span class="pause">0.5s</span></div>`).join('')}</div>`).join('')}</div>`;
el.appendChild(div);
});
function sw(btn,lang){const p=btn.closest('.sc-b');p.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));btn.classList.add('on');p.querySelectorAll('.lc').forEach(c=>c.classList.remove('on'));p.querySelector('[data-l="'+lang+'"]').classList.add('on')}
</script>
</body>
