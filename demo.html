.progress-fill{height:100%;background:linear-gradient(90deg,#ff6600,#ff8800);transition:width .3s;pointer-events:none}
.progress:hover .progress-fill{height:5px;margin-top:-1px}
.counter{font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(255,255,255,.15);min-width:60px;text-align:center}
.file-name{font-family:'JetBrains Mono',monospace;font-size:9px;color:rgba(255,102,0,.2);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.frame-wrap{flex:1;position:relative;background:#0a0a14}
.frame-wrap iframe{width:100%;height:100%;border:none;background:#0a0a14}
.footer{display:flex;align-items:center;justify-content:center;gap:6px;padding:4px;background:#111;border-top:1px solid rgba(255,255,255,.04);flex-shrink:0}
.footer a{font-size:9px;color:rgba(255,255,255,.06);text-decoration:none;font-family:'JetBrains Mono',monospace}
.footer a:hover{color:rgba(255,255,255,.15)}

.lang-btn.active{border-color:rgba(255,102,0,.3);background:rgba(255,102,0,.05)}
.cat-bar{display:none;padding:3px 8px;background:#0d0d18;border-bottom:1px solid rgba(255,255,255,.02);gap:4px;flex-wrap:wrap;flex-shrink:0}
.cat-bar.show{display:flex}

<div class="controls" id="controls">

{f:'workshop-diy-zodiac',c:'creative',t:'Zodiaque',ta:'الأبراج الفلكية'},
];

const CATS={
  all:{fr:'Tout',ar:'الكل'},
  docs:{fr:'📄 Documentation',ar:'📄 التوثيق'},
  game:{fr:'🎮 Jeux',ar:'🎮 ألعاب'},
  social:{fr:'📱 Réseaux',ar:'📱 شبكات'},
  news:{fr:'📰 Médias',ar:'📰 إعلام'},
  video:{fr:'📺 Vidéo',ar:'📺 فيديو'},
  edu:{fr:'🏫 Éducation',ar:'🏫 تعليم'},
  legal:{fr:'⚖️ Juridique',ar:'⚖️ قانوني'},
  travel:{fr:'🗺️ Voyage',ar:'🗺️ سفر'},
  tech:{fr:'🖥️ Tech',ar:'🖥️ تقنية'},
  hardware:{fr:'📟 Matériel',ar:'📟 عتاد'},
  creative:{fr:'🎨 Créatif',ar:'🎨 إبداعي'},
  food:{fr:'🍕 Cuisine',ar:'🍕 طعام'},
  collect:{fr:'🎰 Collection',ar:'🎰 مجموعات'},
  personal:{fr:'💌 Personnel',ar:'💌 شخصي'},
  meta:{fr:'📦 Méta',ar:'📦 ميتا'},
};

let lang='fr',currentIdx=0,playing=false,timer=null,speed=8000,shuffled=false;
let playlist=[...Array(FILES.length).keys()];
let activeCat='all';

function setLang(l){
  lang=l;
  document.documentElement.lang=l;
  document.body.dir=l==='ar'?'rtl':'ltr';
  document.getElementById('langFR').classList.toggle('active',l==='fr');
  document.getElementById('langAR').classList.toggle('active',l==='ar');
  buildCatBar();
  loadCurrent();
  try{localStorage.setItem('wdiy-lang',l)}catch(e){}
}

function buildCatBar(){
  const bar=document.getElementById('catBar');
  bar.innerHTML='';
  Object.keys(CATS).forEach(k=>{
    const pill=document.createElement('span');
    pill.className='cat-pill'+(k===activeCat?' active':'');
    pill.textContent=CATS[k][lang];
    pill.onclick=()=>{activeCat=k;filterPlaylist();buildCatBar();};
    bar.appendChild(pill);
  });
}
function toggleCatBar(){document.getElementById('catBar').classList.toggle('show')}

function filterPlaylist(){
  if(activeCat==='all')playlist=[...Array(FILES.length).keys()];
  else playlist=FILES.map((f,i)=>f.c===activeCat?i:-1).filter(i=>i>=0);
  if(shuffled)shuffle(playlist);
  currentIdx=0;
  loadCurrent();
}

function toggleShuffle(){
  shuffled=!shuffled;
  document.getElementById('btnShuffle').classList.toggle('active',shuffled);
  if(shuffled)shuffle(playlist);else filterPlaylist();
  currentIdx=0;loadCurrent();
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}}

function togglePlay(){
  playing=!playing;
  if(playing){timer=setInterval(()=>go(1),speed)}
  else{clearInterval(timer);timer=null}
  updateUI();
}
function setSpeed(v){
  speed=parseInt(v);
  if(playing){clearInterval(timer);timer=setInterval(()=>go(1),speed)}
}
function go(dir){
  currentIdx+=dir;
  if(currentIdx>=playlist.length)currentIdx=0;
  if(currentIdx<0)currentIdx=playlist.length-1;
  loadCurrent();
}

function loadCurrent(){
  if(!playlist.length)return;
  const file=FILES[playlist[currentIdx]];
  const base=file.f.replace('workshop-diy-','');
  let src;
  if(lang==='ar')src='ar/workshop-diy-'+base+'-ar.html';
  else src='fr/workshop-diy-'+base+'-fr.html';
  document.getElementById('viewer').src=src;
  updateUI();
}

function clickProgress(e){
  const r=e.target.getBoundingClientRect();
  currentIdx=Math.floor((e.clientX-r.left)/r.width*playlist.length);
  loadCurrent();
}

function updateUI(){
  const file=playlist.length?FILES[playlist[currentIdx]]:null;
  document.getElementById('btnPlay').textContent=playing?'⏸':'▶';
  document.getElementById('counter').textContent=playlist.length?
    (currentIdx+1)+' / '+playlist.length:'0';
  document.getElementById('fileName').textContent=file?(lang==='ar'?file.ta:file.t):'';
  document.getElementById('progressFill').style.width=playlist.length?
    ((currentIdx+1)/playlist.length*100)+'%':'0%';
}

function toggleFullscreen(){
  if(!document.fullscreenElement)document.documentElement.requestFullscreen();
  else document.exitFullscreen();
}

document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();togglePlay()}
  if(e.code==='ArrowRight')go(lang==='ar'?-1:1);
  if(e.code==='ArrowLeft')go(lang==='ar'?1:-1);
  if(e.code==='KeyF')toggleFullscreen();
});

try{const s=localStorage.getItem('wdiy-lang');if(s)lang=s}catch(e){}
setLang(lang);
</script>
