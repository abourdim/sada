*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}

body[dir="rtl"]{font-family:'Noto Kufi Arabic','Inter',sans-serif}
.bismillah{text-align:center;padding:4px;font-family:'Amiri',serif;font-size:13px;color:rgba(255,255,255,.08);letter-spacing:1px;direction:rtl;flex-shrink:0}
.controls{display:flex;align-items:center;gap:4px;padding:4px 8px;background:#111;border-bottom:1px solid rgba(255,255,255,.04);flex-shrink:0;flex-wrap:wrap}
.ctrl-btn{padding:4px 10px;border-radius:4px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02);color:rgba(255,255,255,.3);font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
.ctrl-btn:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.6)}
.ctrl-btn.active{border-color:rgba(255,102,0,.3);color:#ff6600;background:rgba(255,102,0,.05)}
.ctrl-sep{width:1px;height:18px;background:rgba(255,255,255,.04)}
.ctrl-select{padding:3px 6px;border-radius:4px;border:1px solid rgba(255,255,255,.06);background:#111;color:rgba(255,255,255,.3);font-size:10px;font-family:inherit;cursor:pointer}
.ctrl-select option{background:#111}
.progress{height:3px;background:rgba(255,255,255,.02);flex-shrink:0;cursor:pointer;position:relative}
.progress-fill{height:100%;background:linear-gradient(90deg,#ff6600,#ff8800);transition:width .3s;pointer-events:none}
.progress:hover .progress-fill{height:5px;margin-top:-1px}
.counter{font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(255,255,255,.15);min-width:60px;text-align:center}
.file-name{font-family:'JetBrains Mono',monospace;font-size:9px;color:rgba(255,102,0,.2);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.frame-wrap{flex:1;position:relative;background:#0a0a14;min-height:0;overflow:hidden}
.frame-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;background:#0a0a14}
.footer{font-size:5px;color:rgba(0,136,255,.02);letter-spacing:1px;text-align:center;padding:8px}

.footer a:hover{color:rgba(255,255,255,.15)}
.lang-btn{padding:3px 6px;border-radius:4px;border:1px solid rgba(255,255,255,.06);background:none;font-size:12px;cursor:pointer;transition:all .15s}
.lang-btn.active{border-color:rgba(255,102,0,.3);background:rgba(255,102,0,.05)}
.cat-bar{display:none;padding:3px 8px;background:#0d0d18;border-bottom:1px solid rgba(255,255,255,.02);gap:4px;flex-wrap:wrap;flex-shrink:0}
.cat-bar.show{display:flex}
.cat-pill{padding:2px 8px;border-radius:10px;border:1px solid rgba(255,255,255,.04);font-size:9px;color:rgba(255,255,255,.15);cursor:pointer;transition:all .15s;white-space:nowrap}
.cat-pill:hover{border-color:rgba(255,102,0,.15)}
.cat-pill.active{border-color:#ff6600;color:#ff6600;background:rgba(255,102,0,.05)}
</style>

<div class="controls" id="controls">
  <button class="ctrl-btn" id="btnPlay" onclick="togglePlay()">▶</button>

  <button class="ctrl-btn" id="btnNext" onclick="go(1)">▸</button>

    <option value="15000">15s</option>
    <option value="30000">30s</option>
  </select>

  <button class="ctrl-btn" id="btnCat" onclick="toggleCatBar()">📂</button>
  <button class="ctrl-btn" onclick="toggleFullscreen()">⛶</button>
  <div style="flex:1"></div>
  <button class="lang-btn" id="langEN" onclick="setLang('en')">🇬🇧</button>

</div>

<div class="progress" id="progressBar" onclick="clickProgress(event)"><div class="progress-fill" id="progressFill"></div></div>

let lang=localStorage.getItem('sada-lang')||'fr',currentIdx=0,playing=false,timer=null,speed=8000,shuffled=false;
let playlist=[...Array(FILES.length).keys()];
let activeCat='all';

function setLang(l){
  lang=l;
  document.documentElement.lang=l==='ar'?'ar':l==='fr'?'fr':'en';
  document.body.dir=l==='ar'?'rtl':'ltr';
  document.getElementById('langEN').classList.toggle('active',l==='en');
  document.getElementById('langFR').classList.toggle('active',l==='fr');
  document.getElementById('langAR').classList.toggle('active',l==='ar');
  buildCatBar();
  loadCurrent();
  try{localStorage.setItem('sada-lang',l)}catch(e){}
}

function buildCatBar(){
  const bar=document.getElementById('catBar');
  bar.innerHTML='';
  Object.keys(CATS).forEach(k=>{
    const pill=document.createElement('span');
    pill.className='cat-pill'+(k===activeCat?' active':'');
    pill.textContent=CATS[k][lang];
    pill.onclick=()=>{activeCat=k;filterPlaylist();buildCatBar();};
    bar.appendChild(pill);
  });
}
function toggleCatBar(){document.getElementById('catBar').classList.toggle('show')}

function filterPlaylist(){
  if(activeCat==='all')playlist=[...Array(FILES.length).keys()];
  else playlist=FILES.map((f,i)=>f.c===activeCat?i:-1).filter(i=>i>=0);
  if(shuffled)shuffle(playlist);
  currentIdx=0;
  loadCurrent();
}

function toggleShuffle(){
  shuffled=!shuffled;
  document.getElementById('btnShuffle').classList.toggle('active',shuffled);
  if(shuffled)shuffle(playlist);else filterPlaylist();
  currentIdx=0;loadCurrent();
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}}

function togglePlay(){
  playing=!playing;
  if(playing){timer=setInterval(()=>go(1),speed)}
  else{clearInterval(timer);timer=null}
  updateUI();
}
function setSpeed(v){
  speed=parseInt(v);
  if(playing){clearInterval(timer);timer=setInterval(()=>go(1),speed)}
}
function go(dir){
  currentIdx+=dir;
  if(currentIdx>=playlist.length)currentIdx=0;
  if(currentIdx<0)currentIdx=playlist.length-1;
  loadCurrent();
}

function clickProgress(e){
  const r=e.target.getBoundingClientRect();
  currentIdx=Math.floor((e.clientX-r.left)/r.width*playlist.length);
  loadCurrent();
}

function updateUI(){
  const file=playlist.length?FILES[playlist[currentIdx]]:null;
  document.getElementById('btnPlay').textContent=playing?'⏸':'▶';
  document.getElementById('counter').textContent=playlist.length?
    (currentIdx+1)+' / '+playlist.length:'0';
  document.getElementById('fileName').textContent=file?(lang==='ar'?file.ta:lang==='en'?(file.te||file.t):file.t):'';
  document.getElementById('progressFill').style.width=playlist.length?
    ((currentIdx+1)/playlist.length*100)+'%':'0%';
}

function toggleFullscreen(){
  if(!document.fullscreenElement)document.documentElement.requestFullscreen();
  else document.exitFullscreen();
}

document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();togglePlay()}
  if(e.code==='ArrowRight')go(lang==='ar'?-1:1);
  if(e.code==='ArrowLeft')go(lang==='ar'?1:-1);
  if(e.code==='KeyF')toggleFullscreen();
});
